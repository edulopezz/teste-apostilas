<style>

:root{
  --bg:#0b0d10;--bg2:#111318;--bg3:#181c22;--bg4:#1e232b;
  --border:#252b35;--border2:#2d3443;
  --text:#cdd5e0;--text2:#8a96a8;--text3:#4d5a6e;
  --gold:#c8a44a;--gold2:#e2c070;--gold3:#f0d490;
  --blue:#3d8fd1;--green:#3d9e72;--green2:#5ec090;
  --red:#c05050;--red2:#e07070;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* HEADER */
.quiz-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:50;flex-wrap:wrap;
}
.qh-back{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text3);text-decoration:none;transition:color .2s;white-space:nowrap;
}
.qh-back:hover{color:var(--gold)}
.qh-title{
  font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold2);
  flex:1;
}
.qh-badge{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--gold);background:rgba(200,164,74,.12);
  padding:3px 10px;border-radius:4px;white-space:nowrap;
}
.qh-stats{
  display:flex;gap:16px;flex-wrap:wrap;
}
.qh-stat{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);
  white-space:nowrap;
}
.qh-stat strong{color:var(--text);font-size:14px}

/* PROGRESS BAR */
.progress-bar{height:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease}

/* FILTERS */
.filter-bar{
  padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-right:4px}
.filter-btn{
  padding:5px 14px;border-radius:4px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-family:'JetBrains Mono',monospace;
  font-size:11px;cursor:pointer;transition:all .15s;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:rgba(200,164,74,.15);border-color:var(--gold);color:var(--gold)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.toggle-btn{
  margin-left:auto;padding:5px 14px;border-radius:4px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);font-family:'JetBrains Mono',monospace;
  font-size:11px;cursor:pointer;transition:all .15s;
}
.toggle-btn:hover{border-color:var(--blue);color:var(--blue)}
.toggle-btn:disabled{opacity:.45;cursor:not-allowed}
.toggle-btn:disabled:hover{border-color:var(--border2);color:var(--text2)}

/* CONTENT */
.quiz-content{padding:24px;max-width:860px;margin:0 auto}

/* QUESTION BLOCK */
.q-block{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:24px;margin-bottom:18px;
  transition:border-color .2s;
}
.q-block.answered{border-color:var(--border2)}
.q-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.q-diff{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:2px 7px;border-radius:3px;
}
.diff-easy{background:rgba(61,158,114,.15);color:var(--green2)}
.diff-med{background:rgba(61,143,209,.12);color:var(--blue)}
.diff-hard{background:rgba(192,80,80,.12);color:var(--red2)}
.q-text{font-size:14.5px;line-height:1.75;margin-bottom:16px;color:var(--text)}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border:1px solid var(--border);
  border-radius:6px;cursor:pointer;background:var(--bg3);
  transition:all .15s;
}
.q-opt:hover:not(.done){border-color:var(--gold);background:rgba(200,164,74,.05)}
.q-opt.done{cursor:default}
.q-opt.sel{border-color:var(--blue)!important;background:rgba(61,143,209,.08)!important}
.q-opt.correct{border-color:var(--green)!important;background:rgba(61,158,114,.12)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(192,80,80,.08)!important}
.opt-letter{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  font-weight:500;color:var(--gold);min-width:18px;margin-top:2px;
}
.opt-text{font-size:13.5px;color:var(--text);line-height:1.6}
.q-feedback{
  margin-top:12px;padding:12px 16px;border-radius:6px;
  font-size:13px;line-height:1.7;display:none;
}
.q-feedback.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-correct{background:rgba(61,158,114,.1);border:1px solid rgba(61,158,114,.3);color:var(--green2)}
.fb-wrong{background:rgba(192,80,80,.08);border:1px solid rgba(192,80,80,.25);color:var(--red2)}
.fb-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;
}
.fb-correct .fb-label{color:var(--green)}
.fb-wrong .fb-label{color:var(--red)}
.fb-body{color:var(--text);font-style:italic}

/* SCORE PANEL */
#score-panel{
  display:none;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:40px;text-align:center;margin:24px;
}
#score-panel.show{display:block;animation:fadeIn .4s ease}
.sc-title{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;
}
.sc-number{
  font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:700;line-height:1;margin-bottom:8px;
}
.sc-approved{color:var(--green2)}
.sc-failed{color:var(--red2)}
.sc-pct{font-size:20px;color:var(--text2);margin-bottom:24px}
.sc-breakdown{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.sc-item{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)}
.sc-item strong{color:var(--text);display:block;font-size:18px}
.sc-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.sc-btn{
  padding:11px 24px;border-radius:6px;font-family:'JetBrains Mono',monospace;
  font-size:12px;cursor:pointer;transition:all .2s;border:none;
}
.sc-btn-primary{background:var(--gold);color:var(--bg)}
.sc-btn-primary:hover{opacity:.85}
.sc-btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.sc-btn-secondary:hover{border-color:var(--gold);color:var(--gold)}

/* BOTTOM NAV */
.bottom-nav{
  padding:20px 24px;border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.nav-btn{
  padding:9px 18px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:'JetBrains Mono',monospace;
  font-size:11px;cursor:pointer;transition:all .2s;text-decoration:none;
  display:inline-block;
}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-theory{margin-left:auto}

/* STICKY SCORE */
#sticky{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(17,19,24,.95);border-top:1px solid var(--border);
  backdrop-filter:blur(8px);
  padding:10px 24px;display:flex;align-items:center;gap:16px;
  z-index:50;
}
#sticky .ss-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
#sticky .ss-txt strong{color:var(--gold)}
.ss-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ss-fill{height:100%;background:var(--gold);transition:width .3s}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}


@media (max-width: 720px){
  .quiz-header,.filter-bar,.bottom-nav,.quiz-content,#sticky{padding-left:16px;padding-right:16px}
  .qh-title{flex-basis:100%;font-size:17px}
  .qh-stats{width:100%;gap:12px}
  .filter-sep{display:none}
  .toggle-btn{margin-left:0}
  #score-panel{margin:16px;padding:28px 20px}
  .sc-number{font-size:56px}
  .bottom-nav{padding-bottom:84px}
}

@media (max-width: 520px){
  .q-block{padding:18px}
  .q-text{font-size:14px}
  .opt-text{font-size:13px}
  #sticky{gap:10px;flex-wrap:wrap}
  #sticky .ss-txt{width:auto}
  .ss-bar{order:3;flex-basis:100%}
}

<script>
const QUESTIONS = [{n:1,t:"Kant afirmou que foi \"despertado do sono dogmático\" pela leitura de qual filósofo?",o:["René Descartes","Baruch de Spinoza","David Hume","John Locke"],a:2,c:"Hume mostrou a Kant que o conceito de causalidade — fundamento da ciência — não tinha justificação racional nem empírica sólida. O \"sono dogmático\" era a aceitação acrítica do racionalismo leibniziano-wolffiano em que Kant havia sido formado. Hume o despertou para o problema: como justificar princípios universais e necessários?",d:"Fácil"},{n:2,t:"A \"Revolução Copernicana\" na Filosofia, proposta por Kant, consiste em:",o:["Afirmar que a Terra gira em torno do Sol, contrariando a tradição filosófica","Propor que não é o sujeito que se adapta ao objeto, mas o objeto que se conforma às estruturas do sujeito que conhece","Demonstrar que a razão é superior aos sentidos como fonte de conhecimento","Provar que Deus existe pela razão prática, não pela razão teórica"],a:1,c:"Kant usa a analogia com Copérnico: assim como Copérnico descobriu que não é o Sol que gira em torno da Terra, mas o contrário, Kant propõe que não é o sujeito que passivamente recebe o mundo — é o sujeito que, com suas estruturas *a priori*, organiza e constitui os objetos da experiência. O objeto se conforma ao sujeito — não o contrário.",d:"Fácil"},{n:3,t:"Um juízo **analítico** é aquele em que:",o:["O predicado acrescenta informação nova que não estava no conceito do sujeito","O predicado apenas explicita o que já estava contido no conceito do sujeito","A verdade do juízo depende da observação empírica","O juízo é válido apenas para situações particulares"],a:1,c:"\"Todo solteiro é não-casado\" — o predicado \"não-casado\" está analiticamente contido no conceito de \"solteiro\". Não acrescenta informação — apenas explicita. São necessariamente verdadeiros mas informativamente vazios. Opõem-se aos sintéticos, que acrescentam informação.",d:"Fácil"},{n:4,t:"Para Kant, espaço e tempo são:",o:["Propriedades objetivas dos objetos externos, independentes do sujeito","Conceitos produzidos pela razão a partir de experiências repetidas","Formas *a priori* da intuição sensível do sujeito","Categorias do entendimento que organizam os dados empíricos"],a:2,c:"Espaço e tempo não estão \"no mundo\" independente do sujeito (A) — são formas que o sujeito impõe à experiência. Toda percepção de objeto externo ocorre no espaço; toda experiência (interna ou externa) ocorre no tempo. Eles são *a priori* (anteriores à experiência) e são intuições (não conceitos — por isso não são categorias).",d:"Fácil"},{n:5,t:"A distinção kantiana entre **fenômeno** e **coisa em si** implica que:",o:["Podemos conhecer as coisas como elas são em si mesmas mediante a razão pura","Só podemos conhecer as coisas como elas aparecem para nós — o objeto em si mesmo é incognoscível","Os fenômenos são ilusões, e a realidade verdadeira é a coisa em si","A ciência conhece a coisa em si; a metafísica conhece apenas fenômenos"],a:1,c:"O fenômeno (*Phänomen*) é o objeto tal como aparece ao sujeito — organizado pelas formas da intuição e pelas categorias. A coisa em si (*Ding an sich* / *Noumenon*) é o objeto independente de qualquer sujeito que o conheça — incognoscível. Isso não significa que os fenômenos são ilusões (C) — são o único tipo de realidade acessível ao conhecimento humano.",d:"Fácil"},{n:6,t:"Na ética kantiana, a **boa vontade** é considerada o único bem incondicional porque:",o:["Produz sempre os melhores resultados práticos independentemente das circunstâncias","É boa em si mesma — seu valor não depende de resultados, consequências ou circunstâncias","É o bem que Deus implantou na natureza humana como lei moral universal","É a vontade que maximiza a felicidade do maior número de pessoas"],a:1,c:"\"Nada no mundo pode ser chamado de bom sem qualificação, exceto uma boa vontade.\" Saúde, inteligência, riqueza podem ser usadas para o mal. Só a vontade que age por puro respeito ao dever é boa em si mesma — independentemente de produzir resultados positivos. Esta é a base do deontologismo kantiano, oposto ao utilitarismo (D).",d:"Fácil"},{n:7,t:"O **Imperativo Categórico** em sua primeira formulação determina que:",o:["Deves agir para maximizar a felicidade do maior número de pessoas","Deves agir apenas segundo máximas que possas ao mesmo tempo querer como lei universal","Deves obedecer às leis da sociedade em que vives como expressão da vontade coletiva","Deves agir como Deus quer — a lei moral é expressão da lei divina"],a:1,c:"A 1ª formulação do Imperativo Categórico é o teste de universalização: antes de agir, pergunte se a máxima da sua ação poderia ser universalizada sem contradição. Se a universalização for impossível ou gerar contradição, a ação é imoral. Isso distingue Kant do utilitarismo (A), do positivismo jurídico (C) e da ética teológica (D).",d:"Fácil"},{n:8,t:"A segunda formulação do Imperativo Categórico ordena que tratemos a humanidade sempre como:",o:["Meio para atingir fins coletivos maiores","Fim em si mesma — nunca simplesmente como meio","Objeto de compaixão e benevolência","Instrumento da vontade divina no mundo"],a:1,c:"\"Age de tal modo que uses a humanidade, tanto na tua pessoa como na de qualquer outro, sempre e ao mesmo tempo como fim, e nunca simplesmente como meio.\" Cada ser racional tem dignidade absoluta — não tem preço, não pode ser instrumentalizado. Esta formulação é a base filosófica dos Direitos Humanos.",d:"Fácil"},{n:9,t:"Para Kant, a diferença entre agir **por dever** e agir **conforme ao dever** é que:",o:["Agir por dever é sempre correto; agir conforme ao dever é sempre errado","Agir por dever tem valor moral genuíno; agir conforme ao dever pode ser correto mas sem valor moral específico","Agir por dever exige obediência à lei divina; agir conforme ao dever segue a lei humana","Ambos têm o mesmo valor moral — o que importa é o resultado final da ação"],a:1,c:"Um comerciante que cobra preço justo por medo de perder clientes age *conforme ao dever* — faz a coisa certa pela razão errada. Um comerciante que cobra preço justo *porque é justo* age *por dever* — tem valor moral. A ação pode ser externamente idêntica, mas o valor moral depende da intenção.",d:"Fácil"},{n:10,t:"A distinção kantiana entre **autonomia** e **heteronomia** refere-se a:",o:["Autonomia: a vontade segue a lei que ela mesma se dá; Heteronomia: a vontade recebe a lei de fora","Autonomia: independência política; Heteronomia: dependência do Estado","Autonomia: obediência à razão divina; Heteronomia: obediência à razão humana","Autonomia: ação por inclinação; Heteronomia: ação por dever"],a:0,c:"*Autonomia* = auto-legislação: a vontade racional dá a si mesma a lei moral universal — age por puro respeito ao dever. *Heteronomia* = receber a lei de fora: agir por medo de punição, por desejo de recompensa, por pressão social, por mandamento divino — é sempre heteronomia. A moral genuína requer autonomia.",d:"Fácil"},{n:11,t:"As **categorias** do entendimento, para Kant, são:",o:["Conceitos empíricos abstraídos da experiência repetida","Conceitos *a priori* que o entendimento usa para organizar os dados da intuição sensível","Ideias inatas que a mente possui antes da experiência, como em Descartes","Princípios morais que a razão prática impõe à ação humana"],a:1,c:"As categorias (quantidade, qualidade, relação, modalidade — 12 no total) são conceitos puros *a priori* do entendimento — estruturas que a mente usa para organizar os dados sensoriais em objetos de conhecimento. Não são empíricas (A — isso seria Locke) nem ideias inatas no sentido cartesiano (C) nem princípios morais (D).",d:"Fácil"},{n:12,t:"Os **postulados da razão prática** de Kant são:",o:["Provas racionais definitivas da existência de Deus, da alma imortal e da liberdade","Crenças racionalmente necessárias (liberdade, imortalidade da alma, Deus) postuladas como condições da moralidade","Hipóteses científicas sobre a natureza da consciência humana","Princípios metafísicos demonstrados pela razão teórica na *Crítica da Razão Pura*"],a:1,c:"Os postulados não são *conhecimentos* — Kant explicitamente nega que a razão teórica possa provar Deus, alma e liberdade. São *crenças racionalmente justificadas* pela razão prática: sem liberdade, não há responsabilidade moral; sem imortalidade, a perfeição moral é impossível; sem Deus, a correspondência entre virtude e felicidade não é garantida. São condições de possibilidade da moral — não demonstrações teóricas.",d:"Fácil"},{n:13,t:"A pergunta central da *Crítica da Razão Pura* de Kant é:",o:["O que devo fazer para ser moralmente bom?","Como são possíveis os juízos sintéticos *a priori*?","Como posso alcançar a felicidade verdadeira?","Como provar a existência de Deus pela razão?"],a:1,c:"A questão dos juízos sintéticos *a priori* organiza toda a *Crítica da Razão Pura*: como são possíveis juízos que ao mesmo tempo ampliam nosso conhecimento (sintéticos) e são necessariamente universais (a priori)? A resposta envolve toda a arquitetura transcendental kantiana.",d:"Fácil"},{n:14,t:"Segundo Kant, a **metafísica dogmática** (que pretendia conhecer Deus, alma e liberdade pela razão pura) é:",o:["O ponto de partida necessário para toda filosofia","Impossível — a razão teórica ultrapassa seus limites ao tentar conhecer o que está além da experiência possível","Possível, mas apenas pelo método das Cinco Vias de Tomás de Aquino","Idêntica à ciência natural — usa o mesmo método"],a:1,c:"A *Dialética Transcendental* na *Crítica da Razão Pura* demonstra que quando a razão vai além dos limites da experiência possível (tentando conhecer Deus, alma e mundo como totalidade), ela gera contradições irresolvíveis (antinomias). Logo, a metafísica dogmática é impossível. Deus, alma e liberdade não são objetos de conhecimento — mas podem ser *postulados* pela razão prática.",d:"Fácil"},{n:15,t:"Para Kant, o julgamento estético sobre o belo caracteriza-se por ser:",o:["Subjetivo e pessoal — \"é belo para mim\" sem pretensão de validade universal","Baseado em conceitos científicos sobre a harmonia e a proporção","Desinteressado, com pretensão de universalidade e necessidade","Idêntico ao juízo sobre o agradável — ambos expressam prazer pessoal"],a:2,c:"O julgamento do belo tem três características: é *desinteressado* (não depende de posse ou utilidade — aprecio a beleza de uma paisagem sem querer comprá-la); tem *pretensão de universalidade* (ao dizer \"é belo\", implico que todos deveriam concordar — não \"é belo para mim\"); é *necessário* (não é mera preferência acidental). Isso o distingue do agradável (subjetivo) e do útil (interesseiro).",d:"Fácil"},{n:16,t:"A diferença entre um **juízo sintético *a posteriori*** e um **juízo sintético *a priori***, segundo Kant, é que:",o:["O *a posteriori* é universal e necessário; o *a priori* é particular e contingente","O *a posteriori* depende da experiência e é contingente; o *a priori* é independente da experiência e é necessário","O *a posteriori* é produzido pela razão; o *a priori* é produzido pelos sentidos","Ambos têm o mesmo grau de certeza — a distinção é apenas cronológica"],a:1,c:"\"A água ferve a 100°C\" é sintético *a posteriori*: amplia nosso conhecimento (sintético) mas depende da experiência e poderia ser diferente (contingente — em altitude diferente, o ponto de ebulição é diferente). \"Todo evento tem uma causa\" é sintético *a priori*: amplia nosso conhecimento (sintético) e é necessário e universal — não aprendemos isso pela experiência, mas é condição de qualquer experiência possível.",d:"Média"},{n:17,t:"A resposta de Kant ao problema da causalidade levantado por Hume é que:",o:["Hume tinha razão — a causalidade é apenas um hábito mental sem fundamento objetivo","Hume errou — a causalidade pode ser demonstrada pela experiência se observarmos casos suficientes","A causalidade é uma categoria *a priori* do entendimento que o sujeito aplica necessariamente a toda experiência possível","A causalidade tem fundamento em Deus, que garantiu a ordem causal do universo"],a:2,c:"Esta é a resposta central de Kant a Hume. Kant concorda que a causalidade não é observada nos sentidos (Hume tem razão nisso). Mas não é apenas hábito mental (Hume errou nisso). É uma categoria *a priori* do entendimento: o sujeito a aplica necessariamente a toda experiência possível. Por isso a causalidade é universal e necessária — não porque está \"no mundo\", mas porque é uma estrutura do sujeito que conhece.",d:"Média"},{n:18,t:"A **Dialética Transcendental** na *Crítica da Razão Pura* demonstra que quando a razão tenta ir além dos limites da experiência possível, ela gera:",o:["Conhecimentos mais profundos e seguros do que os da experiência comum","As \"ideias transcendentais\" (alma, mundo, Deus) e antinomias — contradições irresolvíveis","Os princípios morais da razão prática que fundamentam a ética","As categorias do entendimento que organizam a experiência"],a:1,c:"A Dialética Transcendental é a parte \"negativa\" da *Crítica da Razão Pura*: mostra o que a razão *não pode* fazer. Quando a razão tenta conhecer o eu como substância (alma), o mundo como totalidade, ou Deus como ser necessário, ela produz paralogismos (falácias sobre a alma) e antinomias (contradições irresolvíveis sobre o mundo). Isso prova os limites da razão teórica.",d:"Média"},{n:19,t:"A **3ª Antinomia** de Kant opõe determinismo e liberdade. Kant resolve essa oposição ao distinguir:",o:["Razão teórica (determina o futuro) e razão prática (garante a liberdade)","O ser humano como fenômeno (sujeito ao determinismo natural) e como noumeno (capaz de liberdade moral)","A liberdade física (ausência de coerção) e a liberdade moral (autonomia)","A lei natural (determinista) e a lei divina (que garante o livre-arbítrio)"],a:1,c:"A solução kantiana é elegante: como fenômeno (objeto do conhecimento científico), o ser humano está sujeito às leis naturais deterministas — como qualquer evento natural. Como noumeno (sujeito moral), o ser humano é capaz de liberdade — de agir por razão pura, além das determinações naturais. Assim, determinismo científico e liberdade moral são compatíveis — operam em níveis diferentes.",d:"Média"},{n:20,t:"O **Imperativo Hipotético**, diferente do Categórico, tem a estrutura \"Se queres X, faz Y\". Para Kant, ele não tem valor moral genuíno porque:",o:["É sempre falso — não existe relação entre meios e fins na ação humana","É condicional — depende de um desejo ou fim contingente, e não obriga incondicionalmente","É formulado de forma incorreta do ponto de vista lógico","Viola a lei da universalização ao ser aplicado apenas a situações específicas"],a:1,c:"\"Se queres ser saudável, exercita-te\" — só obriga quem quer ser saudável. Se eu não quero, o imperativo não se aplica. Isso é heteronomia: a obrigação depende de um desejo. O Imperativo Categórico (\"Não mintas\") obriga incondicionalmente — independentemente do que eu queira ou não queira. Só a obrigação incondicional tem valor moral genuíno.",d:"Média"},{n:21,t:"A afirmação kantiana de que a geometria euclidiana é um juízo sintético *a priori* baseia-se em:",o:["A geometria descreve o mundo físico tal como observamos empiricamente","A geometria descreve as propriedades do espaço que é uma forma *a priori* da intuição — por isso é necessária e universal","A geometria é deduzida de axiomas puramente lógicos, tornando-a analítica","A geometria foi confirmada pela física newtoniana como a mais adequada ao mundo"],a:1,c:"Para Kant, o espaço é a forma *a priori* da intuição externa — o sujeito impõe o espaço a toda experiência. A geometria estuda as propriedades desse espaço. Por isso seus juízos (\"a linha reta é o caminho mais curto entre dois pontos\") são: sintéticos (acrescentam informação — \"mais curto\" não está na definição de \"linha reta\") e *a priori* (necessários — válidos para qualquer experiência possível). Nota histórica: o surgimento das geometrias não-euclidianas (séc. XIX) questi",d:"Média"},{n:22,t:"A ética kantiana é classificada como **deontológica** porque:",o:["Deriva a moral da vontade de Deus (*theos*)","O valor moral de uma ação depende do dever (*deon*) — da intenção e da conformidade à lei universal — não das consequências","O critério moral é a produção do maior bem para o maior número","A moral é determinada pelos costumes (*ethos*) da comunidade"],a:1,c:"*Deontologia* (de *deon* = dever): o valor moral de uma ação é determinado pelo dever — pela intenção de agir segundo a lei moral universal — independentemente dos resultados. Isso opõe Kant ao consequencialismo/utilitarismo (C — Mill, Bentham) e à ética das virtudes (D — Aristóteles). A origem divina da moral (A) seria heteronomia para Kant.",d:"Média"},{n:23,t:"Segundo a segunda formulação do Imperativo Categórico, a prática do **bullying** seria considerada imoral porque:",o:["Viola leis do Estado que proíbem o bullying","Produz sofrimento que reduz o bem-estar geral da comunidade","Trata a vítima como meio — instrumentalizando sua vulnerabilidade — e não como fim em si mesma","Não pode ser universalizada sem contradição"],a:2,c:"Esta questão conecta Kant ao cotidiano escolar. A 2ª formulação (humanidade como fim) condena o bullying de forma direta: usar a vulnerabilidade de alguém para produzir entretenimento, exercer poder ou pertencer a um grupo é tratar essa pessoa como mero meio — violando sua dignidade intrínseca. A alternativa D (1ª formulação) também funcionaria, mas a 2ª é mais diretamente aplicável.",d:"Média"},{n:24,t:"A distinção entre a razão teórica (*Verstand* + *Vernunft*) e a razão prática (*praktische Vernunft*) em Kant implica que:",o:["A razão prática é inferior à razão teórica — deve subordinar-se a ela","A razão teórica determina o que podemos conhecer; a razão prática determina o que devemos fazer — e tem primazia sobre a teórica na vida humana","Razão teórica e prática são completamente independentes e nunca interagem","A razão prática é apenas a aplicação da razão teórica às questões morais"],a:1,c:"Kant concede **primazia à razão prática**: a razão teórica não pode provar Deus, alma e liberdade — mas a razão prática os postula como condições da moralidade. O interesse moral supera o interesse teórico. \"O que devo fazer?\" é, para Kant, mais fundamental do que \"O que posso conhecer?\" — porque a liberdade e a dignidade humanas são mais centrais que qualquer teoria.",d:"Média"},{n:25,t:"A distinção kantiana entre **entendimento** (*Verstand*) e **razão** (*Vernunft*) é que:",o:["Entendimento e razão são sinônimos na filosofia kantiana","O entendimento aplica categorias aos dados da intuição produzindo conhecimento; a razão tende a ir além da experiência possível, gerando ilusões dialéticas","O entendimento acessa a coisa em si; a razão acessa apenas os fenômenos","O entendimento é faculdade da vontade; a razão é faculdade do conhecimento"],a:1,c:"Para Kant, o entendimento (*Verstand*) é a faculdade dos conceitos e categorias — organiza os dados da intuição em conhecimento objetivo dos fenômenos. A razão (*Vernunft*) busca completar e totalizar esse conhecimento, mas inevitavelmente ultrapassa os limites da experiência possível — gerando as ideias transcendentais (alma, mundo, Deus) e as antinomias. O entendimento produz ciência; a razão tende à ilusão metafísica.",d:"Média"},{n:26,t:"A afirmação kantiana \"O espaço não é um conceito empírico abstraído de experiências externas\" implica que:",o:["O espaço é uma abstração da matemática sem correspondência na realidade","O espaço precede a experiência como condição de possibilidade de qualquer percepção de objeto externo","O espaço é uma propriedade objetiva dos objetos físicos, independente do sujeito","O espaço não existe — é uma ilusão dos sentidos que a razão corrige"],a:1,c:"Para perceber algo *fora de mim* (um objeto externo), já preciso da forma do espaço — não posso aprender o espaço da experiência porque já preciso do espaço para ter qualquer experiência de objeto externo. Logo, o espaço é uma forma *a priori* da intuição — condição de possibilidade da experiência, não produto dela. Newton o tratava como objetivo e absoluto; Kant mostra que é subjetivo-transcendental.",d:"Média"},{n:27,t:"A crítica ao Argumento Ontológico de Anselmo, formulada por Kant, é que \"existência não é um predicado\". Isso significa que:",o:["Deus não existe — a existência de Deus é logicamente impossível","Não se pode acrescentar existência a um conceito para enriquecê-lo — existência não é uma propriedade que aumenta o \"valor\" de um conceito","O conceito de Deus não inclui o predicado de existência em nenhuma tradição filosófica","A existência pode ser provada pelo argumento ontológico se aplicado corretamente"],a:1,c:"A crítica kantiana: \"Deus existe\" não adiciona nada ao conceito de Deus — a existência não é uma propriedade (como \"onisciente\" ou \"eterno\"). Um ser existente não é \"maior\" que um ser meramente concebido — ambos têm o mesmo conteúdo conceitual. O que difere é a relação com a realidade, não o conceito. Logo, não se pode inferir existência real a partir de conceitos, por mais perfeitos que sejam.",d:"Média"},{n:28,t:"A tese kantiana de que só podemos conhecer **fenômenos** — e não a coisa em si — tem como consequência que:",o:["O conhecimento científico é ilusório e deve ser abandonado","A ciência é completamente confiável — conhece os fenômenos com rigor","A metafísica pode ser fundada em bases mais sólidas que a ciência","A filosofia deve abandonar o projeto de conhecer a natureza"],a:1,c:"Paradoxalmente, a limitação kantiana (só conhecemos fenômenos) *fortalece* a ciência: ela não precisa conhecer a \"essência\" das coisas — precisa conhecer os fenômenos com rigor e precisão, usando as categorias do entendimento e os dados da intuição. A ciência newtoniana é completamente válida — como conhecimento do domínio fenomenal. O que é impossível é a *metafísica dogmática* que pretende ir além dos fenômenos.",d:"Média"},{n:29,t:"A posição de Kant sobre a moral é incompatível com o **utilitarismo** (ética das consequências) porque:",o:["Kant acha que as consequências das ações são irrelevantes para o valor moral","Kant concorda com o utilitarismo sobre a maximização do bem-estar geral","O utilitarismo de Bentham era posterior a Kant e desconhecido por ele","Kant acha que o prazer é o fundamento da moral, ao contrário dos utilitaristas"],a:0,c:"Para Kant, o valor moral de uma ação depende exclusivamente da intenção e da conformidade à lei moral universal — nunca das consequências. Mesmo uma ação bem-intencionada que produz resultados ruins tem valor moral. E uma ação que produz bons resultados por razões egoístas não tem valor moral. Isso é o oposto do utilitarismo: para Bentham e Mill, só as consequências (bem-estar produzido) determinam o valor moral.",d:"Média"},{n:30,t:"O conceito kantiano de **dignidade** humana (*Würde*) fundamenta-se em que o ser humano:",o:["Foi criado à imagem e semelhança de Deus, possuindo valor transcendente","É um ser racional e autônomo — capaz de dar a si mesmo a lei moral — o que lhe confere valor absoluto incomparável","É o ser mais complexo biologicamente, o que o torna especialmente valioso","Faz parte de uma comunidade social que lhe atribui direitos e deveres"],a:1,c:"A dignidade kantiana não deriva de Deus (A — isso seria heteronomia) nem da biologia (C) nem da sociedade (D — isso tornaria os direitos relativos). Deriva da racionalidade e da autonomia: o ser humano é capaz de agir por razão pura — de dar a si mesmo a lei moral. Isso lhe confere valor absoluto (*Würde*) — que não tem preço e não pode ser trocado por nada.",d:"Média"},{n:31,t:"A **\"Analítica Transcendental\"** na *Crítica da Razão Pura* investiga:",o:["Os limites da razão e as ilusões que ela produz ao ultrapassá-los","As condições *a priori* do entendimento — as categorias — que tornam possível o conhecimento dos objetos da experiência","As formas da intuição sensível (espaço e tempo)","Os postulados morais da razão prática"],a:1,c:"A *Crítica da Razão Pura* divide-se em Estética Transcendental (espaço e tempo — formas da intuição), Analítica Transcendental (categorias do entendimento — condições do conhecimento) e Dialética Transcendental (limites e ilusões da razão). A Analítica é a parte \"positiva\": mostra como o conhecimento dos fenômenos é possível pelas categorias.",d:"Média"},{n:32,t:"A posição de Kant sobre a religião — especialmente sobre a existência de Deus — pode ser resumida como:",o:["Deus pode ser provado pela razão teórica através das Cinco Vias de Tomás de Aquino","Deus não pode ser conhecido teoricamente, mas é postulado pela razão prática como condição da moralidade completa","Deus não existe — a razão demonstra a impossibilidade de sua existência","Deus pode ser conhecido pela experiência mística, mas não pela razão filosófica"],a:1,c:"Kant destrói as provas racionais de Deus (Ontológico: existência não é predicado; Cosmológico: usa a categoria de causalidade além da experiência possível; Físico-teológico: argumento teleológico não prova o Deus monoteísta). Mas na razão prática, Deus é postulado como condição de possibilidade da moralidade completa (garantidor da correspondência virtude-felicidade). Kant \"limitou o conhecimento para dar lugar à fé\" (*Crítica da Razão Pura*, Prefácio).",d:"Média"},{n:33,t:"A frase de Kant \"O céu estrelado acima de mim e a lei moral dentro de mim\" (ao final da *Crítica da Razão Prática*) expressa:",o:["A crença de que Deus está tanto na natureza quanto na consciência moral","O espanto diante de dois fenômenos que ampliam a visão humana para além do individual: a imensidão do cosmos e a grandeza da lei moral racional","A convicção de que astronomia e ética são as únicas ciências verdadeiras","A nostalgia do cosmo medieval ordenado por Deus e pela lei moral divina"],a:1,c:"Esta é uma das frases mais famosas da filosofia. Kant não faz uma afirmação teológica — faz uma afirmação sobre a grandeza: assim como a contemplação do céu estrelado me faz perceber minha pequenez cósmica, a consciência da lei moral me faz perceber uma grandeza que vai além de minha existência natural e individual. O cosmos me submete às leis da natureza; a lei moral me eleva como ser racional autônomo.",d:"Média"},{n:34,t:"A **\"Estética Transcendental\"** de Kant investiga as condições de possibilidade da **intuição sensível**. Por que Kant chama esse estudo de \"estética\"?",o:["Porque trata da experiência do belo e do sublime na natureza","Porque usa o sentido grego de *aisthesis* (percepção sensorial) — não o sentido moderno de \"teoria da arte\"","Porque demonstra que toda intuição sensível é esteticamente bela","Porque foi desenvolvida a partir da *Crítica do Juízo*, que trata da estética"],a:1,c:"Kant usa \"estética\" no sentido grego: *aisthesis* = percepção sensorial. A Estética Transcendental é a análise das condições *a priori* da sensibilidade — das formas que estruturam toda percepção sensorial. Não tem nada a ver com arte (no sentido moderno de \"estética\") — esse tema vem apenas na *Crítica do Juízo*.",d:"Média"},{n:35,t:"A crítica de Kant ao **eudaimonismo** (ética baseada na felicidade, como em Aristóteles) é que:",o:["A felicidade é impossível de alcançar — logo não pode ser fundamento da moral","Basear a moral na felicidade é heteronomia — a vontade recebe a lei de uma inclinação natural (desejo de felicidade), não da razão pura","A felicidade é um conceito vago demais para fundamentar uma ética rigorosa","Aristóteles e Kant concordam que a felicidade é o bem supremo do ser humano"],a:1,c:"Para Kant, mesmo que a felicidade seja um bem, basear a moral nela é *heteronomia*: a vontade age por inclinação natural (desejo de ser feliz) — não por pura razão. A lei moral deve ser independente de qualquer inclinação ou desejo — mesmo o desejo natural de felicidade. A alternativa C é secundária (Kant a menciona, mas não é o argumento central). A alternativa D é falsa — Kant critica o eudaimonismo aristotélico.",d:"Média"},{n:36,t:"Considere as afirmações:  I. Kant afirma que podemos conhecer a coisa em si mediante a razão pura. II. Os juízos sintéticos *a posteriori* são necessários e universais. III. O espaço é uma forma *a priori* da intuição que o sujeito impõe à experiência.  Estão corretas:",o:["Apenas I","Apenas III","Apenas II e III","I, II e III"],a:1,c:"I é **falsa**: Kant afirma exatamente o contrário — a coisa em si (*Ding an sich*) é incognoscível; só os fenômenos podem ser conhecidos. II é **falsa**: juízos sintéticos *a posteriori* são contingentes e particulares (dependem da experiência e poderiam ser diferentes). III é **verdadeira**: o espaço é forma *a priori* do sentido externo — o sujeito impõe a forma espacial a toda percepção de objeto externo.",d:"Difícil"},{n:37,t:"A solução kantiana para as **antinomias** é afirmar que as teses e antíteses:",o:["Ambas são verdadeiras simultaneamente — a contradição é apenas aparente","A tese é verdadeira para os fenômenos; a antítese é verdadeira para os noumenos","Ambas ultrapassam os limites da razão — nem tese nem antítese pode ser provada, pois ambas tratam de objetos além da experiência possível","A antítese é sempre verdadeira — a razão deve adotar a perspectiva científica naturalista"],a:2,c:"A solução das antinomias matemáticas (1ª e 2ª): nem tese nem antítese pode ser provada — ambas assumem que o mundo como totalidade é objeto de conhecimento possível, o que é falso. A solução das antinomias dinâmicas (3ª e 4ª — liberdade e Deus): tanto tese quanto antítese podem ser verdadeiras — a tese vale para o domínio noumenal (liberdade, Deus), a antítese para o fenomenal (determinismo). A alternativa C descreve a solução geral mais precisa.",d:"Difícil"},{n:38,t:"A crítica de Kant ao Argumento Cosmológico (a existência de uma Primeira Causa) é que:",o:["A categoria de causalidade é válida para os fenômenos — mas a Primeira Causa está além da experiência possível, tornando o argumento ilegítimo","A causalidade é apenas um hábito mental (Hume), tornando todo argumento causal inválido","O argumento cosmológico depende do argumento ontológico, que já foi refutado","A ideia de uma Primeira Causa contradiz o princípio da razão suficiente de Leibniz"],a:0,c:"Kant aceita que a causalidade é uma categoria legítima do entendimento — mas *apenas para o domínio dos fenômenos*. O Argumento Cosmológico aplica a categoria de causalidade além dos fenômenos (a uma Primeira Causa que estaria fora da experiência possível) — isso é uso ilegítimo da categoria. Além disso, o argumento conclui pela existência de um ser necessário — o que é o argumento ontológico disfarçado (C também é parcialmente correto, mas A é mais preciso).",d:"Difícil"},{n:39,t:"A afirmação \"Age apenas segundo aquela máxima pela qual possas ao mesmo tempo querer que ela se torne uma lei universal\" implica que a imoralidade de uma ação é detectada pela sua:",o:["Impossibilidade física de ser executada por todos simultaneamente","Contradição lógica quando universalizada — a máxima destrói as condições de sua própria possibilidade","Produção de consequências negativas para a maioria das pessoas","Violação de alguma lei positiva vigente na comunidade"],a:1,c:"O teste de universalização kantiano detecta imoralidade pela *contradição lógica* da universalização. \"Posso fazer promessas falsas?\" Universalize: \"Todos podem fazer promessas falsas quando conveniente.\" Resultado: a instituição da promessa colapsa (ninguém acreditaria em promessas) — a máxima destrói as condições de sua própria possibilidade. Isso é uma contradição na vontade — não uma impossibilidade física nem um cálculo de consequências.",d:"Difícil"},{n:40,t:"O **Idealismo Transcendental** de Kant distingue-se do **Idealismo de Berkeley** porque:",o:["Berkeley nega a existência de objetos externos; Kant os afirma como fenômenos reais — apenas a coisa em si é incognoscível","Kant nega a existência de qualquer objeto externo; Berkeley os afirma como percepções de Deus","Ambos são formas de idealismo que negam a existência do mundo material","Berkeley usa a razão; Kant usa a experiência sensorial como ponto de partida"],a:0,c:"Berkeley: os objetos externos não existem como matéria independente — existem apenas como percepções nas mentes. Kant rejeita esse idealismo radical: os fenômenos são reais — existem objetos no espaço que afetam nossos sentidos. O que não podemos conhecer é a *coisa em si* (como esses objetos são independentemente de qualquer sujeito). Kant chama sua posição de \"realismo empírico\" (os fenômenos são reais) combinado com \"idealismo transcendental\" (as formas que os organizam sã",d:"Difícil"},{n:41,t:"O filósofo **G.W.F. Hegel** (séc. XIX) criticou Kant por afirmar que a coisa em si é incognoscível, argumentando que:",o:["A coisa em si não existe — apenas os fenômenos são reais","Ao definir a coisa em si como incognoscível, Kant já está afirmando algo sobre ela — contradizendo sua própria tese","A coisa em si é cognoscível pela experiência mística, não pela razão filosófica","O conceito de coisa em si é idêntico ao de fenômeno — Kant cria uma distinção desnecessária"],a:1,c:"A crítica de Hegel é precisa e filosoficamente importante: ao dizer que a coisa em si é incognoscível, Kant já está dizendo algo sobre ela (que ela existe, que é diferente do fenômeno, que está além do conhecimento). Mas se não podemos conhecê-la, como sabemos que ela existe e que difere dos fenômenos? Hegel argumenta que o próprio conceito de \"coisa em si\" incognoscível é contraditório — e propõe superar essa limitação kantiana com o Idealismo Absoluto.",d:"Difícil"},{n:42,t:"A frase \"Deus, liberdade e imortalidade da alma são os três objetos em relação aos quais toda especulação da razão pura em sua tendência transcendente tem em vista seu único objetivo\" (Kant, *Crítica da Razão Pura*) implica que:",o:["A razão pura pode e deve provar a existência de Deus, a liberdade e a imortalidade","Esses três objetos são os fins últimos da razão especulativa — mas a razão não pode alcançá-los teoricamente","A filosofia deve abandonar esses temas por serem inacessíveis à razão","Esses três objetos são objeto de experiência sensível, não de razão pura"],a:1,c:"Kant identifica que a razão pura inevitavelmente busca esses três objetos — eles são os fins naturais da metafísica. Mas a *Crítica da Razão Pura* demonstra que eles estão além dos limites do conhecimento teórico legítimo. A solução: eles não são objetos de *conhecimento* teórico, mas de *crença racional* fundamentada na razão prática. Isso é o projeto crítico completo de Kant.",d:"Difícil"},{n:43,t:"A distinção kantiana entre **\"uso regulativo\"** e **\"uso constitutivo\"** das ideias da razão implica que:",o:["As ideias de alma, mundo e Deus podem ser usadas como princípios que orientam a investigação, mas não como afirmações sobre objetos realmente existentes","As ideias transcendentais constituem os objetos da ciência natural","O uso regulativo é ilegítimo; apenas o uso constitutivo é permitido pela razão","As ideias transcendentais têm uso constitutivo na ética e uso regulativo na física"],a:0,c:"Uso *constitutivo*: tratar uma ideia como se ela constituísse/descrevesse um objeto real — ilegítimo para as ideias transcendentais. Uso *regulativo*: usar a ideia como princípio orientador da investigação — legítimo. Por exemplo: a ideia de \"unidade sistemática da natureza\" orienta a investigação científica (regula a busca por leis gerais) sem afirmar que a natureza é de fato uma unidade acabada. A ideia de Deus como ordenador pode orientar a biologia teleologicamente sem af",d:"Difícil"},{n:44,t:"A ética kantiana foi criticada por ser excessivamente **formal** e **rígida**. Um exemplo clássico é o caso do mentir para o assassino. Qual filósofo contemporâneo desenvolveria a crítica mais pertinente a essa rigidez kantiana?",o:["Aristóteles — a *phronesis* permite adaptar o princípio moral às circunstâncias","Hume — os sentimentos morais são mais confiáveis que regras abstratas","John Stuart Mill — as consequências de salvar uma vida superam a proibição da mentira","Todas as anteriores oferecem críticas pertinentes, por razões diferentes"],a:3,c:"Esta questão de nível superior integra múltiplas tradições. Aristóteles: a *phronesis* (prudência) permite determinar o meio-termo correto em cada situação concreta — a rigidez kantiana ignora o contexto. Hume: o sentimento moral de compaixão pela vítima deveria orientar a ação. Mill: o utilitarismo avalia as consequências — salvar uma vida supera a proibição da mentira. Todas oferecem críticas genuínas à rigidez do formalismo kantiano — e Kant responderia que nenhuma delas g",d:"Difícil"},{n:45,t:"A **Declaração Universal dos Direitos Humanos** (1948) tem raízes filosóficas kantianas porque:",o:["Foi redigida por filósofos que leram diretamente os textos de Kant","A ideia de direitos inalienáveis baseados na dignidade humana universal corresponde à 2ª formulação do Imperativo Categórico","Kant defendeu explicitamente os direitos humanos como consequência de sua filosofia política","A ONU adotou o imperativo categórico como fundamento do direito internacional"],a:1,c:"A conexão é filosófica, não histórica direta. A ideia central da Declaração — direitos fundados na dignidade inerente de todo ser humano, independentemente de raça, gênero, nacionalidade ou qualquer condição — corresponde precisamente à 2ª formulação kantiana: toda pessoa deve ser tratada como fim em si mesma. A dignidade kantiana (*Würde*) — valor absoluto, incomparável, não instrumental — é o fundamento filosófico dos direitos humanos universais.",d:"Difícil"},{n:46,t:"Considere a seguinte situação: um estudante diz \"Não roubo porque tenho medo de ser preso.\" Para Kant, essa afirmação indica que o estudante:",o:["Age por dever — faz a coisa certa pela razão correta","Age conforme ao dever mas não por dever — a motivação é o medo (inclinação), não o respeito à lei moral","Age de forma autônoma — usa a razão para determinar sua ação","Demonstra compreensão do Imperativo Categórico aplicado à propriedade privada"],a:1,c:"Perfeito exemplo de aplicação pedagógica da distinção kantiana. Não roubar por medo de punição é agir *conforme ao dever* (faz a coisa certa) mas não *por dever* (a motivação é o medo — inclinação heterônoma). Para ter valor moral genuíno, o estudante deveria não roubar porque é errado roubar — por respeito à lei moral universal (\"Não roubarás\" como máxima universalizável). Esta situação pode ser usada diretamente em aula.",d:"Difícil"},{n:47,t:"A afirmação de que as geometrias **não-euclidianas** (Lobachevski, Riemann — séc. XIX) representam um problema para o sistema kantiano é porque:",o:["Demonstram que a matemática é empírica — contradizendo toda a epistemologia kantiana","Mostram que o espaço pode ter geometrias diferentes da euclidiana — questionando a tese de que o espaço euclidiano é a forma *a priori* única da intuição","Provam que a coisa em si pode ser conhecida geometricamente","Eliminam a necessidade do conceito kantiano de categoria do entendimento"],a:1,c:"Kant assumia que a geometria euclidiana descrevia necessariamente o espaço da intuição — era o exemplo mais importante de juízo sintético *a priori*. As geometrias não-euclidianas (que Bolyai, Lobachevski e Riemann desenvolveram no séc. XIX) mostraram que existem geometrias consistentes onde, por exemplo, a soma dos ângulos de um triângulo não é 180°. A física de Einstein confirmou que o espaço-tempo não é euclidiano. Isso não destrói Kant, mas o força a ser revisado.",d:"Difícil"},{n:48,t:"A distinção kantiana entre **moralidade** e **legalidade** implica que:",o:["Ações legais são sempre morais e vice-versa","Ações podem ser legais sem ser morais (conformes à lei jurídica mas por motivo errado) e ilegais mas morais (violam lei injusta por dever moral)","A moral deve sempre se subordinar ao direito positivo do Estado","O direito positivo é a expressão da lei moral universal — são idênticos"],a:1,c:"*Legalidade* = conformidade externa com a lei (jurídica ou moral). *Moralidade* = ação por respeito ao dever moral. Uma ação pode ser legal (conforme à lei) sem ser moral (feita por motivo errado — medo de punição). E pode ser moralmente necessária mas tecnicamente ilegal (desobedecer a uma lei injusta por respeito à dignidade humana). Essa distinção tem importância para debates sobre desobediência civil — tema que pode ser trabalhado pedagogicamente.",d:"Difícil"},{n:49,t:"A **ética do discurso** de Jürgen Habermas (séc. XX) é frequentemente descrita como uma \"reformulação intersubjetiva\" do imperativo categórico kantiano porque:",o:["Habermas nega completamente Kant e desenvolve uma ética completamente nova","Em vez de perguntar \"posso universalizar minha máxima?\", Habermas pergunta \"todos os afetados, num diálogo ideal, poderiam concordar com esta norma?\"","Habermas substitui a razão pela emoção como fundamento da moral, seguindo Hume","A ética do discurso é baseada no utilitarismo, não no kantismo"],a:1,c:"Habermas mantém a estrutura formal do imperativo kantiano (universalização) mas o transforma: em vez de um sujeito isolado testando a universalizabilidade de sua máxima, Habermas propõe um procedimento dialógico — a norma é válida se todos os afetados, em condições ideais de diálogo (sem coerção, com igualdade de participação), pudessem acordá-la. A racionalidade é intersubjetiva (partilhada em diálogo) — não apenas subjetiva (individual como em Kant).",d:"Difícil"},{n:50,t:"Um professor de Filosofia no EF Anos Finais quer usar o **Imperativo Categórico** para discutir ética nas redes sociais com seus alunos. A melhor estratégia é:",o:["Apresentar o Imperativo como uma regra absoluta e exigir que os alunos a memorizem","Propor situações concretas (compartilhar informação falsa, expor a privacidade de outro, usar hate speech) e pedir que apliquem o teste de universalização: \"E se todos fizessem isso?\" — analisando as consequências lógicas","Evitar redes sociais por serem temas contemporâneos incompatíveis com a filosofia moderna","Apresentar apenas a segunda formulação, ignorando a primeira por ser mais complexa"],a:1,c:"Esta questão de transposição didática encerra o tópico conectando Kant ao contexto real dos estudantes do EF Anos Finais. Redes sociais são o espaço moral por excelência dos adolescentes — e o Imperativo Categórico fornece uma ferramenta concreta: \"Se todos compartilhassem notícias sem verificar, o que aconteceria com a informação?\" (1ª formulação — auto-destrói a confiabilidade da informação). \"Expor a privacidade de alguém nas redes é tratá-la como meio?\" (2ª formulação — v",d:"Difícil"}];
const TOTAL = 50;
let answers = {};
let currentFilter = 'all';
let errorsMode = false;

function getVisible(){
  if(errorsMode){
    return QUESTIONS.filter(q=>answers[q.n]!==undefined && answers[q.n]!==q.a);
  }
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(q=>q.d===currentFilter);
}

function renderQuiz(){
  const visible = getVisible();
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  if(!visible.length){
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px;font-family:JetBrains Mono,monospace;font-size:13px;">Nenhuma questão neste filtro.</p>';
    return;
  }
  visible.forEach((q,i)=>{
    const block = document.createElement('div');
    block.className = 'q-block' + (answers[q.n]!==undefined?' answered':'');
    block.id = 'qb-'+q.n;
    const diffClass = q.d==='Fácil'?'diff-easy':q.d==='Média'?'diff-med':'diff-hard';
    const done = answers[q.n]!==undefined;
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(q.n).padStart(2,'0')}</span>
        <span class="q-diff ${diffClass}">${q.d}</span>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="q-opts" id="opts-${q.n}">
        ${q.o.map((o,j)=>{
          let cls='q-opt'+(done?' done':'');
          if(done){
            if(j===q.a) cls+=' correct';
            else if(j===answers[q.n]) cls+=' wrong';
          }
          return `<div class="${cls}" ${!done?`onclick="pick(${q.n},${j})"`:''}>
            <span class="opt-letter">${'ABCD'[j]}</span>
            <span class="opt-text">${o}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="q-feedback ${done?(answers[q.n]===q.a?'fb-correct show':'fb-wrong show'):''}" id="fb-${q.n}">
        <span class="fb-label">${done?(answers[q.n]===q.a?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]):'' }</span>
        <span class="fb-body">${q.c}</span>
      </div>`;
    container.appendChild(block);
  });
}

function pick(qn, optIdx){
  if(answers[qn]!==undefined) return;
  const q = QUESTIONS.find(x=>x.n===qn);
  answers[qn] = optIdx;
  const correct = optIdx===q.a;
  // Style options
  const opts = document.querySelectorAll('#opts-'+qn+' .q-opt');
  opts.forEach(o=>o.classList.add('done'));
  opts[optIdx].classList.add(correct?'correct':'wrong');
  if(!correct) opts[q.a].classList.add('correct');
  // Feedback
  const fb=document.getElementById('fb-'+qn);
  fb.className='q-feedback show '+(correct?'fb-correct':'fb-wrong');
  fb.innerHTML=`<span class="fb-label">${correct?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]}</span><span class="fb-body">${q.c}</span>`;
  document.getElementById('qb-'+qn).classList.add('answered');
  updateStats();
  if(Object.keys(answers).length===TOTAL) finishQuiz();
}

function updateStats(){
  const answered = Object.keys(answers).length;
  let corr = 0;
  QUESTIONS.forEach(q => { if (answers[q.n] === q.a) corr++; });
  const pct = answered ? Math.round(corr / answered * 100) : 0;

  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = corr;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = (answered / TOTAL * 100) + '%';
  document.getElementById('st-pts').textContent = corr;
  document.getElementById('st-fill').style.width = (corr / TOTAL * 100) + '%';
  document.getElementById('st-pct').textContent = pct + '%';

  syncErrorsButton();
}

function finishQuiz(){
  let corr=0;
  QUESTIONS.forEach(q=>{ if(answers[q.n]===q.a) corr++; });
  const pct=Math.round(corr/TOTAL*100);
  const panel=document.getElementById('score-panel');
  panel.classList.add('show');
  const numEl=document.getElementById('sc-num');
  numEl.textContent=corr+'/'+TOTAL;
  numEl.className='sc-number '+(pct>=70?'sc-approved':'sc-failed');
  document.getElementById('sc-pct').textContent=pct+'% de acerto';
  const errs=TOTAL-corr;
  document.getElementById('sc-breakdown').innerHTML=
    `<div class="sc-item"><strong>${corr}</strong>Corretas</div>
     <div class="sc-item"><strong>${errs}</strong>Incorretas</div>
     <div class="sc-item"><strong>${pct}%</strong>Aproveitamento</div>`;
  syncErrorsButton();
  if(errs>0) document.getElementById('sc-review-btn').style.display='inline-block';
  else document.getElementById('sc-review-btn').style.display='none';
  panel.scrollIntoView({behavior:'smooth'});
}

function syncErrorsButton(){
  const errBtn = document.getElementById('err-btn');
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  const answered = Object.keys(answers).length;

  if (errs > 0) {
    errBtn.style.display = 'block';
    errBtn.disabled = false;
    errBtn.textContent = errorsMode ? '↺ Mostrar todas' : '↺ Só erros';
  } else {
    errBtn.style.display = answered === TOTAL ? 'block' : 'none';
    errBtn.disabled = true;
    errBtn.textContent = '↺ Só erros';
  }
}

function resetQuiz(){
  answers={};
  errorsMode=false;
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  syncErrorsButton();
  document.getElementById('hdr-answered').textContent='0';
  document.getElementById('hdr-correct').textContent='0';
  document.getElementById('hdr-pct').textContent='0%';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('st-pts').textContent='0';
  document.getElementById('st-fill').style.width='0%';
  document.getElementById('st-pct').textContent='0%';
  renderQuiz();
  window.scrollTo(0,0);
}

function reviewErrors(){
  errorsMode = true;
  document.getElementById('score-panel').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderQuiz();
syncErrorsButton();
  window.scrollTo(0,0);
}

function setFilter(f, btn){
  currentFilter = f;
  errorsMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
syncErrorsButton();
}

function toggleErrors(){
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  if (!errs) return;
  errorsMode = !errorsMode;
  renderQuiz();
syncErrorsButton();
}

renderQuiz();
syncErrorsButton();

</script>
