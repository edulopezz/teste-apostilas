<style>

:root{

  --red:#c05050;--red2:#e07070;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* HEADER */
.quiz-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:50;flex-wrap:wrap;
}
.qh-back{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text3);text-decoration:none;transition:color .2s;white-space:nowrap;
}
.qh-back:hover{color:var(--gold)}
.qh-title{
  font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold2);
  flex:1;
}
.qh-badge{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--gold);background:rgba(200,164,74,.12);
  padding:3px 10px;border-radius:4px;white-space:nowrap;
}
.qh-stats{
  display:flex;gap:16px;flex-wrap:wrap;
}
.qh-stat{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);
  white-space:nowrap;
}
.qh-stat strong{color:var(--text);font-size:14px}

/* PROGRESS BAR */
.progress-bar{height:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease}

/* FILTERS */
.filter-bar{
  padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-right:4px}
.filter-btn{
  padding:5px 14px;border-radius:4px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-family:'JetBrains Mono',monospace;
  font-size:11px;cursor:pointer;transition:all .15s;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:rgba(200,164,74,.15);border-color:var(--gold);color:var(--gold)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}

}
.toggle-btn:hover{border-color:var(--blue);color:var(--blue)}
.toggle-btn:disabled{opacity:.45;cursor:not-allowed}
.toggle-btn:disabled:hover{border-color:var(--border2);color:var(--text2)}

/* CONTENT */
.quiz-content{padding:24px;max-width:860px;margin:0 auto}

/* QUESTION BLOCK */
.q-block{
  background:var(--bg2);border:1px solid var(--border);

.q-opt.sel{border-color:var(--blue)!important;background:rgba(61,143,209,.08)!important}
.q-opt.correct{border-color:var(--green)!important;background:rgba(61,158,114,.12)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(192,80,80,.08)!important}

}

.q-feedback{

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-correct{background:rgba(61,158,114,.1);border:1px solid rgba(61,158,114,.3);color:var(--green2)}
.fb-wrong{background:rgba(192,80,80,.08);border:1px solid rgba(192,80,80,.25);color:var(--red2)}
.fb-label{

}
.fb-correct .fb-label{color:var(--green)}
.fb-wrong .fb-label{color:var(--red)}

.sc-failed{color:var(--red2)}

.sc-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}

}
.sc-btn-primary{background:var(--gold);color:var(--bg)}
.sc-btn-primary:hover{opacity:.85}
.sc-btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.sc-btn-secondary:hover{border-color:var(--gold);color:var(--gold)}

/* BOTTOM NAV */
.bottom-nav{

}

/* STICKY SCORE */
#sticky{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(17,19,24,.95);border-top:1px solid var(--border);
  backdrop-filter:blur(8px);

#sticky .ss-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}

.ss-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ss-fill{height:100%;background:var(--gold);transition:width .3s}

::-webkit-scrollbar{width:5px}

}

<script>
const QUESTIONS = [{n:1,t:"A teoria política que afirma que a sociedade resulta de um acordo entre indivíduos que saem de um estado pré-político chama-se:",o:["Naturalismo político","Contratualismo","Absolutismo","Republicanismo"],a:1,c:"O contratualismo (teoria do contrato social) postula que a sociedade política resulta de um contrato — real ou hipotético — entre indivíduos que viviam em um estado de natureza pré-político. Os três grandes contratualistas modernos são Hobbes, Locke e Rousseau, que diferem radicalmente na descrição do estado de natureza e no tipo de governo resultante.",d:"Fácil"},{n:2,t:"Para Thomas Hobbes, o estado de natureza é caracterizado como:",o:["Um estado de paz e cooperação natural entre os seres humanos","Uma guerra de todos contra todos, em que a vida é solitária, pobre, sórdida, brutal e curta","Um estado de inocência e bondade natural, corrompido pela civilização","Uma situação de paz instável, em que falta apenas um juiz comum para resolver disputas"],a:1,c:"A descrição hobbesiana do estado de natureza é a mais pessimista dos três contratualistas: sem autoridade comum, os seres humanos competem por recursos escassos numa guerra permanente. A frase \"vida solitária, pobre, sórdida, brutal e curta\" (*Leviatã*, Cap. XIII) é a síntese mais famosa. A alternativa C descreve Rousseau; D descreve Locke.",d:"Fácil"},{n:3,t:"John Locke identificou três direitos naturais fundamentais que os seres humanos possuem antes e independentemente do Estado:",o:["Liberdade, igualdade e fraternidade","Vida, liberdade e propriedade","Segurança, prosperidade e felicidade","Fé, razão e tradição"],a:1,c:"Para Locke, os seres humanos possuem por natureza (independentemente de qualquer governo) os direitos à vida, à liberdade e à propriedade. O governo é criado para *proteger* esses direitos — não para criá-los. Esses três direitos influenciaram diretamente a Declaração de Independência americana (1776): \"vida, liberdade e busca da felicidade\" — Jefferson adaptou \"propriedade\" por \"busca da felicidade\".",d:"Fácil"},{n:4,t:"Rousseau afirmou que \"o homem nasceu livre, e por toda parte se encontra acorrentado.\" Essa afirmação expressa a ideia de que:",o:["A liberdade natural foi destruída pela civilização e pelas instituições sociais injustas","A liberdade só existe no Estado — antes dele, o ser humano era escravo da natureza","A escravidão é um fenômeno universal e inevitável em qualquer sociedade","A liberdade é uma ilusão — o ser humano sempre foi determinado pelas suas paixões"],a:0,c:"Esta é a abertura de *Do Contrato Social* (1762). Para Rousseau, o ser humano nasceu livre e bom — mas a civilização, especialmente a propriedade privada e as instituições sociais que a protegem, corrompeu essa liberdade natural e criou desigualdade e dependência. As \"correntes\" são as instituições sociais injustas — não a natureza.",d:"Fácil"},{n:5,t:"O filósofo que propôs a separação dos poderes políticos em Legislativo, Executivo e Judiciário como garantia contra a tirania foi:",o:["John Locke","Thomas Hobbes","Jean-Jacques Rousseau","Montesquieu"],a:3,c:"Montesquieu desenvolveu a teoria da tripartição dos poderes em *O Espírito das Leis* (1748). Seu princípio: \"Só o poder freia o poder\" — a concentração dos três poderes em um único titular gera tirania; sua separação e equilíbrio garantem a liberdade. Locke (A) já havia distinguido legislativo e executivo, mas a tripartição completa (incluindo o judiciário independente) é de Montesquieu.",d:"Fácil"},{n:6,t:"Para Aristóteles, a razão pela qual o ser humano é \"por natureza um animal político\" é que:",o:["O ser humano é naturalmente agressivo e precisa de controle político","A *polis* é o único ambiente em que o ser humano pode realizar plenamente sua natureza racional e social","O ser humano foi criado pelos deuses para viver em comunidade política","A política é uma invenção humana racional para superar o estado de natureza"],a:1,c:"Para Aristóteles, a *polis* não é uma necessidade imposta externamente — é o ambiente *natural* do florescimento humano. Fora da comunidade política, o ser humano é, como Aristóteles diz, \"uma besta ou um deus\" — não realiza sua natureza. Isso é o oposto do contratualismo: a política não é criação artificial (D), mas realização da natureza humana.",d:"Fácil"},{n:7,t:"No contrato social hobbesiano, os indivíduos renunciam:",o:["Apenas ao direito de fazer guerra — mantendo todos os outros direitos naturais","A alguns de seus direitos naturais, mantendo vida, liberdade e propriedade","A todos os seus direitos naturais, transferindo poder total ao soberano","Apenas ao direito de autojustiça, mantendo todos os demais"],a:2,c:"Hobbes é o mais radical dos contratualistas nesse ponto: os indivíduos renunciam a *todos* os seus direitos naturais (no estado de natureza, cada um tem direito a tudo) e transferem todo o poder a um soberano. Isso justifica o poder absoluto do soberano: ele recebeu tudo, logo não pode ser limitado. Locke (B) é o que mantém direitos naturais que o governo deve proteger.",d:"Fácil"},{n:8,t:"A **vontade geral** de Rousseau difere da **vontade de todos** porque:",o:["A vontade de todos é a vontade da maioria; a geral é a vontade da minoria esclarecida","A vontade geral visa o bem comum da comunidade; a vontade de todos é a soma dos interesses particulares","A vontade geral é a expressão da razão divina; a de todos é a expressão da razão humana","São sinônimas — Rousseau usa os termos de forma intercambiável"],a:1,c:"A distinção é central em Rousseau: a vontade de todos é a soma aritmética do que cada indivíduo quer (muitas vezes interesses egoístas e contraditórios). A vontade geral é o que a comunidade realmente precisa para o bem comum — pode diferir do que a maioria quer em determinado momento. Uma democracia pode ter vontade de todos (maioria querendo algo injusto) sem ter vontade geral (o bem comum).",d:"Fácil"},{n:9,t:"Para Locke, o direito de propriedade tem seu fundamento em:",o:["A vontade do soberano — a propriedade é criada pelo Estado","O trabalho — quem mistura seu trabalho com recursos naturais torna-os seus","A herança — a propriedade é transmitida pela linhagem familiar","O contrato social — a propriedade é convencionada pela comunidade"],a:1,c:"A teoria lockiana da propriedade (*labor theory of property*): no estado de natureza, os recursos são comuns, mas ao aplicar trabalho a um recurso natural, o indivíduo mistura algo seu (seu trabalho) a ele, tornando-o propriedade sua. Isso fundamenta a propriedade privada como direito natural — anterior ao Estado e que o Estado deve proteger. Marx posteriormente criticou essa teoria.",d:"Fácil"},{n:10,t:"Para Rousseau, a principal causa da corrupção humana e da desigualdade social foi:",o:["A natureza humana egoísta e competitiva","A propriedade privada e a civilização que a acompanha","A fraqueza da razão diante das paixões naturais","A ausência de uma autoridade política forte e centralizada"],a:1,c:"No *Discurso sobre a Origem da Desigualdade* (1755), Rousseau afirma que o primeiro que cercou um terreno e disse \"isto é meu\" foi o fundador de todas as mazelas sociais. A propriedade privada introduz a comparação, a inveja, o *amour-propre* (amor-próprio competitivo) — destruindo a inocência natural. A civilização não aperfeiçoa — corrompe.",d:"Fácil"},{n:11,t:"O soberano hobbesiano possui poder absoluto porque:",o:["Foi eleito democraticamente pela maioria dos cidadãos","Recebeu todo o poder dos indivíduos pelo contrato — logo não está sujeito ao contrato que os súditos fizeram entre si","É o mais virtuoso e sábio entre os cidadãos","Representa a vontade geral da comunidade política"],a:1,c:"No contrato hobbesiano, os indivíduos fazem um contrato *entre si* — transferindo seu poder ao soberano. O soberano *não faz parte* desse contrato — ele o recebe, mas não é signatário. Logo, não está obrigado pelas cláusulas do contrato que os súditos fizeram. Isso justifica o poder absoluto: o soberano não tem obrigação contratual com os súditos — apenas a obrigação natural de manter a paz (para a qual foi criado).",d:"Fácil"},{n:12,t:"A **Revolução Gloriosa** inglesa de 1688, que destituiu o rei absolutista e instaurou a monarquia constitucional, é o evento histórico que corresponde diretamente à teoria política de:",o:["Thomas Hobbes","Jean-Jacques Rousseau","John Locke","Montesquieu"],a:2,c:"Locke escreveu os *Dois Tratados sobre o Governo* justamente para justificar a Revolução Gloriosa (1688). Seu argumento: quando o rei viola os direitos naturais dos cidadãos (como Jaime II havia feito), o povo tem o direito de destituí-lo e recontratar com outro governante. A teoria lockiana do direito de revolução é a justificativa filosófica da Revolução Gloriosa.",d:"Fácil"},{n:13,t:"A Constituição Federal brasileira de 1988 consagra, no seu artigo 2º, a tripartição dos poderes. Essa estrutura tem origem filosófica em:",o:["Thomas Hobbes — que defendia a separação dos poderes para evitar o absolutismo","Montesquieu — cuja teoria da separação dos poderes influenciou todas as constituições democráticas modernas","Rousseau — cuja vontade geral fundamenta a soberania parlamentar","Locke — que criou a tripartição completa em legislativo, executivo e judiciário"],a:1,c:"A tripartição dos poderes (Legislativo, Executivo, Judiciário) é de Montesquieu (*O Espírito das Leis*, 1748). Influenciou a Constituição americana (1787) e, através dela e diretamente, as constituições democráticas modernas — incluindo a CF/88. Locke (D) havia distinguido apenas legislativo e executivo; a inclusão do judiciário como poder independente é de Montesquieu.",d:"Fácil"},{n:14,t:"O naturalismo político de Aristóteles difere do contratualismo moderno principalmente porque:",o:["Aristóteles acreditava que o Estado é uma criação racional; os contratualistas acreditavam que é natural","Para Aristóteles, a comunidade política é natural e anterior ao indivíduo; para os contratualistas, o indivíduo é anterior e a comunidade é convencional","Aristóteles defendia a democracia; os contratualistas defendiam a monarquia","Aristóteles não reconhecia direitos individuais; os contratualistas os reconheciam como criações do Estado"],a:1,c:"Esta é a distinção fundamental. Para Aristóteles: a *polis* é natural — o ser humano sempre foi social; a comunidade é anterior às partes. Para os contratualistas: os indivíduos são anteriores — existiam num estado de natureza pré-político e criaram a sociedade por contrato. Essa diferença tem implicações para toda a teoria política: autoridade vem da natureza ou do consentimento?",d:"Fácil"},{n:15,t:"Rousseau defende a soberania popular como **inalienável** e **indivisível**. Isso implica que:",o:["A soberania pode ser delegada a representantes eleitos sem perda de sua essência","A soberania não pode ser transferida a representantes — o povo deve governar diretamente","A soberania é dividida entre os três poderes do Estado","A soberania pertence ao rei, que a exerce em nome do povo"],a:1,c:"Rousseau rejeita a representação política: a soberania (vontade geral) não pode ser representada — só pode ser expressa. \"Os ingleses pensam ser livres, mas enganam-se: só são livres durante a eleição dos membros do parlamento; desde que estes são eleitos, o povo é escravo — não é nada.\" A soberania popular deve ser exercida diretamente, não delegada. Isso o coloca em conflito com o sistema parlamentar liberal de Locke.",d:"Fácil"},{n:16,t:"A diferença entre o **amour de soi** (amor de si) e o **amour-propre** (amor-próprio) em Rousseau é fundamental para entender sua teoria da corrupção porque:",o:["O amor de si é natural e saudável (autopreservação); o amor-próprio é social e corruptor (vaidade comparativa)","O amor de si é egoísta; o amor-próprio é altruísta","Ambos são naturais — a distinção é apenas terminológica","O amor-próprio é virtuoso; o amor de si é vicioso e deve ser superado"],a:0,c:"*Amour de soi*: sentimento natural de autopreservação — não implica comparação com outros. É saudável e natural. *Amour-propre*: sentimento social de querer ser admirado e superior aos outros — implica comparação, competição e inveja. É introduzido pela civilização. Essa distinção é central: a civilização não desenvolveu o ser humano — substituiu um sentimento saudável (amor de si) por um corruptor (amor-próprio).",d:"Média"},{n:17,t:"A teoria lockiana do direito de revolução afirma que o povo tem o direito de destituir o governo quando:",o:["A maioria da população discorda das políticas governamentais","O governo viola sistematicamente os direitos naturais dos cidadãos (vida, liberdade, propriedade)","Um governo mais capaz e eficiente está disponível para substituí-lo","A economia do país apresenta resultados negativos por mais de dois anos"],a:1,c:"O direito de revolução lockiano tem uma condição específica: quando o governo viola sistematicamente os direitos naturais que foi criado para proteger. Não é qualquer desacordo (A) — é a violação fundamental do propósito do contrato social. Locke distingue o governo que comete erros (tolerável) do governo que degenera em tirania (que justifica a revolução).",d:"Média"},{n:18,t:"A posição de Hobbes sobre a moral — de que no estado de natureza \"não há noções de certo e errado, justiça e injustiça\" — implica que para Hobbes:",o:["A moral é uma ilusão — não existe em nenhuma circunstância","A moral e a justiça são criações do poder soberano — só existem onde há lei e autoridade","A moral natural é superior à moral positiva criada pelo soberano","Todos os seres humanos conhecem naturalmente a lei moral pela razão"],a:1,c:"O positivismo moral hobbesiano é radical: sem soberano que defina o que é justo e injusto, não há moral objetiva. O certo e o errado são criações do poder político — da lei positiva do soberano. Isso contrasta diretamente com Locke, para quem a lei natural (moral) existe *antes* do Estado e é o critério pelo qual julgamos o Estado.",d:"Média"},{n:19,t:"A crítica de Rousseau à representação política parlamentar baseia-se em que:",o:["Os parlamentares são sempre corruptos e servem a interesses privados","A soberania (vontade geral) não pode ser representada — ao delegar o voto, o cidadão perde sua liberdade política","O parlamento é uma instituição desnecessária em governos com líderes virtuosos","A representação é aceitável desde que os representantes sejam periodicamente revogáveis"],a:1,c:"A crítica de Rousseau é filosófica, não moral (A): a vontade geral, por ser a expressão da soberania do povo, não pode ser alienada ou transferida. Quando o cidadão delega seu voto a um representante, ele cede sua soberania — e deixa de ser politicamente livre. A liberdade política genuína é participação direta, não representação. Essa posição influenciou o pensamento democrático radical e o republicanismo participativo.",d:"Média"},{n:20,t:"O conceito hobbesiano de **soberania** difere radicalmente do conceito lockiano porque, para Hobbes:",o:["A soberania deriva do consentimento dos governados e pode ser revogada","A soberania é absoluta, irrevogável e não sujeita às leis que o soberano cria","A soberania é dividida entre o soberano e o parlamento para garantir o equilíbrio","A soberania pertence ao povo e é apenas delegada ao soberano temporariamente"],a:1,c:"Para Hobbes, o soberano não faz parte do contrato — recebe o poder dos contratantes, mas não está sujeito às obrigações do contrato. Não há lei que limite o soberano: ele é a fonte da lei. Para Locke, o governo *é* parte de um contrato (tácito com a sociedade), está sujeito a condições, e pode ser revogado se as violar. A diferença é o fundamento teórico do absolutismo (Hobbes) vs. o liberalismo constitucional (Locke).",d:"Média"},{n:21,t:"A influência de Locke sobre a **Declaração de Independência dos Estados Unidos** (1776) é evidente na afirmação de que todos têm direitos inalienáveis de \"vida, liberdade e busca da felicidade\". A diferença em relação a Locke é que Thomas Jefferson substituiu:",o:["\"Liberdade\" por \"busca da felicidade\"","\"Propriedade\" por \"busca da felicidade\"","\"Vida\" por \"busca da felicidade\"","\"Igualdade\" por \"busca da felicidade\""],a:1,c:"Locke formulou os três direitos naturais como \"vida, liberdade e **propriedade**\". Jefferson, ao redigir a Declaração de Independência, manteve vida e liberdade mas substituiu \"propriedade\" por \"busca da felicidade\" — numa formulação mais ampla e inclusiva. Isso tem implicações políticas significativas: a propriedade lockiana era um direito natural; a \"busca da felicidade\" de Jefferson é mais aberta a diferentes interpretações.",d:"Média"},{n:22,t:"A doutrina do \"bom selvagem\", frequentemente associada a Rousseau, é na verdade uma:",o:["Afirmação literal de que os povos indígenas são moralmente superiores aos europeus","Simplificação — Rousseau não usa a expressão \"bom selvagem\" e sua posição é mais sutil: o ser humano natural não é corrupto pela civilização, mas também não é um ser acabado","Teoria antropológica baseada em observações diretas dos povos nativos americanos","Expressão da crença de Rousseau na superioridade racial dos povos não-europeus"],a:1,c:"\"Bom selvagem\" é uma simplificação popular atribuída a Rousseau, mas ele nunca usou essa expressão. Sua posição é mais sutil: o ser humano no estado de natureza não é civilizado — mas também não é corrupto. É um ser incompleto, com potencial tanto para o bem quanto para o mal. A corrupção vem das instituições sociais injustas, não da natureza humana em si. Rousseau também nunca romantizou os povos indígenas específicos — seu \"estado de natureza\" é uma construção hipotética, n",d:"Média"},{n:23,t:"Para Montesquieu, a liberdade política não é \"fazer tudo o que se quer\", mas sim:",o:["A capacidade de fazer tudo o que a lei permite e não ser obrigado a fazer o que ela não ordena","A ausência de qualquer restrição ao comportamento individual","O direito de participar diretamente de todas as decisões políticas","A submissão à vontade geral expressa pela maioria"],a:0,c:"Montesquieu define liberdade política como o direito de fazer tudo o que as leis permitem: \"Se um cidadão pudesse fazer o que as leis proíbem, não teria mais liberdade, porque os outros também teriam esse poder.\" A liberdade não é ausência de lei — é o império da lei aplicada igualmente a todos. Isso contrasta com Rousseau (C: participação direta) e com o libertarismo moderno (B: ausência de restrições).",d:"Média"},{n:24,t:"A afirmação de que \"no estado de natureza não existe propriedade, mas apenas posse baseada na força\" é característica da posição de:",o:["John Locke","Thomas Hobbes","Jean-Jacques Rousseau","Aristóteles"],a:1,c:"Para Hobbes, no estado de natureza não há \"meu\" e \"teu\" — cada um tem direito a tudo o que pode alcançar e manter pela força. A propriedade como direito legítimo e protegido só existe após o contrato social, quando o soberano cria e garante o sistema jurídico que define a propriedade. Para Locke (A), a propriedade já existe no estado de natureza — fundada no trabalho. Para Rousseau (C), a propriedade privada é a raiz de todos os males — mas existia antes do Estado (e deveria ",d:"Média"},{n:25,t:"A crítica contemporânea ao contratualismo — especialmente a formulada pelos **comunitaristas** (Alasdair MacIntyre, Michael Sandel, Charles Taylor) — aponta que:",o:["O contrato social é uma teoria historicamente comprovada — realmente houve um momento em que os humanos decidiram criar a sociedade","O indivíduo atomístico dos contratualistas é uma abstração — os seres humanos sempre estão inseridos em comunidades, tradições e práticas que os constituem previamente","O contratualismo é excessivamente coletivista — deveria dar mais peso aos direitos individuais","A teoria do contrato social é apenas uma metáfora sem valor filosófico real"],a:1,c:"O comunitarismo (MacIntyre, Sandel, Taylor — séc. XX) retoma elementos do naturalismo aristotélico contra o individualismo contratualista: os seres humanos não são indivíduos atomizados que precedem a comunidade — são constituídos pela linguagem, tradição, práticas e vínculos comunitários. Não há um \"eu\" pré-social que escolhe entrar no contrato. Esta é uma das críticas filosóficas mais importantes ao liberalismo lockiano e rawlsiano.",d:"Média"},{n:26,t:"A distinção que Montesquieu faz entre **leis naturais** e **leis positivas** é importante porque:",o:["As leis positivas valem mais do que as naturais — o Estado pode mudar qualquer lei natural","As leis positivas (criadas pelos Estados) devem ser adequadas ao \"espírito\" da nação — seus costumes, clima, história e economia — não podendo ser simplesmente copiadas de outros povos","As leis naturais são universais; as positivas são irracionais e devem ser eliminadas","As leis positivas e naturais são idênticas — Montesquieu não distingue os dois tipos"],a:1,c:"*O Espírito das Leis* é uma obra de sociologia política avant la lettre: Montesquieu argumenta que as leis positivas de cada nação devem estar adequadas ao seu contexto específico — clima, história, costumes, economia, religião. O que funciona para a Inglaterra pode não funcionar para a França ou para o Brasil. Essa é uma crítica ao universalismo político ingênuo e uma antecipação do pensamento sociológico.",d:"Média"},{n:27,t:"O paradoxo central do contrato social de Rousseau — \"como ser livre e ao mesmo tempo obedecer a leis\" — é resolvido pela ideia de que:",o:["A obediência às leis é sempre uma restrição da liberdade — um mal necessário","Ao obedecer à vontade geral, cada cidadão obedece à lei que ele mesmo, como membro do corpo político, deu a si","A liberdade só existe no estado de natureza — na sociedade, a liberdade é sempre relativa","O soberano liberta os cidadãos ao criar leis que os protegem das paixões naturais"],a:1,c:"A solução rousseauniana ao paradoxo é análoga à autonomia moral kantiana: ao obedecer à vontade geral, o cidadão obedece à lei que ele mesmo, como parte do soberano coletivo, formulou. Não é heteronomia (lei imposta de fora) — é autonomia coletiva (lei que o próprio povo deu a si mesmo). Quem viola a vontade geral está contradizendo sua própria vontade mais profunda como cidadão.",d:"Média"},{n:28,t:"A teoria política de Hobbes pode ser considerada paradoxalmente **moderna** e **racional** mesmo justificando o absolutismo porque:",o:["Hobbes apela à autoridade divina para justificar o soberano absoluto","Hobbes fundamenta a autoridade política não em Deus ou tradição, mas na razão e no interesse próprio dos indivíduos — o absolutismo é a escolha racional para escapar do estado de natureza","Hobbes demonstra que o absolutismo é o sistema mais democrático possível","Hobbes fundamenta o absolutismo na virtude superior do soberano"],a:1,c:"O paradoxo hobbesiano: o filósofo mais \"pessimista\" sobre a natureza humana produz a justificativa mais \"racional\" do absolutismo. Ele não diz \"obedeça ao rei porque Deus o quis\" — diz \"obedeça ao soberano porque *você*, ser racional, escolheria isso para escapar do estado de guerra.\" É o absolutismo justificado pelo contrato e pelo interesse — não pela tradição ou religião. Isso é genuinamente moderno.",d:"Média"},{n:29,t:"A influência de Rousseau sobre a **Revolução Francesa** (1789) manifesta-se principalmente na ideia de:",o:["Monarquia constitucional como forma de governo ideal","Soberania popular e vontade geral como fundamento da república","Separação de poderes como garantia das liberdades individuais","Direitos naturais de vida, liberdade e propriedade como limite ao poder do Estado"],a:1,c:"\"Liberdade, igualdade, fraternidade\" — o lema da Revolução Francesa é rousseauniano em espírito. A soberania pertence ao povo (não ao rei por direito divino); a vontade geral é o fundamento da república; a igualdade política é valor fundamental. A alternativa C (separação de poderes) é de Montesquieu; D (direitos naturais) é de Locke. A Revolução Francesa absorveu os três, mas Rousseau foi a influência ideológica mais direta sobre os republicanos radicais (jacobinos).",d:"Média"},{n:30,t:"A teoria do **consentimento tácito** de Locke — segundo a qual viver em um Estado implica consentir com sua autoridade — foi criticada porque:",o:["Demonstra que Locke era favorável ao absolutismo, contrariando sua reputação liberal","Alguém que vive num Estado sem alternativa real de emigrar não está realmente \"consentindo\" — é uma ficção que justifica a obrigação política sem consentimento genuíno","O consentimento tácito é mais legítimo que o expresso — Locke acertou na crítica","O consentimento só é válido se expresso por escrito — Locke errou ao aceitar o tácito"],a:1,c:"A crítica ao consentimento tácito (desenvolvida por filósofos como Hume e, contemporaneamente, por A. John Simmons) é poderosa: se \"consentir\" significa simplesmente viver num território, e se a alternativa (emigrar) é economicamente ou praticamente impossível para a maioria, então o \"consentimento\" é fictício. Isso enfraquece o fundamento contratualista lockiano da obrigação política.",d:"Média"},{n:31,t:"Para Hobbes, o único caso em que um súdito pode legitimamente resistir ao soberano é quando:",o:["O soberano governa injustamente, violando os direitos naturais","A maioria dos cidadãos concorda que o soberano deve ser deposto","O soberano ameaça a própria vida do súdito — pois o direito à autopreservação é inalienável","O soberano viola as leis naturais estabelecidas por Deus"],a:2,c:"O limite da obediência hobbesiana está no direito à autopreservação: a razão pela qual os indivíduos criaram o soberano é para proteger suas vidas. Se o soberano ameaça a vida do próprio súdito (manda executá-lo), o contrato perde sentido — e o súdito tem o direito de resistir. Esse é o único limite ao absolutismo hobbesiano, e é muito estreito: não inclui injustiças gerais, apenas ameaças à própria vida.",d:"Média"},{n:32,t:"A teoria política de **John Rawls** (séc. XX), especialmente o conceito de \"véu de ignorância\", é frequentemente descrita como um neokantianismo ou neocontratualismo porque:",o:["Rawls reviveu literalmente o contrato social de Hobbes numa formulação contemporânea","Rawls usa um dispositivo hipotético (escolha por pessoas que não sabem sua posição na sociedade) para derivar princípios de justiça — herdando a estrutura contratualista lockiana/kantiana","Rawls propõe que os cidadãos se reúnam fisicamente para assinar um contrato social","Rawls rejeita completamente o contratualismo e propõe uma teoria baseada no utilitarismo"],a:1,c:"Rawls (*Uma Teoria da Justiça*, 1971) usa um \"contrato hipotético\" sob o \"véu de ignorância\": imagine que você vai escolher os princípios de justiça de uma sociedade sem saber qual será sua posição nela (rico, pobre, branco, negro, homem, mulher). O que escolheria? Essa situação hipotética (não um contrato histórico real) é herdeira da tradição contratualista — especialmente Locke e Kant. É o contratualismo mais influente do séc. XX.",d:"Média"},{n:33,t:"A distinção entre **república** e **democracia** em Rousseau (e na tradição republicana) é que:",o:["República é governada por representantes eleitos; democracia é governada diretamente pelo povo","Rousseau usa os termos de forma idêntica — ambos significam governo do povo","República é o nome do regime ideal em que a vontade geral é soberana, independentemente da forma específica de governo; democracia é uma forma específica (governo direto)","República é a forma corrompida da democracia — quando os representantes traem o povo"],a:2,c:"Em Rousseau, \"república\" é o regime legítimo — aquele em que a lei (expressão da vontade geral) é soberana. Pode ter formas diferentes de governo (democracia direta, aristocracia eletiva). A \"democracia\" em sentido estrito (governo direto de todos sobre todos) é, para Rousseau, apenas uma das formas possíveis — e não necessariamente a melhor para todos os povos. O que é essencial é que a *soberania* pertença ao povo, independentemente de como o *governo* é organizado.",d:"Média"},{n:34,t:"A afirmação de Montesquieu de que \"para que não se possa abusar do poder, é preciso que, pela disposição das coisas, o poder freie o poder\" fundamenta qual princípio político?",o:["A soberania popular inalienável","O direito de revolução","A separação e equilíbrio dos poderes como garantia da liberdade","O absolutismo esclarecido do soberano virtuoso"],a:2,c:"Esta é a formulação mais precisa do princípio da separação de poderes em Montesquieu: não basta ter leis boas — é preciso que o poder seja estruturalmente impedido de se concentrar. Só o poder freia o poder. Os três poderes (legislativo, executivo, judiciário) devem ser independentes e capazes de se controlar mutuamente — sistema de \"freios e contrapesos\" (*checks and balances*) que influenciou a Constituição americana.",d:"Média"},{n:35,t:"A crítica de Rousseau à propriedade privada como raiz da desigualdade foi desenvolvida posteriormente por **Karl Marx**, que argumentou que:",o:["A propriedade privada é um direito natural que deve ser protegido pelo Estado","A propriedade privada dos meios de produção é a base da exploração capitalista e da desigualdade de classes — e deve ser abolida","A propriedade privada é inevitável em qualquer sociedade humana — Rousseau estava errado","A desigualdade tem origem racial, não econômica — Marx e Rousseau divergem completamente"],a:1,c:"Rousseau → Marx é uma linha de influência direta: ambos identificam a propriedade privada como raiz fundamental da desigualdade e da injustiça social. Marx radicaliza: não é simplesmente a propriedade em geral, mas especificamente a propriedade *privada dos meios de produção* que gera a exploração do trabalho assalariado e a desigualdade de classes. O socialismo marxista é, em certo sentido, o desdobramento da crítica rousseauniana à propriedade.",d:"Média"},{n:36,t:"Considere as afirmações:  I. Para Hobbes, o soberano pode ser destituído pela maioria dos cidadãos quando governa mal. II. Para Locke, os direitos naturais existem antes e independentemente do Estado. III. Para Rousseau, a soberania pode ser representada por parlamentares eleitos.  Estão corretas:",o:["Apenas II","Apenas I e II","Apenas II e III","I, II e III"],a:0,c:"I é **falsa**: para Hobbes, o soberano *não pode* ser destituído — exceto se ameaçar a vida do súdito. O contrato é irrevogável. II é **verdadeira**: os direitos naturais (vida, liberdade, propriedade) existem no estado de natureza — antes e independentemente do governo. III é **falsa**: Rousseau rejeitou explicitamente a representação política — a soberania (vontade geral) é inalienável e indivisível, não pode ser delegada a representantes.",d:"Difícil"},{n:37,t:"O contratualismo moderno foi criticado por **David Hume** com o argumento de que:",o:["O contrato social é uma excelente teoria normativa, mas historicamente implausível","A obrigação política não deriva de nenhum contrato histórico (que nunca ocorreu) nem de consentimento tácito (que é fictício) — mas do hábito e da utilidade da obediência ao governo estabelecido","O contratualismo é correto, mas apenas Locke formulou a versão adequada","A única justificativa válida para a autoridade política é a revelação divina"],a:1,c:"Hume formulou uma das críticas mais poderosas ao contratualismo em *Do Contrato Original* (1748): nenhum contrato social original aconteceu historicamente; o consentimento tácito é uma ficção para quem não tem alternativa real. O que realmente fundamenta a obrigação de obedecer ao governo é o *hábito* de obediência e a *utilidade* prática de ter um governo estável. Essa crítica empirista ao contratualismo influenciou profundamente o pensamento político posterior.",d:"Difícil"},{n:38,t:"A tensão entre a **vontade geral** de Rousseau e o **totalitarismo** foi apontada por pensadores como J.L. Talmon (*As Origens da Democracia Totalitária*) porque:",o:["Rousseau defendia explicitamente regimes totalitários como a única forma de realizar a vontade geral","A ideia de uma vontade geral que pode forçar os indivíduos a serem \"livres\" contém o germe do totalitarismo: uma vanguarda pode afirmar conhecer a vontade geral e impô-la mesmo contra a vontade de todos","A soberania popular rousseauniana é incompatível com qualquer forma de democracia","Rousseau propunha a abolição de todos os direitos individuais em favor do bem coletivo"],a:1,c:"Talmon identificou o paradoxo perigoso em Rousseau: se a vontade geral é o bem objetivo da comunidade (e pode diferir do que todos querem), quem decide o que é a vontade geral? Uma liderança que afirme conhecê-la pode impor sua vontade em nome do \"bem comum\" — \"forçando as pessoas a serem livres\" (frase do próprio Rousseau). Isso foi usado pelos jacobinos na Revolução Francesa e tem estrutura análoga às ideologias totalitárias do séc. XX. Rousseau não era totalitário, mas sua",d:"Difícil"},{n:39,t:"A teoria do **estado de natureza** como dispositivo metodológico nos contratualistas é melhor descrita como:",o:["Uma afirmação histórica de que houve um momento em que os humanos viveram sem sociedade","Uma ficção científica — os contratualistas sabiam que era inventada para fins narrativos","Um experimento mental hipotético para identificar o que é \"natural\" no ser humano e o que é criação social/política","Uma metáfora religiosa baseada no Paraíso e na Queda descritos no Gênesis"],a:2,c:"O estado de natureza não é (para a maioria dos contratualistas) uma afirmação histórica sobre o passado da humanidade — é um dispositivo analítico: \"Se tirássemos todas as instituições sociais e políticas, o que restaria? O que é fundamentalmente humano?\" As diferentes respostas (Hobbes: guerra; Locke: paz racional; Rousseau: bondade natural) revelam diferentes concepções da natureza humana — que determinam diferentes teorias políticas. É como um experimento mental filosófico",d:"Difícil"},{n:40,t:"A teoria da **lei natural** de Locke diferencia-se da lei natural de **Tomás de Aquino** porque:",o:["Para Locke, a lei natural é revelada por Deus; para Tomás, é derivada da razão","Para Locke, a lei natural é acessível pela razão de todos os seres humanos e funda direitos individuais; para Tomás, a lei natural é parte da lei eterna de Deus e fundamenta a ordem hierárquica da sociedade","Para Locke, a lei natural exige obediência ao rei; para Tomás, exige desobediência às leis injustas","Locke e Tomás têm a mesma concepção de lei natural — apenas a aplicam em contextos diferentes"],a:1,c:"Ambos reconhecem a lei natural racional — mas com ênfases diferentes. Para Tomás: a lei natural é parte da lei eterna de Deus, fundamenta a ordem hierárquica da sociedade (cada um no seu lugar natural), e justifica a autoridade política como bem comum. Para Locke: a lei natural é racional (todos podem conhecê-la), fundamenta direitos individuais inalienáveis, e justifica a *resistência* ao governo que os viola. A lei natural lockiana é mais individualista e igualitária.",d:"Difícil"},{n:41,t:"O **federalismo** americano, elaborado nos *Federalist Papers* (Madison, Hamilton, Jay — 1787–1788), combina influências de:",o:["Apenas Hobbes — o soberano federal como Leviatã que controla os Estados","Montesquieu (separação de poderes e freios e contrapesos), Locke (direitos naturais e governo limitado) e a experiência republicana romana","Apenas Rousseau — a soberania popular direta exercida pelos cidadãos americanos","Apenas o empirismo de Hume — sem fundamento contratualista"],a:1,c:"Os *Federalist Papers* são um dos grandes textos da filosofia política aplicada. Combinam: Montesquieu (separação e equilíbrio de poderes entre os três ramos federais e entre federal e estadual); Locke (direitos inalienáveis como limite ao governo, legitimidade baseada no consentimento); tradição republicana clássica (Cícero, Polybius — governo misto). Hobbes (A) é minimamente presente — o federalismo americano é fundamentalmente anti-absolutista.",d:"Difícil"},{n:42,t:"A posição de Aristóteles de que \"é natural que alguns homens sejam escravos\" foi usada historicamente para justificar a escravidão. A crítica filosófica mais adequada a essa posição é que:",o:["Aristóteles estava descrevendo um fato histórico, não fazendo uma prescrição moral","O argumento naturalista de Aristóteles é circular: define como \"naturalmente escravos\" exatamente aqueles que a sociedade grega havia escravizado — tornando a \"natureza\" um reflexo das convenções","Aristóteles estava certo — a escravidão é uma instituição natural em sociedades pré-industriais","A posição de Aristóteles sobre escravidão invalida toda a sua filosofia política"],a:1,c:"Esta é a crítica filosófica mais precisa à \"escravidão natural\" de Aristóteles: ele define como \"naturalmente escravo\" quem é capaz de reconhecer a razão alheia mas não desenvolvê-la plenamente. Mas quem são esses seres? Exatamente os que a sociedade grega já havia escravizado — bárbaros e prisioneiros de guerra. O \"natural\" é na verdade o convencional disfarçado de natureza. Este é um exemplo clássico de como o naturalismo pode ser usado para naturalizar injustiças sociais a",d:"Difícil"},{n:43,t:"O conceito de **desobediência civil** — desenvolvido por Thoreau (séc. XIX) e praticado por Gandhi e Martin Luther King (séc. XX) — tem raízes filosóficas mais próximas de:",o:["Hobbes — que justificou a resistência ao soberano em nome da autopreservação","Locke — que estabeleceu o direito de resistência quando o governo viola direitos naturais","Rousseau — que defendeu a vontade geral contra as leis injustas da maioria","Montesquieu — que propôs a separação de poderes como garantia da liberdade"],a:1,c:"A desobediência civil tem estrutura lockiana: quando o governo viola direitos fundamentais (direitos civis dos negros americanos; a lei do sal na Índia colonial), os cidadãos têm o direito — e o dever moral — de resistir, desobedecer às leis injustas e reformar o governo. King citou explicitamente a tradição do direito natural (Locke, Aquino) como fundamento da desobediência civil não-violenta. Hobbes (A) *limitaria* ao máximo a resistência; Rousseau (C) tem uma estrutura dif",d:"Difícil"},{n:44,t:"Um professor de Filosofia no EF Anos Finais quer trabalhar o debate contratualismo-naturalismo conectando-o ao contexto brasileiro. A melhor abordagem pedagógica é:",o:["Apresentar apenas a posição de Hobbes como a mais relevante para entender o Estado brasileiro","Usar a Constituição Federal de 1988 (art. 1º — soberania popular; art. 2º — separação de poderes) como texto-âncora para identificar as heranças de Rousseau (soberania popular), Montesquieu (separação de poderes) e Locke (direitos fundamentais) no Estado brasileiro","Evitar o tema por ser excessivamente abstrato e distante da realidade dos alunos","Limitar a discussão à história europeia dos séculos XVII-XVIII, sem conexão com o Brasil"],a:1,c:"Esta questão de transposição didática conecta filosofia política à realidade institucional brasileira. A CF/88 é um texto filosófico aplicado: o art. 1º (\"Todo poder emana do povo\") é rousseauniano; o art. 2º (tripartição dos poderes) é de Montesquieu; os direitos fundamentais do art. 5º têm raízes lockianas. Usar a Constituição como texto-âncora torna o conteúdo filosófico imediatamente relevante para a formação cidadã — objetivo central da BNCC.",d:"Difícil"},{n:45,t:"A afirmação de Locke de que os seres humanos no estado de natureza são governados pela **lei natural racional** — que todos podem conhecer — pressupõe uma visão da razão que é:",o:["Elitista — apenas filósofos e sábios podem conhecer a lei natural","Universalista — todos os seres humanos, independentemente de cultura ou educação, têm acesso à lei natural pela razão","Relativista — cada cultura tem sua própria versão da lei natural","Pessimista — a razão é fraca demais para governar as paixões sem a força do Estado"],a:1,c:"O universalismo racional lockiano é um pressuposto fundamental de sua teoria: se todos os seres humanos têm razão e podem conhecer a lei natural (não matarás, não roubarás, respeita a propriedade alheia), então os direitos naturais são universais — não dependem de cultura, religião ou educação específica. Isso fundamenta o universalismo dos direitos humanos modernos: se os direitos vêm da natureza racional universal, valem para todos os seres humanos em todos os lugares.",d:"Difícil"},{n:46,t:"O problema filosófico da **obrigação política** — por que *devo* obedecer ao Estado? — recebe respostas diferentes dos três contratualistas:  I. Hobbes: devo obedecer porque assinei (ou meu ancestral assinou) um contrato irrevogável. II. Locke: devo obedecer enquanto o governo protege meus direitos naturais — e posso resistir quando não o faz. III. Rousseau: devo obedecer porque a lei é expressão da minha própria vontade como membro do soberano coletivo.  Qual das afirmações acima está correta?",o:["Apenas I","Apenas II e III","Apenas I e II","I, II e III"],a:1,c:"I é **incorreta** como formulada: Hobbes não diz que \"eu\" assinei um contrato — o contrato é hipotético e a obrigação é de obedecer porque o soberano garante a paz (sem a qual a vida é insuportável), não porque há um contrato assinado. A melhor formulação hobbesiana: devo obedecer porque *racionalmente escolho* o soberano para escapar do estado de guerra. II é **correta**: a obrigação é condicional em Locke — termina quando o governo viola direitos. III é **correta**: a soluç",d:"Difícil"},{n:47,t:"A **teoria feminista** do contrato social — desenvolvida por pensadoras como Carole Pateman (*O Contrato Sexual*, 1988) — critica os contratualistas clássicos por:",o:["Proporem um contrato que excluía as mulheres tanto como signatárias quanto como beneficiárias iguais — revelando que o \"indivíduo\" dos contratualistas era implicitamente masculino","Defenderem a igualdade absoluta entre homens e mulheres, o que era utópico demais","Proporem uma sociedade baseada na competição que desfavorecia as mulheres naturalmente","Ignorarem completamente a questão das mulheres por considerá-la irrelevante para a filosofia política"],a:0,c:"Pateman e outras filósofas feministas identificaram que o contrato social clássico pressupõe um \"indivíduo\" que é implicitamente masculino, proprietário e chefe de família. As mulheres eram excluídas do contrato político (não votavam, não tinham propriedade, não tinham direitos civis iguais). O \"estado de natureza\" dos contratualistas ignora a família e as relações de dependência. Isso não é um defeito menor — é uma exclusão fundamental que revela os limites do universalismo ",d:"Difícil"},{n:48,t:"A posição de Hobbes sobre a **religião** — que o soberano é o árbitro final sobre questões religiosas — foi politicamente importante porque:",o:["Fundamentou a Reforma Protestante e a independência das igrejas do poder secular","Colocou o Estado acima da Igreja — resolvendo as guerras religiosas ao subordinar a religião ao poder político","Demonstrou que Hobbes era ateu e queria eliminar a religião da vida pública","Legitimou o papado como árbitro final das disputas religiosas na Europa"],a:1,c:"Uma das consequências mais importantes do absolutismo hobbesiano: o soberano decide qual religião é permitida e como ela deve ser praticada. Isso é politicamente crucial no contexto das guerras religiosas (séc. XVI-XVII): se o Estado é soberano sobre a religião, não há justificativa para guerras civis em nome de credos diferentes. O soberano impõe a paz religiosa pela força — não pela verdade teológica. Isso é uma secularização radical do poder político.",d:"Difícil"},{n:49,t:"A crítica comunitarista de **Michael Sandel** ao liberalismo lockiano e rawlsiano afirma que o \"eu desvinculado\" (*unencumbered self*) pressuposto por esses filósofos é uma ficção porque:",o:["Os seres humanos são essencialmente egoístas — não podem ser \"desvinculados\"","Os seres humanos são sempre constituídos por laços comunitários, tradições e narrativas que não escolheram — e que os definem antes de qualquer \"escolha\" política","O eu social é uma criação do Estado — sem Estado, não há identidade pessoal","O eu desvinculado é possível, mas apenas para pessoas com formação filosófica avançada"],a:1,c:"Sandel (*Liberalism and the Limits of Justice*, 1982) argumenta contra Rawls e Locke: não existe um \"eu\" que antecede suas ligações comunitárias e pode escolher seus valores e compromissos como se estivesse atrás de um \"véu de ignorância\". Somos constituídos por nossa história, família, língua, religião, cultura — coisas que não escolhemos mas que nos definem. O \"indivíduo\" pré-social do liberalismo é uma abstração filosoficamente insustentável. Isso retoma o naturalismo aris",d:"Difícil"},{n:50,t:"Um professor de Filosofia no EF Anos Finais propõe a seguinte atividade: os alunos devem imaginar uma situação em que não existem regras, leis ou autoridades — e depois debater o que aconteceria. Essa atividade conecta-se ao conteúdo filosófico do tópico porque:",o:["Reproduz literalmente o experimento histórico do estado de natureza descrito pelos contratualistas","É um experimento mental análogo ao \"estado de natureza\" dos contratualistas — que permite explorar diferentes concepções da natureza humana (Hobbes: guerra; Locke: paz relativa; Rousseau: bondade) e a necessidade do governo","Demonstra que os alunos são naturalmente hobbesians — confirmando a teoria do estado de guerra","É inadequada por induzir comportamentos antissociais nos estudantes"],a:1,c:"Esta questão de transposição didática encerra o tópico. O experimento mental do \"estado de natureza\" é perfeitamente replicável pedagogicamente — e produtivo. As respostas dos alunos provavelmente serão diversas: alguns imaginarão guerra (Hobbes), outros cooperação (Locke), outros bondade inicial e corrupção gradual (Rousseau). Esse debate *é* a discussão filosófica sobre natureza humana e legitimidade política — o núcleo do tópico. Conecta filosofia política à reflexão sobre",d:"Difícil"}];
const TOTAL = 50;
let answers = {};
let currentFilter = 'all';
let errorsMode = false;

function getVisible(){
  if(errorsMode){
    return QUESTIONS.filter(q=>answers[q.n]!==undefined && answers[q.n]!==q.a);
  }
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(q=>q.d===currentFilter);
}

function renderQuiz(){
  const visible = getVisible();
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  if(!visible.length){
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px;font-family:JetBrains Mono,monospace;font-size:13px;">Nenhuma questão neste filtro.</p>';
    return;
  }
  visible.forEach((q,i)=>{
    const block = document.createElement('div');
    block.className = 'q-block' + (answers[q.n]!==undefined?' answered':'');
    block.id = 'qb-'+q.n;
    const diffClass = q.d==='Fácil'?'diff-easy':q.d==='Média'?'diff-med':'diff-hard';
    const done = answers[q.n]!==undefined;
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(q.n).padStart(2,'0')}</span>
        <span class="q-diff ${diffClass}">${q.d}</span>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="q-opts" id="opts-${q.n}">
        ${q.o.map((o,j)=>{
          let cls='q-opt'+(done?' done':'');
          if(done){
            if(j===q.a) cls+=' correct';
            else if(j===answers[q.n]) cls+=' wrong';
          }
          return `<div class="${cls}" ${!done?`onclick="pick(${q.n},${j})"`:''}>
            <span class="opt-letter">${'ABCD'[j]}</span>
            <span class="opt-text">${o}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="q-feedback ${done?(answers[q.n]===q.a?'fb-correct show':'fb-wrong show'):''}" id="fb-${q.n}">
        <span class="fb-label">${done?(answers[q.n]===q.a?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]):'' }</span>
        <span class="fb-body">${q.c}</span>
      </div>`;
    container.appendChild(block);
  });
}

function pick(qn, optIdx){
  if(answers[qn]!==undefined) return;
  const q = QUESTIONS.find(x=>x.n===qn);
  answers[qn] = optIdx;
  const correct = optIdx===q.a;
  // Style options
  const opts = document.querySelectorAll('#opts-'+qn+' .q-opt');
  opts.forEach(o=>o.classList.add('done'));
  opts[optIdx].classList.add(correct?'correct':'wrong');
  if(!correct) opts[q.a].classList.add('correct');
  // Feedback
  const fb=document.getElementById('fb-'+qn);
  fb.className='q-feedback show '+(correct?'fb-correct':'fb-wrong');
  fb.innerHTML=`<span class="fb-label">${correct?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]}</span><span class="fb-body">${q.c}</span>`;
  document.getElementById('qb-'+qn).classList.add('answered');
  updateStats();
  if(Object.keys(answers).length===TOTAL) finishQuiz();
}

function updateStats(){
  const answered = Object.keys(answers).length;
  let corr = 0;
  QUESTIONS.forEach(q => { if (answers[q.n] === q.a) corr++; });
  const pct = answered ? Math.round(corr / answered * 100) : 0;

  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = corr;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = (answered / TOTAL * 100) + '%';
  document.getElementById('st-pts').textContent = corr;
  document.getElementById('st-fill').style.width = (corr / TOTAL * 100) + '%';
  document.getElementById('st-pct').textContent = pct + '%';

  syncErrorsButton();
}

function finishQuiz(){
  let corr=0;
  QUESTIONS.forEach(q=>{ if(answers[q.n]===q.a) corr++; });
  const pct=Math.round(corr/TOTAL*100);
  const panel=document.getElementById('score-panel');
  panel.classList.add('show');
  const numEl=document.getElementById('sc-num');
  numEl.textContent=corr+'/'+TOTAL;
  numEl.className='sc-number '+(pct>=70?'sc-approved':'sc-failed');
  document.getElementById('sc-pct').textContent=pct+'% de acerto';
  const errs=TOTAL-corr;
  document.getElementById('sc-breakdown').innerHTML=
    `<div class="sc-item"><strong>${corr}</strong>Corretas</div>
     <div class="sc-item"><strong>${errs}</strong>Incorretas</div>
     <div class="sc-item"><strong>${pct}%</strong>Aproveitamento</div>`;
  syncErrorsButton();
  if(errs>0) document.getElementById('sc-review-btn').style.display='inline-block';
  else document.getElementById('sc-review-btn').style.display='none';
  panel.scrollIntoView({behavior:'smooth'});
}

function syncErrorsButton(){
  const errBtn = document.getElementById('err-btn');
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  const answered = Object.keys(answers).length;

  if (errs > 0) {
    errBtn.style.display = 'block';
    errBtn.disabled = false;
    errBtn.textContent = errorsMode ? '↺ Mostrar todas' : '↺ Só erros';
  } else {
    errBtn.style.display = answered === TOTAL ? 'block' : 'none';
    errBtn.disabled = true;
    errBtn.textContent = '↺ Só erros';
  }
}

function resetQuiz(){
  answers={};
  errorsMode=false;
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  syncErrorsButton();
  document.getElementById('hdr-answered').textContent='0';
  document.getElementById('hdr-correct').textContent='0';
  document.getElementById('hdr-pct').textContent='0%';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('st-pts').textContent='0';
  document.getElementById('st-fill').style.width='0%';
  document.getElementById('st-pct').textContent='0%';
  renderQuiz();
  window.scrollTo(0,0);
}

function reviewErrors(){
  errorsMode = true;
  document.getElementById('score-panel').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderQuiz();
syncErrorsButton();
  window.scrollTo(0,0);
}

function setFilter(f, btn){
  currentFilter = f;
  errorsMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
syncErrorsButton();
}

function toggleErrors(){
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  if (!errs) return;
  errorsMode = !errorsMode;
  renderQuiz();
syncErrorsButton();
}

renderQuiz();
syncErrorsButton();

</script>
