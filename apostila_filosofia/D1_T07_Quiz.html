<script>
const QUESTIONS = [{n:1,t:"A frase *\"Sapere aude!\"* (\"Ouse saber!\"), usada por Kant para definir o Iluminismo, expressa a ideia de que:",o:["O saber pertence aos sábios e deve ser protegido do povo","Todo ser humano deve ter a coragem de usar sua própria razão, sem tutela de outros","A razão é perigosa e deve ser usada com cautela","O saber científico é superior a qualquer outra forma de conhecimento"],a:1,c:"Em *O que é o Esclarecimento?* (1784), Kant define o Iluminismo como a saída do ser humano de sua menoridade — o estado de não se servir de seu próprio entendimento sem a orientação de outro. \"Menoridade\" não é imaturidade biológica — é a incapacidade (muitas vezes autoimposta) de pensar por si mesmo, dependendo de tutores (religiosos, políticos, intelectuais). O Iluminismo convoca cada ser humano a pensar autonomamente.",d:"Fácil"},{n:2,t:"Para Hegel, a afirmação \"O que é racional é real; e o que é real é racional\" significa que:",o:["Tudo o que existe é bom — não há lugar para a crítica na filosofia","A realidade histórica e o pensamento racional são aspectos do mesmo processo de desenvolvimento do Espírito","A razão humana pode conhecer tudo o que existe na realidade","O real é determinado pelo pensamento individual de cada pessoa"],a:1,c:"Hegel não está dizendo que tudo como está é bom e não precisa mudar (A — interpretação conservadora errônea). Está dizendo que a realidade e a razão participam do mesmo processo dialético: o real desenvolve-se racionalmente (tem uma lógica interna) e o racional se realiza historicamente. A filosofia descobre a razão no real — não a impõe de fora.",d:"Fácil"},{n:3,t:"A dialética hegeliana desenvolve-se em três momentos. O terceiro momento — a **síntese** — é também chamado de *Aufhebung*, que significa simultaneamente:",o:["Destruição, eliminação e esquecimento","Conservação passiva do estado anterior sem transformação","Cancelar, conservar e elevar os momentos anteriores a um nível superior","Fusão dos dois primeiros momentos em algo completamente novo e diferente"],a:2,c:"*Aufhebung* é um dos conceitos mais ricos de Hegel, exatamente porque em alemão o verbo *aufheben* tem três significados simultâneos: cancelar/negar (supera a contradição), conservar (preserva o que havia de verdadeiro nos dois momentos) e elevar (leva a um nível superior). A síntese não é a vitória de um lado — é a superação dialética que preserva e transforma.",d:"Fácil"},{n:4,t:"A afirmação de Nietzsche \"Deus está morto\" deve ser interpretada como:",o:["Uma prova filosófica de que Deus nunca existiu","Um diagnóstico cultural: os valores e a cosmovisão fundados em Deus perderam credibilidade na modernidade","Uma provocação literária sem conteúdo filosófico sério","A defesa do ateísmo científico contra a religião"],a:1,c:"\"Deus está morto\" não é teologia nem ateísmo científico — é diagnóstico cultural. Nietzsche descreve o colapso dos fundamentos sobre os quais repousavam os valores, o sentido e a moral do Ocidente. A ciência e o secularismo \"mataram\" Deus — mas ainda não percebemos as consequências: sem o fundamento, toda a estrutura de valores que dependia dele ameaça desmoronar. Essa é a crise do niilismo.",d:"Fácil"},{n:5,t:"O conceito de **razão instrumental**, desenvolvido por Horkheimer e Adorno na *Dialética do Esclarecimento*, refere-se a:",o:["Uma razão que questiona os fins e os valores das ações humanas","Uma razão que calcula os meios mais eficientes para fins dados, sem questionar esses fins","O uso da razão como instrumento de libertação contra a opressão política","A aplicação da razão filosófica às ciências naturais e sociais"],a:1,c:"Razão instrumental: \"Como fazer X de forma mais eficiente?\" — sem perguntar \"Devo fazer X?\" ou \"X é bom?\" É a razão do técnico, do administrador, do engenheiro de sistemas — incluindo os engenheiros dos campos de concentração. O Iluminismo prometeu razão crítica (que questiona fins) mas produziu razão instrumental (que apenas otimiza meios) — essa é a tese central de Adorno e Horkheimer.",d:"Fácil"},{n:6,t:"Jean-François Lyotard define a **pós-modernidade** como:",o:["O período histórico que sucede a modernidade industrial","A incredulidade diante dos metarrelatos — as grandes narrativas de legitimação da modernidade","O retorno aos valores tradicionais e religiosos após o fracasso do secularismo","A era do domínio da tecnologia digital sobre a cultura"],a:1,c:"A definição de Lyotard em *A Condição Pós-Moderna* (1979) é a mais citada: pós-modernidade = incredulidade diante dos metarrelatos (Progresso, Emancipação, Ciência, Marxismo). Não é simplesmente um período histórico (A) nem um retorno ao passado (C) nem uma questão tecnológica (D) — é uma condição epistemológica: a perda de credibilidade das grandes narrativas legitimadoras.",d:"Fácil"},{n:7,t:"Para Karl Marx, as ideias filosóficas, jurídicas e religiosas de uma época são:",o:["Expressões do desenvolvimento autônomo do Espírito Absoluto, como afirmou Hegel","Criações livres e independentes dos intelectuais de cada período histórico","Reflexos dos interesses da classe dominante — superestrutura determinada pela base econômica","Verdades universais que transcendem as condições materiais de cada época"],a:2,c:"A tese materialista de Marx: \"Não é a consciência dos homens que determina o seu ser; ao contrário, é o seu ser social que determina a sua consciência.\" As ideias filosóficas (como o liberalismo iluminista) não são criações autônomas da razão — são reflexos dos interesses de classe que as produziram. O liberalismo serviu à burguesia; o marxismo pretende servir ao proletariado.",d:"Fácil"},{n:8,t:"A **dialética do senhor e do escravo** de Hegel demonstra que:",o:["O senhor é sempre superior ao escravo em consciência e liberdade","A dominação gera uma inversão paradoxal: o escravo, pelo trabalho, desenvolve consciência e liberdade; o senhor torna-se dependente e perde a liberdade real","A escravidão é um fenômeno natural justificado pelo desenvolvimento histórico do Espírito","O reconhecimento entre senhor e escravo é impossível — só existe entre iguais"],a:1,c:"A inversão dialética é o núcleo da análise: o senhor recebe reconhecimento de um ser que ele não reconhece como livre — o reconhecimento fica vazio. O escravo, ao transformar a natureza pelo trabalho, objetiva sua consciência no produto — e encontra liberdade real. O senhor, ao não trabalhar, torna-se dependente do escravo para tudo — perde a independência que conquistou pela força. A dialética revela a contradição interna da dominação.",d:"Fácil"},{n:9,t:"O conceito de **alienação do trabalho** em Marx descreve a situação em que:",o:["O trabalhador encontra plena realização no produto de seu trabalho","O trabalhador é separado do produto de seu trabalho, do processo de produção, de sua natureza como ser criativo e dos outros seres humanos","O trabalho é uma atividade livre que o ser humano escolhe conforme sua vontade","A alienação é um problema espiritual — o Espírito alienado de si mesmo, como em Hegel"],a:1,c:"A alienação marxista tem quatro dimensões: do produto (que pertence ao capitalista), do processo (trabalhar é sofrimento imposto, não realização), da espécie (o humano reduz-se a animal que trabalha por sobrevivência) e do outro (os outros são concorrentes ou exploradores). É a desumanização sistêmica produzida pelo modo de produção capitalista — não um problema espiritual (D — isso seria Hegel).",d:"Fácil"},{n:10,t:"O **Romantismo** como reação ao Iluminismo valorizava:",o:["A razão científica como único critério de verdade","O progresso tecnológico e a industrialização como formas de libertação humana","O sentimento, a intuição, a natureza como organismo vivo e a particularidade histórica-cultural","O universalismo abstrato e os direitos individuais racionalmente fundamentados"],a:2,c:"O Romantismo reage ao racionalismo iluminista valorizando exatamente o que o Iluminismo havia desvalorizado: o sentimento (contra a razão fria), a intuição (contra o método científico), a natureza como ser vivo e misterioso (contra a natureza-máquina de Newton), e a particularidade histórica e cultural (contra o universalismo abstrato que ignorava diferenças concretas).",d:"Fácil"},{n:11,t:"O conceito de **indústria cultural**, desenvolvido por Adorno e Horkheimer, refere-se a:",o:["O florescimento da criatividade popular na era industrial","A produção e padronização da cultura como mercadoria, neutralizando o pensamento crítico","A apropriação da cultura erudita pela classe operária","O uso da arte para fins revolucionários na tradição marxista"],a:1,c:"A indústria cultural (rádio, cinema, música popular, televisão — e hoje redes sociais e streaming) não é expressão espontânea da criatividade — é produção padronizada e mercantilizada de entretenimento. Para Adorno e Horkheimer, ela neutraliza o pensamento crítico ao oferecer \"diversão\" que satisfaz superficialmente sem questionar. É o equivalente cultural da razão instrumental: eficiente em produzir conformismo.",d:"Fácil"},{n:12,t:"Para Nietzsche, a **moral dos escravos** (*Sklavenmoral*) é caracterizada por:",o:["Afirmação da vida, da força e da criatividade — valores dos guerreiros nobres","Ressentimento — a negação dos valores dos fortes pelos fracos, que transformam sua fraqueza em virtude","Obediência racional às leis universais — a moral kantiana do dever","O hedonismo — a busca do prazer como bem supremo"],a:1,c:"Na *Genealogia da Moral* (1887), Nietzsche analisa a origem dos valores morais: a moral dos escravos nasce do *ressentimento* — os fracos, incapazes de agir diretamente, reagem inversamente aos valores dos fortes. \"Bom\" passa a significar humilde, sofredor, resignado (o fraco); \"mau\" passa a significar nobre, forte, feliz (o forte). O Cristianismo e o Iluminismo são, para Nietzsche, variações dessa moral do ressentimento.",d:"Fácil"},{n:13,t:"A noção hegeliana de **Zeitgeist** refere-se a:",o:["O tempo cronológico medido pelos relógios de uma época","O \"Espírito do Tempo\" — o conjunto de valores, ideias e formas de vida que caracterizam uma época histórica","A velocidade com que o Espírito Absoluto se desenvolve na história","O período de transição entre duas grandes épocas históricas"],a:1,c:"*Zeitgeist* (Zeit = tempo + Geist = espírito) = \"Espírito do Tempo\". Para Hegel, cada época histórica tem um espírito próprio que se expressa em sua arte, religião, filosofia, política e costumes. Não é algo que os indivíduos criam conscientemente — é o espírito coletivo que os atravessa e que a filosofia reconhece retrospectivamente. O conceito entrou na linguagem comum e é muito usado fora do contexto hegeliano estrito.",d:"Fácil"},{n:14,t:"Marx \"inverteu\" Hegel ao afirmar que, ao contrário do que Hegel pensava:",o:["O Espírito determina a matéria — Hegel estava correto","A matéria (relações de produção) determina o Espírito (ideias, consciência) — e não o contrário","Nem o Espírito nem a matéria determinam a história — é o acaso","A história não tem lógica — é puro caos de eventos imprevisíveis"],a:1,c:"Marx famosamente disse que encontrou a dialética de Hegel \"de cabeça para baixo\" e a colocou de pé: Hegel pensava que o Espírito (ideias, consciência) determina a realidade material. Marx inverte: são as condições materiais de produção (quem possui os meios de produção, como se organiza o trabalho) que determinam a consciência, as ideias e as formas políticas. Essa inversão é o fundamento do materialismo histórico.",d:"Fácil"},{n:15,t:"O conceito nietzschiano de **Além-do-homem** (*Übermensch*) refere-se a:",o:["Um ser biologicamente superior — a raça humana mais evoluída geneticamente","O ser humano que, após a morte de Deus, cria seus próprios valores a partir da vontade de poder — sem fundamentos transcendentes","O gênio intelectual que supera a maioria pela força de seu raciocínio","O ser humano do futuro, produto da evolução tecnológica e científica"],a:1,c:"O *Übermensch* é um projeto ético-filosófico, não biológico nem racial (a interpretação nazista foi uma distorção deliberada que Nietzsche nunca defendeu — ele rejeitava explicitamente o antissemitismo e o nacionalismo). O Além-do-homem é aquele que, após o colapso dos valores tradicionais, não cai no niilismo passivo mas cria novos valores a partir da afirmação da vida e da vontade de poder.",d:"Fácil"},{n:16,t:"A contradição fundamental apontada por Adorno e Horkheimer no projeto iluminista é que:",o:["O Iluminismo foi bem-sucedido demais — produziu progresso em excesso","O Iluminismo, ao dominar a natureza pela razão, acabou por dominar também o ser humano — a razão que liberta torna-se razão que domina","O Iluminismo falhou porque nunca conseguiu aplicar a razão às questões políticas","O Iluminismo foi um projeto exclusivamente filosófico sem consequências históricas reais"],a:1,c:"A tese central da *Dialética do Esclarecimento*: o projeto iluminista de dominar a natureza pela razão instrumental gerou, como efeito colateral, a dominação dos seres humanos pelos próprios instrumentos que criaram. A razão que deveria libertar — aplicada à organização social, ao trabalho, à propaganda e ao extermínio — tornou-se instrumento de barbárie eficiente. O Holocausto é, para Adorno e Horkheimer, o resultado lógico da razão instrumental levada ao extremo.",d:"Média"},{n:17,t:"A crítica de Marx ao Iluminismo como \"ideologia burguesa\" implica que os ideais de **liberdade, igualdade e fraternidade** proclamados pela Revolução Francesa:",o:["São valores genuinamente universais que a burguesia realizou plenamente","Expressam interesses particulares da burguesia disfarçados de universalidade: liberdade de comércio, igualdade formal (não real) e fraternidade que cedeu à concorrência","São ideais impossíveis de realizar em qualquer sociedade humana","Foram criados pelo proletariado e apropriados pela burguesia"],a:1,c:"A crítica marxista é precisa: \"liberdade\" iluminista era liberdade de propriedade e de comércio — útil à burguesia, não ao trabalhador que não tem capital. \"Igualdade\" era igualdade formal perante a lei — mas a lei tratava igualmente proprietários e despossuídos de forma que favorecia os primeiros. \"Fraternidade\" logo cedeu à concorrência capitalista. Os ideais \"universais\" eram interesses de classe universalizados ideologicamente.",d:"Média"},{n:18,t:"A \"astúcia da razão\" (*List der Vernunft*) de Hegel, exemplificada por Napoleão, significa que:",o:["Os grandes líderes históricos enganam seus povos pela astucia retórica","A razão histórica usa os indivíduos como instrumentos de seu desenvolvimento, sem que eles percebam o papel que desempenham no processo histórico total","A razão é mais poderosa que a força militar — Napoleão venceu pela inteligência estratégica","Os filósofos devem ser astutos e pragmáticos para influenciar os governantes"],a:1,c:"Para Hegel, os \"heróis históricos mundiais\" (Alexandre, César, Napoleão) não agem por razões filosóficas — agem por paixão, ambição, interesse. Mas inconscientemente servem ao desenvolvimento do Espírito: Napoleão propagou os ideais revolucionários pela Europa sem perceber que era um instrumento da razão histórica. A razão usa as paixões humanas como instrumentos de seu próprio desenvolvimento — essa é a \"astúcia\".",d:"Média"},{n:19,t:"O **eterno retorno** em Nietzsche é melhor interpretado como:",o:["Uma teoria cosmológica sobre a repetição cíclica do universo","Um imperativo ético: viva de tal modo que você possa querer que cada momento retorne eternamente — afirmação máxima da vida","A prova de que a história se repete inevitavelmente em ciclos","A justificativa do conservadorismo — o que sempre foi assim continuará sendo"],a:1,c:"O eterno retorno é primeiramente um pensamento experimental (*Gedankenexperiment*): \"E se cada momento de tua vida retornasse eternamente?\" A maioria das pessoas recua com horror — sua vida não suporta esse teste. O imperativo nietzschiano: viva de tal forma que você possa desejar o eterno retorno de cada instante — isso é o Sim máximo à vida, contra o Não cristão e iluminista que promete recompensa futura e despreza o presente.",d:"Média"},{n:20,t:"A distinção hegeliana entre **fenomenologia** e **lógica** em sua obra filosófica é que:",o:["A fenomenologia estuda os fenômenos físicos; a lógica estuda o raciocínio formal","A Fenomenologia do Espírito descreve o percurso histórico-filosófico da consciência até o Saber Absoluto; a Ciência da Lógica investiga as estruturas do pensamento puro","São sinônimas — Hegel usa os termos de forma intercambiável","A fenomenologia é inferior à lógica — uma descreve aparências, a outra alcança a verdade"],a:1,c:"A *Fenomenologia do Espírito* (1807) é a jornada da consciência — da experiência imediata mais simples até o Saber Absoluto, passando por crises e superações dialéticas. É narrativa histórico-filosófica. A *Ciência da Lógica* investiga as categorias do pensamento puro — independentemente da experiência histórica. São obras complementares: a fenomenologia é o caminho até a ciência; a lógica é a ciência em seu conteúdo puro.",d:"Média"},{n:21,t:"A crítica de Nietzsche ao Iluminismo como \"secularização do Cristianismo\" baseia-se em que:",o:["O Iluminismo substituiu Deus pela Razão, o Paraíso pelo Progresso e a salvação pela Revolução — mantendo a estrutura de negação da vida presente no Cristianismo","Os filósofos iluministas eram secretamente cristãos que disfarçavam sua fé em linguagem racional","O Iluminismo e o Cristianismo compartilham os mesmos textos sagrados","O Iluminismo retomou a metafísica medieval sem perceber"],a:0,c:"A crítica nietzschiana é estrutural: tanto o Cristianismo quanto o Iluminismo são formas da moral do ressentimento — que nega o presente em favor de uma recompensa futura (Paraíso / Progresso), deprecia os instintos e a vida como são (pecado / ignorância a superar) e promete a salvação pela fé ou pela razão. A estrutura é idêntica: negação do presente, promessa futura, mediador (Deus / Razão). Nietzsche quer superar *ambos*.",d:"Média"},{n:22,t:"A noção marxista de **luta de classes** como motor da história substitui, na visão de Marx, o conceito hegeliano de:",o:["Dialética — Marx abandona completamente o método dialético","Espírito (*Geist*) como motor do desenvolvimento histórico","Alienação — Marx usa o mesmo conceito sem alterações","Fenomenologia — Marx substitui a descrição pela revolução"],a:1,c:"Para Hegel, o motor da história é o Espírito (*Geist*) — a razão que se autodesvolve dialeticamente. Para Marx, o motor é material: a luta de classes (entre aqueles que possuem os meios de produção e aqueles que só possuem sua força de trabalho). Marx mantém o método dialético de Hegel (A é falsa) mas substitui o motor idealista (Espírito) pelo motor materialista (conflito de classes).",d:"Média"},{n:23,t:"O **niilismo** — que Nietzsche identifica como a consequência da morte de Deus — tem duas formas distintas:",o:["Niilismo teórico (ceticismo sobre o conhecimento) e niilismo prático (ceticismo sobre a moral)","Niilismo passivo (depressão, paralisia, perda de sentido) e niilismo ativo (criação de novos valores — a resposta afirmativa de Nietzsche)","Niilismo antigo (dos sofistas) e niilismo moderno (do Iluminismo)","Niilismo individual (do artista) e niilismo coletivo (das massas)"],a:1,c:"Nietzsche distingue duas respostas ao niilismo (colapso dos valores). O **niilismo passivo** é a resignação, o pessimismo, a paralisia — a resposta dos \"últimos homens\" que apenas sobrevivem sem criar. O **niilismo ativo** é a resposta afirmativa: reconhece o colapso dos valores transcendentes e, em vez de deprimir-se, cria novos valores a partir da vontade de poder. O Além-do-homem é a figura do niilismo ativo consumado.",d:"Média"},{n:24,t:"O projeto dos **metarrelatos** iluministas, criticado por Lyotard, refere-se especificamente às narrativas que:",o:["Contam a história de civilizações antigas de forma épica e literária","Legitimam o conhecimento e a política modernos com base em grandes ideais universais (Progresso, Emancipação, Ciência)","Narram a vida dos grandes heróis da história política ocidental","Descrevem a estrutura do cosmos segundo a física moderna"],a:1,c:"Metarrelatos (*grands récits*) são narrativas de legitimação: justificam o conhecimento científico ou a organização política apelando a um ideal maior (o Progresso da humanidade, a Emancipação do proletariado, o avanço da Ciência como portadora de verdade). Lyotard argumenta que na pós-modernidade esses grandes relatos perderam a capacidade de legitimar — ninguém acredita mais no Progresso linear, na Revolução Proletária ou na Ciência como portadora de verdade absoluta.",d:"Média"},{n:25,t:"A critica de Adorno ao **julgamento de Auschwitz** — que ele sintetizou na frase \"Auschwitz é a prova de que a cultura falhou\" — implica que:",o:["A alta cultura (Beethoven, Goethe) tornou as pessoas mais humanas, mas não suficientemente","A cultura europeia, mesmo em seu nível mais elevado, não impediu o Holocausto — provando que a razão iluminista e a \"civilização\" não são garantias contra a barbárie","O Holocausto foi resultado da irracionalidade das massas — o fracasso da cultura popular","A filosofia deveria ter previsto e impedido o Holocausto"],a:1,c:"Adorno formulou o problema com brutalidade: os mesmos seres humanos que ouviam Beethoven e liam Goethe operaram campos de concentração com eficiência burocrática. A \"alta cultura\" não imunizou — a civilização não garantiu a humanidade. Isso prova que o projeto iluminista de emancipação pelo saber estava radicalmente equivocado: a razão instrumental pode coexistir — e servir — à barbárie mais extrema.",d:"Média"},{n:26,t:"Para Marx, a **superestrutura** (Estado, direito, filosofia, religião) é determinada pela **base** (relações de produção). A implicação política desta tese é que:",o:["Para mudar as ideias, basta convencer as pessoas por meio da educação e da filosofia","A transformação das ideias requer a transformação das condições materiais de produção — a revolução econômica precede a revolução cultural","As ideias são autônomas e podem transformar a base econômica diretamente","A base e a superestrutura se determinam mutuamente de forma equilibrada"],a:1,c:"Se as ideias são reflexos das condições materiais, então mudar as ideias sem mudar as condições materiais é superficial. A revolução marxista é primeiro econômica (abolição da propriedade privada dos meios de produção) — porque só isso muda a base que determina a superestrutura. Isso distingue Marx dos idealistas que acreditam que a educação e a filosofia podem, por si sós, transformar a sociedade.",d:"Média"},{n:27,t:"O **Romantismo** valorizava a **nação** e a **cultura particular** em oposição ao universalismo iluminista. Essa valorização teve consequências históricas ambíguas porque:",o:["Levou diretamente à democracia universal ao reconhecer o valor de cada cultura","Pode ser progressista (afirmação de identidades culturais oprimidas) mas também regressiva (nacionalismo excludente e xenófobo)","Foi completamente positiva — o Romantismo sempre combateu a opressão","Foi completamente negativa — o Romantismo é a origem direta do nazismo"],a:1,c:"O legado do Romantismo é genuinamente ambíguo. Progressivamente: a valorização das culturas particulares pode ser instrumento de resistência contra o imperialismo cultural (povos colonizados afirmando sua identidade). Regressivamente: o nacionalismo romântico pode tornar-se xenófobo, racista e excludente — culminando em formas de fascismo e nazismo que exaltavam a \"alma do povo\" contra os \"estrangeiros\". O Romantismo político não tem uma direção unívoca.",d:"Média"},{n:28,t:"A noção de **reconhecimento mútuo** que emerge da dialética senhor-escravo de Hegel influenciou diretamente:",o:["A teoria econômica marxista sobre a mais-valia","As teorias contemporâneas de reconhecimento (Axel Honneth) e as lutas por dignidade de grupos oprimidos","O positivismo lógico do Círculo de Viena","O utilitarismo de John Stuart Mill"],a:1,c:"A dialética do reconhecimento hegeliana — a ideia de que a identidade e a liberdade dependem do reconhecimento pelo outro — é a base de teorias contemporâneas como a de **Axel Honneth** (*Luta por Reconhecimento*, 1992). Honneth analisa como movimentos sociais (feminismo, movimentos negros, LGBTQIA+, povos indígenas) são lutas por reconhecimento — por ser reconhecido como igual em dignidade e direitos. A conexão com a luta contra o racismo, o sexismo e outras formas de opress",d:"Média"},{n:29,t:"A crítica pós-moderna ao **universalismo** iluminista pode ser formulada como:",o:["Todo universal é uma fraude — não existe nenhuma verdade válida para todos","As pretensões de universalidade do Iluminismo ocultavam uma particularidade — a perspectiva do homem branco europeu ocidental, apresentada como universal","O universalismo é correto — o pós-modernismo é apenas relativismo sem fundamento","O universal só pode ser alcançado depois da eliminação de todas as diferenças culturais"],a:1,c:"A crítica pós-moderna não é simplesmente \"não existe verdade\" (A — niilismo simplista). É uma crítica genealógica: quando o Iluminismo proclamava \"os direitos do Homem\", quem era esse \"Homem\"? Homem branco, europeu, proprietário, heterossexual. O \"universal\" iluminista era, na verdade, um particular muito específico — mas apresentava-se como universal, invisibilizando e excluindo mulheres, escravizados, colonizados, etc. A crítica pós-moderna expõe essa operação de universali",d:"Média"},{n:30,t:"A teoria marxista da **mais-valia** está diretamente relacionada com a crítica ao Iluminismo burguês porque:",o:["Prova que a razão iluminista é matematicamente incorreta","Demonstra que a \"igualdade\" do contrato de trabalho (troca de trabalho por salário) é uma exploração sistemática disfarçada de relação livre e justa","Confirma que Locke estava correto sobre a propriedade como direito natural","Mostra que o progresso tecnológico beneficia igualmente todas as classes"],a:1,c:"A mais-valia é o núcleo da crítica econômica marxista ao liberalismo: o trabalhador vende sua força de trabalho pelo salário de subsistência, mas produz mais valor do que recebe — a diferença (mais-valia) é apropriada pelo capitalista. O contrato de trabalho parece uma troca livre e igual (como o Iluminismo propunha) — mas é sistematicamente favorável ao capitalista. A \"liberdade\" e \"igualdade\" iluministas ocultam uma exploração real e estrutural.",d:"Média"},{n:31,t:"Hegel afirma que a Filosofia \"chega sempre tarde\" — que a coruja de Minerva alça voo ao anoitecer. Essa imagem significa que:",o:["Os filósofos são sempre conservadores e defendem o status quo","A Filosofia compreende uma época apenas quando ela já se completou — o pensamento reflete o real, não o antecipa","A Filosofia deve intervir no processo histórico para acelerá-lo","Os filósofos são como corujas — sábios mas solitários e marginais"],a:1,c:"A imagem da coruja de Minerva (deusa da sabedoria) que alça voo ao anoitecer é uma das mais famosas de Hegel: a Filosofia não é profecia nem programa — ela compreende o real depois que o real se realizou. A filosofia hegeliana é retroativa: reconhece a razão no real que já aconteceu. Isso tem uma implicação política: Hegel não propõe programas revolucionários — compreende a revolução depois que ela ocorreu.",d:"Média"},{n:32,t:"O conceito de **fetichismo da mercadoria** em Marx (análise de como as relações sociais entre pessoas aparecem como relações entre coisas) conecta-se à crítica do Iluminismo porque:",o:["Mostra que o livre mercado produz uma forma de irracionalidade — as leis do mercado parecem naturais, mas são construções sociais","Prova que as mercadorias têm valor intrínseco independente do trabalho humano","Demonstra que a circulação de mercadorias é a base da liberdade humana","Confirma que a propriedade privada é um direito natural, como Locke afirmou"],a:0,c:"O fetichismo da mercadoria: no capitalismo, as relações sociais (entre trabalhadores e capitalistas) aparecem como relações entre coisas (o preço das mercadorias parece determinado por leis \"naturais\" do mercado). Isso é uma forma de mistificação — uma ilusão estrutural produzida pelo próprio sistema. A crítica ao Iluminismo: o \"livre mercado\" (ideal iluminista) não é natural nem racional — é uma construção social que obscurece as relações de exploração reais.",d:"Média"},{n:33,t:"A influência de Hegel sobre Marx, e a crítica de Marx a Hegel, podem ser sintetizadas como:",o:["Marx rejeitou completamente Hegel — não há nenhuma influência entre os dois","Marx herdou o método dialético e a compreensão histórica de Hegel, mas inverteu o fundamento: do Espírito (ideal) para as relações materiais de produção (material)","Marx aprofundou o idealismo hegeliano, tornando-o mais rigoroso e sistemático","Marx e Hegel concordam em tudo — a diferença é apenas de terminologia"],a:1,c:"A relação Marx-Hegel é de herança crítica: Marx absorveu a dialética, a compreensão histórica processual, a noção de alienação e a crítica da abstração. Mas inverteu o fundamento: para Hegel, a história é desenvolvimento do Espírito (ideias determinam a realidade); para Marx, a história é desenvolvimento das forças produtivas materiais (a realidade econômica determina as ideias). É a inversão materialista do idealismo hegeliano.",d:"Média"},{n:34,t:"A crítica de **Jürgen Habermas** (Escola de Frankfurt — segunda geração) às conclusões pessimistas de Adorno e Horkheimer é que:",o:["O Holocausto prova que toda razão é dominação — Habermas concorda com Adorno","O projeto iluminista não deve ser abandonado mas completado: há uma **razão comunicativa** (voltada ao entendimento mútuo) que foi sufocada pela razão instrumental, mas pode ser resgatada","A razão instrumental é inevitável e devemos aprender a conviver com ela","A solução é retornar ao naturalismo aristotélico e abandonar o projeto moderno"],a:1,c:"Habermas representa a segunda geração da Escola de Frankfurt — e sua crítica à primeira geração (Adorno/Horkheimer) é que eles jogaram fora o bebê com a água do banho: ao criticar toda a razão como dominação, não deixaram nenhuma base para a emancipação. Habermas propõe distinguir a razão instrumental (dominação) da **razão comunicativa** (orientada ao entendimento mútuo, ao consenso racional) — e resgatar o projeto iluminista com base na segunda. É uma posição mais otimista ",d:"Média"},{n:35,t:"A posição de Nietzsche de que \"não existem fatos, apenas interpretações\" tem implicações para a teoria do conhecimento porque:",o:["Confirma o empirismo de Hume — só a experiência sensorial produz conhecimento","Antecipa o perspectivismo: todo conhecimento é produzido a partir de uma perspectiva particular — não há \"visão de lugar nenhum\" (ponto de vista neutro e absoluto)","Prova que o conhecimento científico é impossível e devemos abandonar a ciência","Confirma o idealismo de Berkeley — a realidade é produto da mente"],a:1,c:"O perspectivismo nietzschiano: todo conhecimento é condicionado pela perspectiva de quem conhece — seus valores, sua posição, sua vontade de poder. Não existe um \"ponto de vista de Deus\" neutro e absoluto. Isso não é relativismo simples (tudo vale igual) — é o reconhecimento de que diferentes perspectivas captam aspectos diferentes da realidade, e que a multiplicidade de perspectivas enriquece o conhecimento mais do que a pretensão de uma única verdade objetiva. Influenciou F",d:"Média"},{n:36,t:"Considere as afirmações:  I. Para Hegel, a história é um processo irracional e caótico sem direção definida. II. Para Marx, as ideias filosóficas determinam as relações materiais de produção. III. Para Nietzsche, o Iluminismo superou completamente a moral cristã.  Estão corretas:",o:["Apenas I","Nenhuma das afirmações","Apenas III","Apenas I e II"],a:1,c:"I é **falsa**: para Hegel, a história tem uma lógica racional — é o desenvolvimento do Espírito rumo à liberdade (\"o que é racional é real\"). II é **falsa**: para Marx, é o inverso — as relações materiais de produção determinam as ideias filosóficas (e não o contrário). III é **falsa**: Nietzsche argumenta exatamente o oposto — o Iluminismo *não* superou o Cristianismo, apenas o secularizou, mantendo a mesma estrutura de negação da vida e moral do ressentimento. Todas as três",d:"Difícil"},{n:37,t:"A conexão entre a **dialética do reconhecimento** de Hegel e as **lutas por reconhecimento** dos movimentos sociais contemporâneos pode ser exemplificada pelo movimento negro brasileiro porque:",o:["O movimento negro segue diretamente as categorias hegelianas de senhor e escravo","A luta por reconhecimento da dignidade e da igualdade da população negra reproduz a estrutura hegeliana: resistência à dominação que produz consciência e luta por reconhecimento mútuo como iguais","Hegel desenvolveu a dialética senhor-escravo especificamente para analisar a escravidão africana","O movimento negro é uma expressão do Espírito Absoluto em sua fase mais desenvolvida"],a:1,c:"A aplicação é filosófica, não histórica direta (Hegel não analisou especificamente a escravidão africana — C é falsa). Mas a estrutura é análoga: o ser humano negro, submetido ao racismo estrutural, luta por ser reconhecido como igual em dignidade — exatamente a demanda da consciência escravizada hegeliana que rejeita a dominação e exige reconhecimento mútuo. Axel Honneth e outros teóricos críticos desenvolveram essa conexão explicitamente.",d:"Difícil"},{n:38,t:"A posição de Nietzsche sobre a ciência é ambivalente: ele a admira como produção da vontade de poder, mas a critica porque:",o:["A ciência produz conhecimentos falsos sobre a natureza","A ciência moderna herdou o ascetismo cristão — a busca da verdade objetiva como valor absoluto é uma forma de negação da vida (por que a \"verdade\" deveria ser preferível ao erro que serve à vida?)","A ciência é muito cara e inacessível ao povo","A ciência substitui a religião sem oferecer consolo existencial"],a:1,c:"Na *Genealogia da Moral*, Nietzsche identifica na busca científica da \"verdade objetiva\" um ideal ascético: o cientista que nega suas perspectivas pessoais em nome da \"objetividade\" está praticando uma forma de mortificação — negando a vida que é sempre perspectiva e interpretação. Por que a verdade é preferível ao erro que serve à vida? Nietzsche não rejeita a ciência — questiona o valor absoluto que ela atribui à \"verdade\" em si mesma.",d:"Difícil"},{n:39,t:"A tese de Walter Benjamin (Escola de Frankfurt) de que \"não existe documento de cultura que não seja, ao mesmo tempo, um documento de barbárie\" complementa a crítica adorniana porque:",o:["Toda grande obra cultural foi produzida sobre a exploração e o sofrimento de outros — a \"civilização\" e a \"barbárie\" são inseparáveis","A cultura sempre produz barbárie — logo, a cultura deve ser abolida","Apenas as obras de arte da burguesia são documentos de barbárie; a arte proletária é pura","Benjamin concordava com Adorno que o Holocausto foi a prova da falência da cultura"],a:0,c:"Benjamin aponta que as grandes obras da \"civilização\" ocidental foram produzidas sobre o trabalho escravo, a exploração colonial, o sofrimento dos dominados. As catedrais medievais foram construídas pelos servos; a filosofia grega foi possibilitada pela escravidão; o progresso industrial pela exploração colonial. A \"barbárie\" não está separada da \"civilização\" — está em sua base. Isso aprofunda a crítica adorniana: o Iluminismo não apenas \"falhou\" — estava estruturalmente con",d:"Difícil"},{n:40,t:"O conceito de **reificação** (*Verdinglichung*), desenvolvido por Georg Lukács a partir de Marx e Hegel, refere-se a:",o:["O processo pelo qual coisas são transformadas em seres humanos — humanização da natureza","O processo pelo qual relações humanas são transformadas em relações entre coisas — as pessoas são tratadas como objetos, como o fetichismo da mercadoria de Marx","A teoria filosófica que afirma que apenas as coisas materiais existem","O desenvolvimento tecnológico que substituiu o trabalho humano pelas máquinas"],a:1,c:"Reificação (*Ding* = coisa): o processo de \"coisificação\" das relações humanas. No capitalismo, as relações entre pessoas são mediadas pelas mercadorias — e as pessoas passam a se relacionar como se fossem coisas (com preço, valor de troca, calculabilidade). Lukács desenvolve Marx e Hegel: a reificação é a alienação generalizada à estrutura de toda a consciência moderna — não apenas do trabalhador, mas de toda a sociedade capitalista.",d:"Difícil"},{n:41,t:"A filosofia de **Michel Foucault** (1926–1984) pode ser relacionada à crítica do Iluminismo porque:",o:["Foucault defende o projeto iluminista como o melhor fundamento para os direitos humanos","Foucault analisa como as instituições \"racionais\" modernas (hospital, prisão, escola, manicômio) são ao mesmo tempo instrumentos de saber e de poder — de racionalização e de dominação","Foucault concorda com Kant que a razão é o único instrumento legítimo de emancipação","Foucault é um crítico do pós-modernismo que defende o retorno ao Iluminismo"],a:1,c:"Foucault analisa como as instituições que o Iluminismo celebrou como \"racionais\" e \"humanistas\" (o hospital que cura, a prisão que \"reforma\", a escola que educa, o manicômio que \"trata\") são simultaneamente dispositivos de controle, normalização e dominação. O saber produzido por essas instituições (medicina, psiquiatria, pedagogia, criminologia) é inseparável do poder que exercem. Isso é uma crítica genealógica ao Iluminismo — análoga à de Nietzsche e Frankfurt.",d:"Difícil"},{n:42,t:"A \"dialética negativa\" de Adorno — recusa de qualquer síntese que dissolva as contradições — opõe-se ao método hegeliano porque:",o:["Adorno considera que as sínteses hegelianas são correções — ele as completa com sínteses mais precisas","Para Adorno, a síntese hegeliana (*Aufhebung*) resolve artificialmente contradições reais que devem permanecer em tensão — a resistência ao \"todo\" é a forma de preservar o não-idêntico","Adorno rejeita completamente o método dialético e adota o empirismo","A dialética negativa é apenas outro nome para a dialética positiva de Hegel"],a:1,c:"*Dialética Negativa* (1966) é a obra mais densa de Adorno. Ele critica Hegel por \"identificar\" tudo — a síntese dissolve as contradições, incorporando o diferente ao todo. Para Adorno, isso é violência filosófica: o \"não-idêntico\" (o que resiste a ser incorporado ao sistema, o sofrimento singular, o objeto que excede o conceito) deve ser preservado em tensão. A filosofia que resolve todas as contradições é filosofia que se torna instrumento de dominação — como o sistema hegel",d:"Difícil"},{n:43,t:"A crítica de Rousseau à **perfectibilidade** humana — a capacidade de se aperfeiçoar — é ambígua porque:",o:["Rousseau considera a perfectibilidade uma qualidade exclusivamente positiva","A perfectibilidade é ao mesmo tempo a característica que permite o desenvolvimento humano e a que permite a corrupção — é o ser humano pode se desenvolver para o melhor e para o pior","Rousseau acredita que a perfectibilidade prova que o ser humano é naturalmente mau","A perfectibilidade é uma ilusão — os seres humanos nunca realmente se transformam"],a:1,c:"No *Discurso sobre a Origem da Desigualdade*, Rousseau identifica a perfectibilidade como a característica que distingue o ser humano dos animais (que permanecem iguais a si mesmos). Mas é uma faca de dois gumes: é ela que permite o desenvolvimento da razão, da arte e da cultura — e é ela que permite a corrupção, a desigualdade e a depravação. A perfectibilidade é a abertura fundamental do ser humano — para o bem e para o mal. Isso é mais sutil do que simplesmente dizer que o",d:"Difícil"},{n:44,t:"Um professor de Filosofia no EF Anos Finais quer usar o conceito de **indústria cultural** de Adorno e Horkheimer para discutir as **redes sociais** com seus alunos. A abordagem mais filosoficamente rigorosa é:",o:["Proibir o uso de redes sociais em sala e explicar que são prejudiciais","Propor que os alunos analisem como os algoritmos das redes sociais funcionam — que tipo de conteúdo promovem, quais emoções exploram, como monetizam a atenção — e discutir se isso constitui uma \"indústria cultural\" contemporânea","Defender que as redes sociais são a expressão mais pura da criatividade popular — o oposto da indústria cultural","Ignorar as redes sociais por serem um tema contemporâneo incompatível com a filosofia do séc. XX"],a:1,c:"A abordagem B aplica rigorosamente o conceito de Adorno e Horkheimer ao contexto atual: as redes sociais (Instagram, TikTok, YouTube) são plataformas que monetizam a atenção e o engajamento — padronizando o conteúdo para maximizar o tempo de uso, não para promover pensamento crítico. Os algoritmos de recomendação são a versão contemporânea da indústria cultural: produzem \"diversão\" que mantém o usuário passivo e não questiona. Isso é exatamente o que Adorno e Horkheimer descr",d:"Difícil"},{n:45,t:"A distinção nietzschiana entre o **apolíneo** e o **dionisíaco** — desenvolvida em *O Nascimento da Tragédia* (1872) — é relevante para a crítica ao Iluminismo porque:",o:["O Iluminismo valorizou o dionisíaco (emoção, instinto) e suprimiu o apolíneo (razão, ordem)","O Iluminismo hipertrofiou o apolíneo (razão, clareza, ordem) suprimindo o dionisíaco (caos, instinto, vida) — resultando em uma cultura que nega a tragicidade da existência","Apolo e Dionísio são igualmente valorizados no projeto iluminista","Nietzsche defendia o dionisíaco e Marx defendia o apolíneo — a distinção divide os dois pensadores"],a:1,c:"Em sua primeira obra, Nietzsche analisa a tragédia grega como equilíbrio entre dois princípios: apolíneo (forma, ordem, individualidade, razão — representado pela escultura) e dionisíaco (caos, fusão, êxtase, vida — representado pela música). A cultura moderna (incluindo o Iluminismo) hipertrofiou o apolíneo — a razão, a clareza, o controle — suprimindo o dionisíaco, a afirmação da vida em sua tragicidade. O resultado é uma cultura que não suporta o sofrimento nem a morte — e",d:"Difícil"},{n:46,t:"A posição pós-moderna sobre a **verdade** — especialmente em Lyotard e Derrida — pode ser distinguida do **relativismo** porque:",o:["O pós-modernismo nega toda e qualquer verdade; o relativismo acredita em verdades relativas a culturas","O pós-modernismo não nega a verdade mas questiona as pretensões de **universalidade** de verdades particulares e os mecanismos de poder que as impõem como universais","São sinônimos — toda posição pós-moderna é necessariamente relativista","O pós-modernismo é mais conservador que o relativismo — defende as verdades tradicionais"],a:1,c:"A confusão entre pós-modernismo e relativismo é comum mas equivocada. O pós-modernismo não diz \"não existe verdade\" — diz que pretensões de universalidade são suspeitas: quando alguém proclama \"a Verdade universal\", é preciso perguntar de *qual* perspectiva fala e *quais* perspectivas exclui. Lyotard e Derrida desconstroem a universalidade — não a verdade em si. Isso é uma posição epistemológica sofisticada, não simplesmente \"tudo vale\".",d:"Difícil"},{n:47,t:"A crise do **projeto iluminista** revelada pelo século XX (guerras mundiais, Holocausto, bombas atômicas, colonialismo) gerou duas respostas filosóficas opostas:  I. **Abandono do projeto iluminista** (Adorno, Horkheimer em sua versão mais pessimista, pós-modernistas): a razão iluminista é irremediavelmente comprometida com a dominação. II. **Completar o projeto iluminista** (Habermas): o Iluminismo foi traído pela razão instrumental — a razão comunicativa pode salvá-lo.  Qual afirmação sobre essas posições está correta?",o:["A posição I é claramente superior — o Iluminismo deve ser completamente abandonado","A posição II é claramente superior — o Iluminismo deve ser completado sem modificações","Ambas as posições têm argumentos filosóficos legítimos e a tensão entre elas permanece produtiva na filosofia contemporânea","Ambas as posições são igualmente equivocadas — a solução está no retorno ao naturalismo aristotélico"],a:2,c:"Esta é uma questão de maturidade filosófica — não há resposta \"certa\" definitiva. O debate Adorno/Horkheimer vs. Habermas é uma das tensões mais produtivas da filosofia contemporânea. A posição I tem a força do diagnóstico histórico (Holocausto, colonialismo) e a honestidade intelectual de não oferecer soluções fáceis. A posição II tem a força da esperança prática e da necessidade de fundamentos para a democracia e os direitos humanos. A tensão entre elas é filosoficamente ma",d:"Difícil"},{n:48,t:"A filosofia de **Herbert Marcuse** (*O Homem Unidimensional*, 1964) — da Escola de Frankfurt — contribui para a crítica ao Iluminismo ao argumentar que:",o:["A sociedade industrial avançada liberta definitivamente o ser humano ao satisfazer todas as suas necessidades","A sociedade industrial avançada cria uma \"unidimensionalidade\" — integrando a oposição e o pensamento crítico ao sistema, tornando a revolução impossível","A tecnologia moderna é a realização do projeto iluminista e deve ser celebrada","O proletariado industrial é o sujeito revolucionário que realizará a emancipação marxista"],a:1,c:"Marcuse analisa como a sociedade capitalista avançada neutraliza a oposição: ao satisfazer necessidades materiais básicas e criar \"falsas necessidades\" de consumo, integra o trabalhador ao sistema. O pensamento \"bidimensional\" (que distingue real e possível, presente e utopia) é substituído pelo pensamento \"unidimensional\" (que aceita o real como o único possível). A razão instrumental não apenas domina a natureza — domina o próprio desejo de emancipação, tornando-o inimaginá",d:"Difícil"},{n:49,t:"A frase de Adorno \"Escrever poesia depois de Auschwitz é um ato de barbárie\" — e sua subsequente revisão — expressa o problema filosófico de:",o:["A impossibilidade da arte após o Holocausto — Adorno defendia o fim da cultura","A tensão entre a necessidade da arte como forma de elaborar o sofrimento e a indignidade de transformar o horror em objeto estético consumível","A superioridade da filosofia sobre a arte como forma de expressar a experiência histórica","A necessidade de criar uma arte que celebre as vítimas do Holocausto"],a:1,c:"A frase de Adorno é frequentemente mal citada como \"proibição\" da arte. Na verdade, expressa uma tensão: transformar o horror de Auschwitz em matéria de beleza estética é potencialmente obsceno — uma estetização que alivia a consciência em vez de perturbá-la. Mas Adorno também reconheceu (especialmente ao ler *Dialeto de Sobrevivência*, de Paul Celan) que o silêncio pode ser igualmente problematico. A tensão não tem resolução fácil — e é precisamente isso que a torna filosofi",d:"Difícil"},{n:50,t:"Um professor de Filosofia no EF Anos Finais quer trabalhar a \"crise da razão\" com seus alunos usando exemplos contemporâneos. A melhor atividade que conecta o conteúdo filosófico à realidade dos estudantes é:",o:["Pedir que memorizem as fases do Iluminismo e da crítica pós-moderna","Propor que analisem uma notícia que usa \"dados científicos\" para justificar uma política social — e discutam: quem produziu esses dados? Para que fins? Quem é excluído da análise? Isso é razão crítica (questiona fins) ou razão instrumental (otimiza meios)?","Apresentar uma lista de filósofos que criticaram o Iluminismo sem discutir suas ideias","Fazer uma redação sobre o tema sem leitura de textos filosóficos primários"],a:1,c:"Esta questão de transposição didática encerra o tópico. A atividade B usa um caso concreto e atual para aplicar a distinção razão crítica/razão instrumental — o conceito central do tópico. Analisar o uso ideológico de \"dados científicos\" (que podem ser corretos tecnicamente mas servir a fins discutíveis) é exatamente o exercício de pensamento que Adorno e Horkheimer pediam. Conecta filosofia à leitura crítica da mídia — competência central na BNCC e na formação para a cidadan",d:"Difícil"}];
const TOTAL = 50;
let answers = {};
let currentFilter = 'all';
let errorsMode = false;

function getVisible(){
  if(errorsMode){
    return QUESTIONS.filter(q=>answers[q.n]!==undefined && answers[q.n]!==q.a);
  }
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(q=>q.d===currentFilter);
}

function renderQuiz(){
  const visible = getVisible();
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  if(!visible.length){
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px;font-family:JetBrains Mono,monospace;font-size:13px;">Nenhuma questão neste filtro.</p>';
    return;
  }
  visible.forEach((q,i)=>{
    const block = document.createElement('div');
    block.className = 'q-block' + (answers[q.n]!==undefined?' answered':'');
    block.id = 'qb-'+q.n;
    const diffClass = q.d==='Fácil'?'diff-easy':q.d==='Média'?'diff-med':'diff-hard';
    const done = answers[q.n]!==undefined;
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(q.n).padStart(2,'0')}</span>
        <span class="q-diff ${diffClass}">${q.d}</span>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="q-opts" id="opts-${q.n}">
        ${q.o.map((o,j)=>{
          let cls='q-opt'+(done?' done':'');
          if(done){
            if(j===q.a) cls+=' correct';
            else if(j===answers[q.n]) cls+=' wrong';
          }
          return `<div class="${cls}" ${!done?`onclick="pick(${q.n},${j})"`:''}>
            <span class="opt-letter">${'ABCD'[j]}</span>
            <span class="opt-text">${o}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="q-feedback ${done?(answers[q.n]===q.a?'fb-correct show':'fb-wrong show'):''}" id="fb-${q.n}">
        <span class="fb-label">${done?(answers[q.n]===q.a?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]):'' }</span>
        <span class="fb-body">${q.c}</span>
      </div>`;
    container.appendChild(block);
  });
}

function pick(qn, optIdx){
  if(answers[qn]!==undefined) return;
  const q = QUESTIONS.find(x=>x.n===qn);
  answers[qn] = optIdx;
  const correct = optIdx===q.a;
  // Style options
  const opts = document.querySelectorAll('#opts-'+qn+' .q-opt');
  opts.forEach(o=>o.classList.add('done'));
  opts[optIdx].classList.add(correct?'correct':'wrong');
  if(!correct) opts[q.a].classList.add('correct');
  // Feedback
  const fb=document.getElementById('fb-'+qn);
  fb.className='q-feedback show '+(correct?'fb-correct':'fb-wrong');
  fb.innerHTML=`<span class="fb-label">${correct?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]}</span><span class="fb-body">${q.c}</span>`;
  document.getElementById('qb-'+qn).classList.add('answered');
  updateStats();
  if(Object.keys(answers).length===TOTAL) finishQuiz();
}

function syncErrorsButton(){
  const errBtn = document.getElementById('err-btn');
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  const answered = Object.keys(answers).length;

  if (errs > 0) {
    errBtn.style.display = 'block';
    errBtn.disabled = false;
    errBtn.textContent = errorsMode ? '↺ Mostrar todas' : '↺ Só erros';
  } else {
    errBtn.style.display = answered === TOTAL ? 'block' : 'none';
    errBtn.disabled = true;
    errBtn.textContent = '↺ Só erros';
  }
}

function updateStats(){
  const answered = Object.keys(answers).length;
  let corr = 0;
  QUESTIONS.forEach(q => { if (answers[q.n] === q.a) corr++; });
  const pct = answered ? Math.round(corr / answered * 100) : 0;

  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = corr;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = (answered / TOTAL * 100) + '%';
  document.getElementById('st-pts').textContent = corr;
  document.getElementById('st-fill').style.width = (corr / TOTAL * 100) + '%';
  document.getElementById('st-pct').textContent = pct + '%';

  syncErrorsButton();
}

function finishQuiz(){
  let corr=0;
  QUESTIONS.forEach(q=>{ if(answers[q.n]===q.a) corr++; });
  const pct=Math.round(corr/TOTAL*100);
  const panel=document.getElementById('score-panel');
  panel.classList.add('show');
  const numEl=document.getElementById('sc-num');
  numEl.textContent=corr+'/'+TOTAL;
  numEl.className='sc-number '+(pct>=70?'sc-approved':'sc-failed');
  document.getElementById('sc-pct').textContent=pct+'% de acerto';
  const errs=TOTAL-corr;
  document.getElementById('sc-breakdown').innerHTML=
    `<div class="sc-item"><strong>${corr}</strong>Corretas</div>
     <div class="sc-item"><strong>${errs}</strong>Incorretas</div>
     <div class="sc-item"><strong>${pct}%</strong>Aproveitamento</div>`;
  syncErrorsButton();
  if(errs>0) document.getElementById('sc-review-btn').style.display='inline-block';
  else document.getElementById('sc-review-btn').style.display='none';
  panel.scrollIntoView({behavior:'smooth'});
}

function resetQuiz(){
  answers={};
  errorsMode=false;
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  syncErrorsButton();
  document.getElementById('hdr-answered').textContent='0';
  document.getElementById('hdr-correct').textContent='0';
  document.getElementById('hdr-pct').textContent='0%';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('st-pts').textContent='0';
  document.getElementById('st-fill').style.width='0%';
  document.getElementById('st-pct').textContent='0%';
  renderQuiz();
  window.scrollTo(0,0);
}

function reviewErrors(){
  errorsMode = true;
  document.getElementById('score-panel').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderQuiz();
  syncErrorsButton();
  window.scrollTo(0,0);
}

function setFilter(f, btn){
  currentFilter = f;
  errorsMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
  syncErrorsButton();
}

function toggleErrors(){
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  if (!errs) return;
  errorsMode = !errorsMode;
  renderQuiz();
  syncErrorsButton();
}

renderQuiz();
syncErrorsButton();
</script>
</body>
</html>
