<script>
const QUESTIONS = [{n:1,t:"A pergunta \"por que ensinar Filosofia na escola?\" tem sido respondida por três grandes grupos de justificativas. A que defende que a Filosofia desenvolve a capacidade de analisar argumentos, identificar falácias e avaliar razões é a justificativa por:",o:["Valor intrínseco da Filosofia","Formação ética e religiosa","Pensamento crítico","Transmissão da herança cultural"],a:2,c:"A justificativa pelo pensamento crítico é a mais frequentemente mobilizada em documentos oficiais e em autores como Matthew Lipman e Harvey Siegel: a Filosofia desenvolve capacidades de raciocínio de ordem superior — análise de argumentos, identificação de pressupostos, avaliação de evidências, detecção de falácias. A BNCC incorpora o \"pensamento crítico e criativo\" como uma das 10 competências gerais, posicionando a Filosofia como disciplina privilegiada para seu desenvolvim",d:"Fácil"},{n:2,t:"A Lei **10.639/2003**, que alterou a LDB, tem implicações diretas para o ensino de Filosofia porque:",o:["Tornou a Filosofia obrigatória no Ensino Fundamental","Tornou obrigatório o ensino de história e cultura afro-brasileira e africana em todo o currículo — o que inclui a Filosofia, exigindo o trabalho com tradições de pensamento africano","Criou a disciplina de Filosofia Africana como componente separado","Proibiu o ensino de filosofia europeia nas escolas públicas"],a:1,c:"A Lei 10.639/2003 (alterada pela Lei 11.645/2008, que incluiu também a cultura indígena) tornou obrigatório em todo o currículo — incluindo o de Filosofia — o ensino de história e cultura afro-brasileira e africana. Para o professor de Filosofia, isso implica incluir tradições filosóficas africanas (filosofia Ubuntu, pensadores africanos contemporâneos) — não apenas como \"adição\" ao cânone, mas como ampliação da concepção do que conta como filosofia.",d:"Fácil"},{n:3,t:"Para Marilena Chauí, o ensino de Filosofia sem o contato direto com **textos filosóficos** é problemático porque:",o:["Os alunos precisam memorizar os grandes filósofos para a prova do ENEM","Sem os textos, o aluno não aprende a linguagem técnica necessária para a carreira filosófica","O contato com os textos é o que garante que o aluno está filosofando genuinamente — e não apenas \"falando sobre filosofia\" a partir de resumos e simplificações","Os textos filosóficos são mais simples que as explicações dos professores"],a:2,c:"Chauí defende que o ensino de Filosofia requer o contato com textos filosóficos autênticos — mesmo que fragmentos — porque é neles que o filosofar realmente acontece: a estranheza do texto, a dificuldade de compreensão, a necessidade de ir e vir, de reler, de perguntar — esse processo *é* o processo filosófico. Usar apenas resumos e paráfrases pode tornar o ensino mais \"fácil\" mas esvazia a experiência filosófica genuína.",d:"Fácil"},{n:4,t:"O conceito de **\"transposição didática\"** (Yves Chevallard) é relevante para o ensino de Filosofia porque descreve:",o:["A tradução de textos filosóficos para o português acessível","O processo pelo qual o saber filosófico produzido pelos filósofos é transformado em saber escolar ensinável — sem perder sua essência filosófica","A transposição de problemas filosóficos europeus para o contexto brasileiro","A simplificação total do conteúdo filosófico para se tornar acessível a qualquer aluno"],a:1,c:"A transposição didática de Chevallard descreve a cadeia: *saber sábio* (o conhecimento produzido pelos especialistas — filósofos) → *saber a ensinar* (o conhecimento tal como aparece nos currículos e materiais didáticos) → *saber ensinado* (o que efetivamente ocorre na sala de aula). Para a Filosofia, o desafio é que a transposição não pode eliminar o rigor e a problematicidade — a \"facilidade\" excessiva desfigura o objeto filosófico.",d:"Fácil"},{n:5,t:"Matthew Lipman criou o programa **\"Filosofia para Crianças\"** (P4C) baseado na convicção de que:",o:["Apenas crianças com altas habilidades são capazes de filosofar genuinamente","A Filosofia é muito difícil para crianças — deve ser reservada para o Ensino Médio","Crianças fazem perguntas genuinamente filosóficas e são capazes de investigação filosófica — desde que a educação não sufoque essa capacidade natural","A Filosofia deve ser ensinada apenas como lógica formal desde a infância"],a:2,c:"Lipman partiu da observação de que crianças fazem perguntas filosóficas naturalmente (\"Por que existe o mundo?\", \"O que é ser justo?\", \"Sonhos são reais?\") — e que a escola tradicional frequentemente as silencia com respostas prontas. O programa P4C (e sua versão brasileira, com adaptações de Ann Sharp e outros) busca cultivar essa capacidade filosófica natural através de narrativas filosóficas adequadas a cada faixa etária e do método da Comunidade de Investigação.",d:"Fácil"},{n:6,t:"A **filosofia decolonial** — representada por pensadores como Walter Mignolo e Enrique Dussel — critica o ensino de Filosofia centrado no cânone ocidental porque:",o:["A filosofia ocidental é intelectualmente inferior às tradições não-ocidentais","O cânone filosófico ocidental universalizou uma perspectiva particular (europeia) como universal, invisibilizando e desvalorizando outras tradições de pensamento como a africana, a ameríndia e a latino-americana","Os filósofos ocidentais foram todos racistas e não merecem ser ensinados","A filosofia ocidental é demasiado difícil para alunos de países periféricos"],a:1,c:"A crítica decolonial ao cânone não é que a filosofia ocidental é \"ruim\" — é que ela foi apresentada como *universal* quando é particular. A \"colonialidade do saber\" (Quijano) é a imposição da epistemologia europeia como o padrão do conhecimento, desqualificando outros sistemas de pensamento como \"mito\", \"crença\" ou \"folclore\". Para o ensino de Filosofia no Brasil, isso implica ampliar o cânone — não apenas adicionar autores, mas questionar os critérios de inclusão e exclusão.",d:"Fácil"},{n:7,t:"A posição de Paulo Freire sobre a **neutralidade do professor** é que:",o:["O professor deve ser rigorosamente neutro para não influenciar os alunos","A neutralidade é impossível — a educação é sempre política, e a pretensão de neutralidade frequentemente encobre a reprodução do status quo","O professor deve tomar partido explicitamente em todas as questões políticas","A neutralidade é desejável mas impossível na prática — deve ser buscada como ideal"],a:1,c:"Freire argumentou que não existe educação neutra: toda educação ou domestica (adapta os educandos à realidade existente) ou liberta (desenvolve a consciência crítica e a capacidade de transformar a realidade). A pretensão de neutralidade é, ela mesma, uma posição política — geralmente a favor da manutenção do status quo. Para Freire, o professor deve ser \"diretivo\" (ter posições filosóficas e políticas fundamentadas) sem ser \"manipulador\" (impor suas posições sem permitir o d",d:"Fácil"},{n:8,t:"A **filosofia Ubuntu** — tradição filosófica africana — expressa na frase \"**Sou porque somos**\" (*Umuntu ngumuntu ngabantu*) representa, em relação ao individualismo ocidental moderno, uma concepção:",o:["Idêntica — o individualismo e o Ubuntu chegam às mesmas conclusões por caminhos diferentes","Radicalmente diferente: o ser humano não é primeiro um indivíduo que depois entra em relação — a relacionalidade e a comunidade são constitutivas da identidade humana","Inferior — a filosofia Ubuntu não atingiu o nível de abstração da filosofia ocidental","Meramente cultural — não tem pretensão filosófica legítima"],a:1,c:"O Ubuntu representa uma concepção relacional e comunitária do ser humano que contrasta com o individualismo da modernidade ocidental (contratualismo, existencialismo). \"Sou porque somos\" inverte a prioridade ontológica: não sou primeiro um indivíduo que depois entra em relação com outros — minha humanidade é constituída pela minha relação com a comunidade. Isso ressoa com o comunitarismo ocidental (MacIntyre, Sandel) e com o ser-com heideggeriano — mas a partir de uma tradiçã",d:"Fácil"},{n:9,t:"A tensão entre ensinar Filosofia como **disciplina autônoma** e como **prática transversal** tem implicações práticas na escola porque:",o:["Disciplina autônoma requer professor especialista e tempo dedicado; transversal pode ocorrer em qualquer disciplina com qualquer professor","Disciplina autônoma é mais cara; transversal é mais econômica — a decisão é puramente financeira","São posições idênticas na prática — apenas diferem teoricamente","A BNCC eliminou completamente a tensão ao tornar a Filosofia transversal"],a:0,c:"A tensão não é apenas teórica — tem consequências organizacionais: se a Filosofia é disciplina autônoma, requer um professor com formação específica em Filosofia, horário na grade curricular e programa próprio. Se é prática transversal, pode aparecer em qualquer disciplina — mas com o risco de ser diluída e perdida. A BNCC no EF integrou as ciências humanas (incluindo Filosofia indiretamente) sem criar uma disciplina de Filosofia explícita — criando exatamente essa tensão na ",d:"Fácil"},{n:10,t:"A **indagação sobre quem pode ensinar Filosofia** é relevante nos concursos públicos porque:",o:["Qualquer professor pode ensinar Filosofia — não requer formação específica","Apenas filósofos profissionais com doutorado podem ensinar Filosofia na escola básica","O concurso avalia se o candidato tem domínio tanto dos conteúdos filosóficos quanto das dimensões pedagógicas do ensino — o perfil do professor é o de filósofo-pedagogo","A lei proíbe professores de outras áreas de ensinar Filosofia"],a:2,c:"A questão do perfil do professor de Filosofia é central: o professor precisa ser simultaneamente especialista em conteúdo filosófico (dominar os textos, os problemas, a história da filosofia) e especialista pedagógico (saber como tornar esse conteúdo acessível a adolescentes sem desfigurá-lo). O concurso para professor de Filosofia avalia exatamente essa dupla competência — daí a importância de dominar tanto os tópicos de Filosofia quanto os de ensino de Filosofia.",d:"Fácil"},{n:11,t:"A diversidade religiosa dos alunos — evangélicos, católicos, umbandistas, ateus, espíritas — representa para o ensino de Filosofia:",o:["Um obstáculo — as crenças religiosas impedem o pensamento filosófico crítico","Um fator irrelevante — a Filosofia é laica e as crenças pessoais não devem entrar na sala de aula","Uma condição de possibilidade: a pluralidade de cosmovisões na sala de aula é material privilegiado para a investigação filosófica — questões sobre Deus, sentido, moral e conhecimento ganham concretude","Um problema a ser resolvido pela doutrinação filosófica — a Filosofia deve conduzir os alunos ao ateísmo racional"],a:2,c:"A diversidade religiosa na sala de aula é, para um professor de Filosofia bem preparado, um recurso — não um obstáculo. Quando um aluno evangélico e um aluno ateu debatem sobre a existência de Deus, a questão filosófica (os argumentos a favor e contra, os limites do conhecimento, o papel da fé) ganha uma urgência e uma concretude que a leitura de um texto frio não proporciona. A Filosofia não resolve a disputa — aprende a mantê-la viva como investigação, respeitando cada pers",d:"Fácil"},{n:12,t:"As **Orientações Curriculares para o Ensino Médio — OCEMs/Filosofia** (MEC, 2006) defendem que o ensino de Filosofia deve:",o:["Focar exclusivamente na preparação dos alunos para o ENEM e o vestibular","Incluir o contato com textos filosóficos autênticos e o exercício de problematização filosófica — não apenas transmissão de informações sobre filósofos","Limitar-se ao pensamento filosófico brasileiro contemporâneo","Excluir os temas de ética e política por serem excessivamente controversos"],a:1,c:"As OCEMs/Filosofia (2006) são um documento de referência para o ensino de Filosofia no Brasil que defende: (1) que a Filosofia tem identidade disciplinar própria e não pode ser reduzida a \"temas transversais\"; (2) que o ensino deve incluir o contato com textos filosóficos autênticos; (3) que o objetivo não é informar sobre filósofos mas desenvolver a capacidade de problematizar e investigar filosoficamente. Esse documento é frequentemente cobrado em concursos de professor de ",d:"Fácil"},{n:13,t:"A relação entre Filosofia e **fake news** — um dos temas mais urgentes da atualidade — justifica o ensino de Filosofia porque:",o:["A Filosofia ensina a verificar tecnicamente a autenticidade de fontes na internet","A epistemologia e a lógica filosóficas desenvolvem a capacidade de avaliar argumentos, identificar falácias, distinguir evidência de opinião e compreender como o conhecimento é produzido — ferramentas essenciais no ambiente de desinformação contemporâneo","A Filosofia é o único antídoto para as fake news — outras disciplinas não contribuem","A Filosofia ensina os alunos a não acreditar em nada — o ceticismo é a solução"],a:1,c:"A Filosofia — especialmente a epistemologia (o que é conhecimento? o que é evidência? como se justifica uma crença?) e a lógica (como identificar falácias? o que é um argumento válido?) — fornece ferramentas conceituais para navegar no ambiente de desinformação. Não são ferramentas técnicas (verificar URLs) mas ferramentas de pensamento: reconhecer o apelo à emoção, o argumento de autoridade, a generalização apressada, a falsa dicotomia. Isso é formação filosófica com impacto",d:"Fácil"},{n:14,t:"O conceito de **\"colonialidade do saber\"** (Aníbal Quijano), aplicado ao ensino de Filosofia, implica que:",o:["A filosofia colonial foi destruída pelas potências ocidentais — e deve ser reconstruída","A epistemologia europeia foi imposta como padrão universal do conhecimento, desqualificando outros sistemas de saber como \"não-filosóficos\" — o que o ensino de Filosofia deve criticamente reconhecer e superar","O ensino de Filosofia deve rejeitar completamente a tradição filosófica ocidental","Apenas países colonizadores têm tradição filosófica legítima"],a:1,c:"A colonialidade do saber é a dimensão epistêmica da colonização: não apenas a dominação política e econômica, mas a imposição de uma hierarquia de conhecimentos — a ciência e a filosofia europeias como conhecimento \"verdadeiro\"; os saberes indígenas, africanos e asiáticos como \"mito\", \"tradição\" ou \"cultura\". Para o ensino de Filosofia no Brasil, isso implica examinar criticamente o próprio cânone filosófico: por que Aristóteles e Kant, mas não Zera Yacob (filósofo etíope do ",d:"Fácil"},{n:15,t:"A distinção entre **\"doutrinação\"** e **\"investigação filosófica comprometida\"** é relevante para o debate sobre neutralidade porque:",o:["Doutrinação e investigação são sinônimos — todo ensino é doutrinação","Doutrinação impõe posições sem permitir questionamento; investigação comprometida apresenta posições fundamentadas e encoraja os alunos a avaliar essas razões e desenvolver as suas próprias","Investigação filosófica comprometida é impossível — o professor sempre doutrina","A neutralidade absoluta é possível e preferível a qualquer forma de comprometimento"],a:1,c:"A distinção é central para resolver o debate sobre neutralidade no ensino de Filosofia: o professor não precisa fingir não ter posições filosóficas (o que seria desonesto e pedagogicamente empobrecedor) — mas deve apresentá-las como posições argumentadas, abertas à crítica, e encorajar os alunos a desenvolverem as suas próprias a partir da investigação. O contrário da doutrinação não é a neutralidade — é a investigação honesta que não impõe mas que tampouco se esquiva de toma",d:"Fácil"},{n:16,t:"A crítica de que a justificativa do **pensamento crítico** instrumentaliza a Filosofia consiste em que:",o:["O pensamento crítico é uma habilidade que outras disciplinas também desenvolvem — e a Filosofia não precisa justificar-se por algo que não é exclusivo dela","O pensamento crítico é mais importante que a Filosofia — e deveria ter uma disciplina própria","O pensamento crítico é impossível de ensinar — é uma capacidade inata","O pensamento crítico é perigoso para a ordem social — e não deve ser ensinado"],a:0,c:"Se a Filosofia se justifica apenas como desenvolvendo o pensamento crítico, qualquer outra disciplina que também o faça (Matemática — raciocínio lógico; Ciências — método científico; Literatura — análise textual) pode reivindicar o mesmo espaço. A Filosofia precisa de uma justificativa que capture o que é *especificamente* filosófico — não apenas uma habilidade genérica. Por isso a justificativa pelo valor intrínseco (a investigação filosófica sobre questões que não têm respo",d:"Média"},{n:17,t:"A proposta de **Enrique Dussel** de uma \"filosofia da libertação\" latino-americana contribui para o ensino de Filosofia no Brasil ao:",o:["Propor que a filosofia europeia deve ser traduzida para o contexto latino-americano sem modificações","Oferecer uma perspectiva filosófica que parte da experiência concreta dos oprimidos e excluídos da América Latina — o \"outro\" excluído pelo sistema euro-centrado — como ponto de partida legítimo para a reflexão filosófica","Demonstrar que a América Latina não tem tradição filosófica autóctone","Sugerir que a filosofia política de Rawls é suficiente para a realidade latino-americana"],a:1,c:"Dussel (1934–) desenvolveu a filosofia da libertação como resposta ao eurocentrismo filosófico: a filosofia genuinamente latino-americana deve partir da experiência da exterioridade — do \"outro\" excluído pelo sistema (o pobre, o índio, a mulher, o escravo) — e não apenas aplicar categorias europeias à realidade local. Para o ensino de Filosofia no Brasil, isso significa incluir a perspectiva dos oprimidos históricos (negros escravizados, indígenas, mulheres, trabalhadores) co",d:"Média"},{n:18,t:"A **articulação entre história da Filosofia e problemas filosóficos** — defendida como posição mais equilibrada — funciona pedagogicamente quando:",o:["O professor ensina primeiro toda a história da filosofia e depois aplica aos problemas contemporâneos","O professor parte de um problema genuinamente sentido pelos alunos, apresenta como a tradição filosófica o enfrentou, e retorna ao problema com as ferramentas conceituais adquiridas","O professor alterna aulas de história da filosofia com aulas de problemas sem conexão entre elas","Os alunos pesquisam os filósofos e depois os problemas — sem mediação do professor"],a:1,c:"A articulação efetiva funciona num movimento espiral: problema (ponto de partida vivido pelo aluno) → tradição (como a filosofia já pensou esse problema) → retorno ao problema com novas ferramentas conceituais. Esse movimento respeita tanto a especificidade filosófica (a tradição não pode ser ignorada) quanto a relevância pedagógica (o ponto de partida deve ser genuinamente significativo para o aluno). Isso é diferente tanto do \"ensina a tradição primeiro\" quanto do \"parte do",d:"Média"},{n:19,t:"A presença crescente de alunos com **diferentes identidades de gênero e orientações sexuais** nas salas de aula de Filosofia cria a oportunidade de:",o:["Evitar o tema — a Filosofia deve ser neutra quanto a questões de identidade","Trabalhar filosoficamente questões sobre identidade, corpo, reconhecimento, norma e poder — usando recursos da filosofia feminista (Beauvoir, Butler), da fenomenologia do corpo (Merleau-Ponty) e da teoria do reconhecimento (Honneth) — com rigor e respeito à diversidade","Ensinar apenas a posição \"tradicional\" sobre gênero para não gerar conflitos","Delegar o tema para o professor de Biologia — que trata do corpo científicamente"],a:1,c:"A filosofia tem recursos conceituais diretamente relevantes para questões de identidade de gênero e sexualidade: Beauvoir (\"não se nasce mulher — torna-se\") questiona a naturalização do gênero; Butler (*Gender Trouble*, 1990) analisa o gênero como performance; Merleau-Ponty e sua fenomenologia do corpo vivido; Honneth e as lutas por reconhecimento. Trabalhar esses temas com rigor filosófico — respeitando a diversidade dos alunos — é exatamente o que o ensino de Filosofia genu",d:"Média"},{n:20,t:"A **\"banalidade do mal\"** de Arendt é relevante para justificar o ensino de Filosofia porque:",o:["Prova que os filósofos são naturalmente mais éticos que os não-filósofos","Mostra que a incapacidade de pensar criticamente — de se colocar no lugar do outro e refletir sobre as consequências das próprias ações — permite que pessoas comuns participem de atrocidades","Demonstra que a Filosofia é capaz de prevenir guerras e genocídios","Justifica a punição dos alunos que se recusam a pensar criticamente"],a:1,c:"A análise de Eichmann por Arendt é um dos argumentos mais poderosos para a justificativa ética do ensino de Filosofia: o mal mais devastador do século XX não foi cometido por monstros sádicos mas por burocratas que simplesmente não pensavam. Se o pensamento crítico — a capacidade de se colocar no lugar do outro, de questionar ordens, de imaginar consequências — é condição da moralidade, então desenvolvê-lo é uma responsabilidade educacional urgente. A Filosofia, especialmente",d:"Média"},{n:21,t:"A crítica de que o cânone filosófico ocidental é **\"exclusivamente branco e masculino\"** é uma simplificação porque:",o:["As mulheres sempre foram bem representadas na tradição filosófica","O cânone inclui pensadores de múltiplas culturas — gregos, árabes, medievais e modernos","A observação é correta quanto ao cânone *selecionado* pela tradição acadêmica europeia dos séculos XVIII-XX — mas houve mulheres filósofas (Hipatia, Sor Juana, Wollstonecraft) e pensadores não-europeus (Averróis, Maimônides, Nagarjuna) que foram sistematicamente excluídos ou marginalizados","O cânone não é branco nem masculino — é simplesmente o conjunto dos melhores filósofos da história"],a:2,c:"A crítica ao cânone não é que não existiram filósofas e pensadores não-europeus — é que foram sistematicamente excluídos do cânone *selecionado* pela academia europeia moderna. Hipatia (séc. IV d.C., matemática e filósofa alexandrina), Sor Juana Inés de la Cruz (séc. XVII, filósofa e poetisa mexicana), Mary Wollstonecraft (séc. XVIII, filósofa feminista) existiram — mas foram excluídas do \"cânone\". Da mesma forma, Averróis (filósofo árabe medieval) influenciou profundamente a",d:"Média"},{n:22,t:"O **perspectivismo ameríndio** de Eduardo Viveiros de Castro — a ideia de que nas cosmologias ameríndias todos os seres vivos são pessoas com perspectivas sobre o mundo, e que o que muda entre eles é o corpo, não a alma — pode ser usado no ensino de Filosofia para:",o:["Demonstrar que os indígenas são cientificamente incorretos sobre a natureza dos animais","Introduzir uma perspectiva filosófica radicalmente diferente sobre as noções de natureza/cultura, sujeito/objeto, e perspectiva — questionando pressupostos da ontologia ocidental","Ensinar biologia a partir de uma perspectiva cultural equivocada","Mostrar que a filosofia indígena é inferior à filosofia ocidental por não ter desenvolvido a lógica formal"],a:1,c:"O perspectivismo ameríndio (Viveiros de Castro o chama de \"multinaturalismo\" — em oposição ao multiculturalismo ocidental) propõe que, para as cosmologias ameríndias, todos os seres compartilham a mesma cultura (perspectiva subjetiva) mas têm naturezas (corpos) diferentes. Isso inverte a ontologia ocidental (uma natureza, muitas culturas). Introduzido na aula de Filosofia, provoca uma crise epistemológica produtiva: e se a separação natureza/cultura for um pressuposto ocident",d:"Média"},{n:23,t:"A tensão entre **filosofia da educação** (reflexão teórica sobre os fins e métodos da educação) e **didática da filosofia** (reflexão sobre como ensinar filosofia concretamente) pode ser descrita como:",o:["São idênticas — toda reflexão sobre educação é também didática","A filosofia da educação pergunta *para que* e *o quê* ensinar; a didática da filosofia pergunta *como* ensinar — são complementares e igualmente necessárias para o professor de Filosofia","A didática é superior — o como é mais importante que o porquê","A filosofia da educação é superior — o professor não precisa de didática se tiver bases filosóficas sólidas"],a:1,c:"A distinção é analítica e pedagogicamente produtiva: a filosofia da educação investiga os fundamentos e fins da educação filosófica (por que ensinar Filosofia? o que é uma boa educação filosófica?); a didática da filosofia investiga os métodos, materiais e estratégias para tornar o ensino de Filosofia efetivo no contexto concreto da sala de aula. Um professor de Filosofia precisa das duas: sem filosofia da educação, a didática é técnica vazia; sem didática, a filosofia da edu",d:"Média"},{n:24,t:"A questão do **uso de filmes, músicas e obras de arte populares** no ensino de Filosofia é controversa porque:",o:["Esses materiais são necessariamente inferiores aos textos filosóficos — nunca devem ser usados","São sempre superiores aos textos filosóficos — mais acessíveis e motivadores","Podem ser recursos poderosos quando usam o artefato cultural como ponto de partida para uma problematização genuinamente filosófica — o risco é que a \"cultura pop\" substitua o filosofar em vez de introduzi-lo","São proibidos pelas OCEMs — apenas textos filosóficos autênticos são permitidos"],a:2,c:"O uso de filmes, músicas e memes no ensino de Filosofia é pedagogicamente legítimo quando cumpre um papel: o artefato cultural levanta uma questão filosófica genuína que é então investigada com rigor. *Matrix* pode introduzir o problema do ceticismo; *Divertida Mente* pode introduzir a filosofia da mente; *O Senhor das Moscas* pode introduzir a filosofia política de Hobbes. O problema é quando o filme substitui o filosofar — quando a aula de Filosofia vira \"aula de cinema\" se",d:"Média"},{n:25,t:"A proposta de **Gilles Deleuze** (*O que é Filosofia?*, 1991, com Félix Guattari) de que a Filosofia é a **criação de conceitos** tem implicações para o ensino porque:",o:["Prova que a Filosofia é inútil — conceitos são abstrações sem valor prático","Sugere que o ensino de Filosofia não deve ser transmissão de conceitos prontos, mas o desenvolvimento da capacidade de criar conceitos para enfrentar problemas — o aluno como criador, não apenas consumidor de filosofia","A criação de conceitos é uma atividade exclusiva dos filósofos profissionais — os alunos devem apenas aprender os conceitos existentes","Deleuze defende que a Filosofia deve ser substituída pela ciência na escola"],a:1,c:"A definição deleuziana de Filosofia como criação de conceitos tem implicações pedagógicas radicais: se a Filosofia não é um corpo de conhecimentos a ser transmitido mas uma prática de criação conceitual, então o ensino de Filosofia genuíno não consiste em transmitir os conceitos de Platão e Kant para que os alunos os repitam — consiste em desenvolver a capacidade de criar conceitos diante de problemas. O aluno como filósofo — não como receptor de filosofia. Isso ressoa com Li",d:"Média"},{n:26,t:"A **avaliação em Filosofia** é uma das indagações mais práticas e difíceis porque:",o:["É impossível avaliar Filosofia — a disciplina não permite critérios objetivos","A avaliação deve ser apenas por prova escrita com questões de múltipla escolha","A avaliação filosófica enfrenta o desafio de avaliar o processo de pensar — não apenas o produto — o que exige critérios como qualidade da argumentação, capacidade de problematizar e disposição para revisar posições à luz de razões","A melhor avaliação em Filosofia é a memorização dos principais filósofos e suas doutrinas"],a:2,c:"A avaliação em Filosofia é um problema pedagógico genuíno: o que a Filosofia busca desenvolver (pensamento crítico, disposição para questionar, qualidade da argumentação) é difícil de avaliar por instrumentos convencionais (múltipla escolha, memorização). Uma avaliação filosófica coerente avalia: a qualidade do argumento (não apenas a conclusão), a capacidade de identificar e problematizar pressupostos, a disposição para considerar objeções e revisar posições. Isso pode ser f",d:"Média"},{n:27,t:"A presença das **redes sociais** como contexto de formação dos adolescentes representa para o ensino de Filosofia:",o:["Um obstáculo intransponível — a filosofia é incompatível com o tempo curto das redes","Um contexto que torna o ensino de Filosofia mais urgente e ao mesmo tempo mais desafiador: as redes criam \"bolhas epistêmicas\" e favorecem o raciocínio emocional rápido — enquanto a Filosofia exige atenção sustentada, análise lenta e abertura para perspectivas diferentes","Uma oportunidade exclusivamente positiva — as redes democratizam o acesso à Filosofia","Um tema proibido na escola — questões sobre tecnologia pertencem à Informática"],a:1,c:"As redes sociais criam um ambiente epistêmico desafiador para a Filosofia: algoritmos que reforçam crenças existentes (bolhas), viralização de emoção sobre argumentação, cultura do clique que valoriza a posição rápida sobre a reflexão lenta. A Filosofia — que exige atenção sustentada, leitura cuidadosa, análise de argumentos e disposição para mudar de posição — vai *contra* a gramática das redes. Mas ao mesmo tempo, as questões que surgem das redes (privacidade, verdade, iden",d:"Média"},{n:28,t:"A **formação do professor de Filosofia** no Brasil enfrenta o problema de que os cursos de Licenciatura em Filosofia frequentemente privilegiam:",o:["A pedagogia em detrimento da Filosofia — os professores saem sem dominar os conteúdos filosóficos","A Filosofia acadêmica em detrimento da pedagogia — formando \"mini-filósofos\" que dominam os textos mas têm dificuldade de trabalhar com adolescentes do EF e EM","Nenhum dos dois — os cursos de Filosofia são completamente inadequados","A Filosofia prática em detrimento da teórica — os professores não conhecem a história da filosofia"],a:1,c:"O problema clássico da formação de professores de Filosofia no Brasil (e em outros países): os cursos de Licenciatura tendem a ser organizados como versões reduzidas do Bacharelado — com foco nos textos canônicos, na história da filosofia e na pesquisa acadêmica — com pouca atenção à transposição didática, às metodologias específicas do ensino de Filosofia e às particularidades do público adolescente. O resultado é professores que dominam Hegel mas não sabem como trabalhar co",d:"Média"},{n:29,t:"A questão da **filosofia como prática de si** — relacionada à leitura tardia de Foucault sobre o cuidado de si na Antiguidade — sugere para o ensino que:",o:["A Filosofia deve ser ensinada como técnica terapêutica para resolver problemas psicológicos","Além da reflexão conceitual, a Filosofia tem uma dimensão de transformação do sujeito: filosofar genuinamente transforma o modo como o filósofo (e o aluno) vê e age no mundo","O cuidado de si é uma prática privada que não pertence ao espaço escolar","Foucault defende que a escola deve substituir a terapia psicológica"],a:1,c:"A leitura foucaultiana das práticas de si antigas sugere que a Filosofia não é apenas produção de conhecimento — é transformação do sujeito. Sócrates não apenas informava seus interlocutores — os transformava pelo exame. A *askesis* filosófica (conjunto de práticas de si) transforma o modo de ver e agir. Para o ensino, isso implica que a Filosofia não é apenas uma disciplina cognitiva — é uma prática existencial. O aluno que genuinamente filosofou sobre ética, liberdade ou id",d:"Média"},{n:30,t:"A proposta de trabalhar com **\"questões filosóficas genuínas\"** dos alunos — em vez de um programa predeterminado — enfrenta o risco de:",o:["Produzir investigações filosóficas muito mais profundas do que o programa tradicional","Superficialidade ou dispersão: sem a âncora da tradição filosófica, as \"questões genuínas\" podem permanecer no nível do senso comum — sem o aprofundamento conceitual que distingue o filosófico do coloquial","Ser proibida pelas OCEMs — que exigem um programa predeterminado","Tornar o professor desnecessário — os alunos investigam sozinhos"],a:1,c:"O risco do \"partir das questões dos alunos\" sem âncora na tradição filosófica é o de que as discussões permaneçam no nível do senso comum — interessantes, mas não filosóficas. \"Existe Deus?\" é uma questão filosófica — mas discuti-la sem conhecer os argumentos de Anselmo, Tomás, Hume e Kant é diferente de discuti-la com esses recursos. O papel da tradição filosófica no ensino não é impor um programa — é fornecer ferramentas conceituais que aprofundem a investigação das questõe",d:"Média"},{n:31,t:"A filosofia de **Frantz Fanon** (*Os Condenados da Terra*, 1961) é relevante para o ensino de Filosofia no Brasil porque:",o:["É irrelevante — Fanon era psiquiatra, não filósofo","Fanon analisa filosoficamente a experiência do colonizado — a violência colonial, a alienação racial e a necessidade de descolonização cultural e psicológica — questões diretamente relevantes para alunos negros no Brasil","Fanon defende posições filosóficas que contradizem a Filosofia da Libertação de Dussel","A obra de Fanon é excessivamente violenta para ser trabalhada com adolescentes"],a:1,c:"Fanon (martinicano, formado em psiquiatria, engajado na luta argelina pela independência) produziu análises filosóficas fundamentais sobre o racismo, a colonização e a descolonização. *Os Condenados da Terra* e *Pele Negra, Máscaras Brancas* (1952) analisam filosoficamente como o colonialismo não apenas domina materialmente — mas coloniza a psique e a identidade do colonizado. Para alunos negros no Brasil — que vivem o racismo estrutural — a leitura de Fanon pode ser uma expe",d:"Média"},{n:32,t:"A **articulação entre Filosofia e o cotidiano do aluno** — princípio pedagógico recorrente — deve ser compreendida como:",o:["Falar sempre sobre temas \"populares\" (futebol, redes sociais, celebridades) para \"atrair\" os alunos para a Filosofia","Partir de situações, questões e experiências concretas dos alunos como ponto de entrada para questões filosóficas — sem permanecer no cotidiano, mas usando-o como trampolim para o filosófico","Limitar o ensino de Filosofia ao que é imediatamente útil para a vida prática dos alunos","Substituir os textos filosóficos por notícias de jornal e posts de redes sociais"],a:1,c:"A articulação com o cotidiano é um princípio pedagógico — não um fim em si mesmo. O cotidiano serve como ponto de entrada para a interrogação filosófica: a injustiça vivida na escola pode introduzir Rawls; o dilema do celular confiscado pode introduzir o debate liberdade/autoridade; a questão \"por que obedecer às regras?\" pode introduzir o contratualismo. Mas a Filosofia não se limita ao cotidiano — ela vai além, com recursos conceituais que o cotidiano não tem. O cotidiano é",d:"Média"},{n:33,t:"A crítica de **Walter Mignolo** ao \"pensamento fronteiriço\" (*border thinking*) como alternativa ao eurocentrismo filosófico propõe que:",o:["A filosofia deve ser desenvolvida nas fronteiras geográficas entre países","O pensamento produzido nas bordas do sistema colonial — a partir da experiência da diferença colonial — tem uma capacidade epistêmica específica: pode pensar simultaneamente com e contra a modernidade/colonialidade, gerando perspectivas impossíveis de dentro do centro","A filosofia deve eliminar todas as fronteiras entre as culturas","O pensamento fronteiriço é inferior ao pensamento central por ser híbrido"],a:1,c:"Mignolo propõe que a posição epistêmica dos colonizados/subalternizados tem uma vantagem específica: por estar numa \"fronteira\" — dentro da modernidade (pela colonização) e fora dela (pela diferença colonial) — pode ver o sistema de um ângulo que o centro não pode. O pensamento produzido nessa posição (como o de Dussel, de Fanon, dos pensadores indígenas) não é apenas \"diferente\" — é epistêmica e filosoficamente mais rico por sua capacidade de questionar os pressupostos que o",d:"Média"},{n:34,t:"A questão **\"A Filosofia tem respostas ou apenas perguntas?\"** levantada frequentemente por alunos adolescentes é ela mesma uma questão filosófica relevante que o professor pode usar para:",o:["Encerrar a discussão explicando que a Filosofia não tem respostas — apenas perguntas","Encerrar a discussão explicando que a Filosofia tem respostas — apenas mais complexas que as da ciência","Iniciar uma investigação filosófica sobre a natureza das questões filosóficas, o que conta como resposta filosófica e como a Filosofia difere da ciência, da religião e do senso comum","Ignorar — é uma questão ingênua que revela falta de familiaridade com a Filosofia"],a:2,c:"Esta é uma questão paradigmática de como tratar perguntas \"ingênuas\" dos alunos filosoficamente: a pergunta sobre se a Filosofia tem respostas ou apenas perguntas é ela mesma uma questão filosófica sobre a natureza da Filosofia. Usá-la como ponto de entrada permite investigar: o que é uma questão filosófica? O que distingue respostas filosóficas de respostas científicas, religiosas e do senso comum? Por que algumas questões permanecem abertas? Isso transforma a \"ingenuidade\" ",d:"Média"},{n:35,t:"A **BNCC** (2017) ao organizar as competências gerais sem criar uma disciplina explícita de Filosofia no EF Anos Finais cria uma tensão com as **OCEMs/Filosofia** (2006) porque:",o:["As OCEMs são anteriores à BNCC e foram revogadas por ela","As OCEMs defendem a identidade disciplinar da Filosofia com professor especialista e programa próprio; a BNCC integra as ciências humanas numa área sem garantir a especificidade filosófica — criando o risco de que a Filosofia seja absorvida ou diluída","São documentos completamente alinhados — não há tensão","A BNCC é superior às OCEMs e devem ser seguidas exclusivamente"],a:1,c:"A tensão é real e tem consequências práticas: as OCEMs (documento de referência para o EM) defendem que a Filosofia tem identidade disciplinar própria, requer professor especialista com licenciatura em Filosofia e deve incluir o contato com textos filosóficos autênticos. A BNCC integrou as ciências humanas (História, Geografia, Sociologia e Filosofia) numa área sem garantir a especificidade de cada componente — criando o risco de que \"áreas de ciências humanas\" seja interpret",d:"Média"},{n:36,t:"Considere as afirmações sobre as indagações do ensino de Filosofia:  I. A justificativa pelo valor intrínseco da Filosofia é a mais fraca porque não produz resultados mensuráveis. II. A neutralidade do professor é uma posição filosófica — e frequentemente uma posição política que favorece a manutenção do status quo. III. A articulação entre história da filosofia e problemas filosóficos é a posição mais equilibrada para o ensino de Filosofia.  Estão corretas:",o:["Apenas I","Apenas II e III","Apenas I e III","I, II e III"],a:1,c:"I é **falsa** como formulada: a justificativa pelo valor intrínseco pode ser a mais profunda filosoficamente — o fato de que é difícil de mensurar não a torna \"a mais fraca\". O que é \"fraco\" filosoficamente é reduzir o valor de uma atividade humana à sua mensurabilidade. II é **verdadeira**: esta é a posição de Freire e de outros teóricos críticos — a pretensão de neutralidade é uma posição que, ao não questionar, favorece o que está estabelecido. III é **verdadeira**: a arti",d:"Difícil"},{n:37,t:"A análise de **Pierre Bourdieu** sobre o **capital cultural** e o campo educacional tem implicações para o ensino de Filosofia porque:",o:["Prova que a Filosofia é uma disciplina elitista que deve ser democratizada","Mostra que o ensino de Filosofia \"neutro\" — centrado no cânone ocidental e na linguagem filosófica técnica — favorece os alunos com maior capital cultural (familiarizados com esse universo em casa) e dificulta os de menor capital cultural — reproduzindo desigualdades sociais","Demonstra que a Filosofia deve ser simplificada para ser acessível a todos","É irrelevante para a Filosofia — Bourdieu analisou apenas o campo científico"],a:1,c:"Bourdieu (*A Reprodução*, 1970, com Passeron) analisou como a escola reproduz as desigualdades sociais ao tratar como \"natural\" o capital cultural das classes dominantes. Para a Filosofia, isso implica que um ensino centrado no cânone ocidental em linguagem técnica não é neutro — favorece os alunos que já estão familiarizados com essa tradição (geralmente de famílias de maior capital cultural). Uma pedagogia filosófica democratizadora deve ser sensível a essas desigualdades —",d:"Difícil"},{n:38,t:"A proposta de **filosofia intercultural** — articulada por autores como Raúl Fornet-Betancourt — vai além do multiculturalismo ao propor que:",o:["As diferentes culturas devem coexistir sem se comunicar — para preservar suas especificidades","A Filosofia deve partir do diálogo genuíno entre tradições culturais diferentes — não apenas \"adicionar\" culturas não-ocidentais ao cânone, mas transformar a própria concepção de Filosofia pelo encontro intercultural","A Filosofia intercultural é impossível — as tradições são incomensuráveis","Apenas os países com tradição filosófica estabelecida podem contribuir para o diálogo intercultural"],a:1,c:"A filosofia intercultural (Fornet-Betancourt, Wimmer) vai além do multiculturalismo (que reconhece a pluralidade cultural mas mantém o cânone ocidental como referência): propõe que o encontro genuíno entre tradições filosóficas diferentes transforma a própria Filosofia. Não se trata de \"adicionar\" o Ubuntu ao currículo ao lado de Aristóteles — mas de deixar que o encontro com o Ubuntu transforme a compreensão de Aristóteles e vice-versa. Isso exige um diálogo real, não uma in",d:"Difícil"},{n:39,t:"A questão da **instrumentalização política da Filosofia** — tanto da esquerda (Filosofia como ferramenta de libertação — Freire) quanto da direita (Filosofia como \"marxismo cultural\" a ser combatido) — coloca o professor de Filosofia numa posição de:",o:["Deve evitar qualquer conexão política — a Filosofia é puramente teórica","Deve escolher explicitamente um lado político e ensiná-lo aos alunos","Deve manter a investigação filosófica como seu compromisso central — o que significa nem instrumentalizar a Filosofia para nenhum projeto político, nem abdicar das questões filosóficas sobre poder, justiça e opressão que são centrais à tradição","Deve denunciar qualquer leitura política da Filosofia como equivocada"],a:2,c:"A instrumentalização da Filosofia — seja pela esquerda (como ferramenta de conscientização) ou pela direita (como \"ideologia\" a ser combatida) — desfigura a atividade filosófica genuína. O compromisso central do professor de Filosofia é com a investigação rigorosa, honesta e aberta — que inclui as questões sobre poder, justiça e opressão (que são genuinamente filosóficas) sem reduzi-las a posições partidárias predeterminadas. Isso não é neutralidade — é fidelidade ao que a Fi",d:"Difícil"},{n:40,t:"A análise de **Theodor Adorno** (*Educação após Auschwitz*, 1967) sobre o papel da educação no pós-Holocausto tem implicações diretas para o ensino de Filosofia porque:",o:["Prova que a educação filosófica falhou completamente e deve ser abandonada","A primeira exigência da educação é que Auschwitz não se repita — e isso requer desenvolver a capacidade de reflexão autônoma, de resistência à conformidade e de empatia que o Holocausto revelou como ausentes","A educação após Auschwitz deve focar exclusivamente na memória histórica do evento","A filosofia deve ser ensinada apenas aos adultos — as crianças são muito frágeis"],a:1,c:"\"Educação após Auschwitz\" (1967) é um dos textos mais importantes da filosofia da educação do século XX: Adorno argumenta que a primeira exigência de qualquer educação é que Auschwitz não se repita. Isso não é uma demanda óbvia — exige identificar as condições psicológicas e sociais que permitiram o Holocausto (conformidade, obediência cega, incapacidade de empatia, pensamento instrumental) e desenvolver uma educação que as combata. Para o ensino de Filosofia, isso implica: d",d:"Difícil"},{n:41,t:"A **reforma do Ensino Médio** (Lei 13.415/2017) que tornou a Filosofia componente optativo — e sua reversão pela **Lei 14.892/2024** que a reobrigou — ilustra filosoficamente que:",o:["As decisões sobre o currículo escolar são puramente técnicas — sem dimensão política","O lugar da Filosofia no currículo é objeto de disputa política e cultural — refletindo diferentes concepções sobre o papel da educação, da formação cidadã e do pensamento crítico numa democracia","A Filosofia é irrelevante para o currículo — a decisão de incluí-la ou excluí-la é indiferente","As leis educacionais são sempre coerentes com os princípios filosóficos da BNCC"],a:1,c:"O vai-e-vem legislativo da Filosofia no EM é um dado empírico que tem profundo significado filosófico: ele revela que o currículo escolar não é uma questão técnico-pedagógica neutra — é um espaço de disputa política e cultural sobre o tipo de cidadão que a escola deve formar. A retirada da Filosofia em 2017 foi criticada como tentativa de reduzir a educação a competências de mercado; sua reintrodução em 2024 foi defendida como reconhecimento de sua importância para a formação",d:"Difícil"},{n:42,t:"A proposta de trabalhar com **\"textos gatilho\"** (*trigger texts*) — textos curtos e provocadores que levantam questões filosóficas sem respondê-las — como alternativa aos textos canônicos extensos é pedagogicamente justificável quando:",o:["Os alunos recusam completamente a leitura — é uma capitulação pedagógica","O texto gatilho cumpre a função de provocar o problema filosófico genuíno, que é então investigado com rigor — eventualmente recorrendo à tradição filosófica como recurso","O texto gatilho substitui completamente os textos filosóficos autênticos — tornando o ensino mais \"moderno\"","É proibida pelas OCEMs — que exigem textos filosóficos canônicos extensos"],a:1,c:"O \"texto gatilho\" é uma estratégia didática legítima quando bem usada: um fragmento de texto, uma notícia, um conto, um experimento mental pode provocar uma questão filosófica genuína que o aluno então investiga — eventualmente chegando aos textos canônicos como recursos para aprofundamento. O problema não é usar textos curtos ou acessíveis — é usar esses textos como substituto, e não como entrada, para a investigação filosófica mais aprofundada. A distinção é entre o texto c",d:"Difícil"},{n:43,t:"A indagação sobre se **alunos evangélicos podem questionar a existência de Deus** numa aula de Filosofia toca num problema pedagógico e filosófico porque:",o:["A Filosofia é ateísta — os alunos religiosos devem ser convertidos ao ateísmo racional","A Filosofia investiga a questão da existência de Deus como problema genuíno, apresentando argumentos a favor e contra sem exigir que o aluno abandone sua fé — o objetivo é desenvolver a capacidade de examinar racionalmente as crenças, não destruí-las","A questão da existência de Deus não pertence à Filosofia — é matéria de religião","O professor deve evitar completamente o tema para não gerar conflito com os alunos religiosos"],a:1,c:"A questão da existência de Deus é um dos problemas filosóficos mais centrais da tradição — dos argumentos de Anselmo e Tomás, ao ceticismo de Hume, ao problema do mal, à morte de Deus de Nietzsche. Um aluno evangélico pode (e deve, numa aula de Filosofia) examinar racionalmente os argumentos a favor e contra — sem que isso implique abandonar sua fé. A Filosofia não exige conclusões — exige que o processo de investigação seja racional, honesto e aberto. Um aluno que mantém sua",d:"Difícil"},{n:44,t:"A posição de **Sílvio Gallo** — importante filósofo da educação brasileiro — de que o ensino de Filosofia deve criar as condições para que o aluno **\"faça experiência do pensar\"** implica que:",o:["O ensino de Filosofia é apenas sobre sentimentos e experiências subjetivas","A aula de Filosofia bem-sucedida não é aquela em que o aluno aprendeu o conteúdo de Kant — mas aquela em que o aluno vivenciou o processo de pensar filosoficamente: foi perturbado por um problema, investigou com rigor, formulou posições, encontrou objeções, revisou","Os conteúdos filosóficos são irrelevantes — apenas a experiência do pensar importa","Fazer experiência do pensar é exclusivo de alunos com altas habilidades"],a:1,c:"Sílvio Gallo (influenciado por Deleuze e pela tradição da filosofia da diferença) defende que a medida do sucesso de uma aula de Filosofia não é o quanto de conteúdo o aluno reteve — mas se o aluno *experienciou o pensamento filosófico*: se foi perturbado por um problema que não consegue simplesmente resolver, se investigou com rigor, se sua perspectiva foi transformada pelo processo. Isso não implica que o conteúdo é irrelevante — mas que o conteúdo deve ser o veículo da exp",d:"Difícil"},{n:45,t:"A proposta de **Jorge Larrosa** sobre a **\"experiência\"** como categoria pedagógica — em oposição à \"informação\" e ao \"experimento\" — é relevante para o ensino de Filosofia porque:",o:["A experiência filosófica é aquela que passa pelo sujeito e o transforma — diferente da simples aquisição de informações sobre filosofia ou da execução de exercícios filosóficos como técnica","A experiência é impossível na escola — o ambiente escolar impede a experiência genuína","A experiência deve substituir completamente o conteúdo filosófico nas aulas","A proposta de Larrosa é incompatível com a de Freire — não podem ser usadas juntas"],a:0,c:"Larrosa (*Notas sobre a Experiência e o Saber da Experiência*, 2001) distingue a experiência (que passa pelo sujeito, o toca, o transforma — \"ex-periri\", atravessar o perigo) da informação (que passa pelo sujeito sem deixar marca) e do experimento (controlado, previsível, sem risco). Para o ensino de Filosofia, isso é fundamental: uma aula de Filosofia bem-sucedida não é aquela que informou o aluno sobre Platão — é aquela em que o aluno foi genuinamente tocado por uma questão",d:"Difícil"},{n:46,t:"A indagação sobre **como avaliar o desenvolvimento do pensamento filosófico** dos alunos sem reduzir a avaliação à memorização é respondida mais adequadamente por:",o:["Eliminar completamente a avaliação em Filosofia — ela é incompatível com a liberdade filosófica","Manter a prova objetiva com questões sobre os filósofos — é o mais justo e objetivo","Usar instrumentos avaliativos que captem o processo de pensar — redações filosóficas com critérios explícitos de qualidade argumentativa, portfólios, debates avaliados, análise de textos — privilegiando a qualidade do argumento sobre a correção da conclusão","Avaliar apenas pela participação oral nas discussões — a escrita não pertence à Filosofia"],a:2,c:"A avaliação filosófica coerente com os objetivos do ensino de Filosofia deve privilegiar a qualidade do processo de pensar — não apenas a memorização de conteúdos ou a adesão a posições \"corretas\". Instrumentos como redações filosóficas (com critérios explícitos: clareza conceptual, qualidade da argumentação, consideração de objeções, revisão à luz de razões), portfólios de investigação, debates avaliados pela qualidade argumentativa, e análise de textos filosóficos captam me",d:"Difícil"},{n:47,t:"A **filosofia do cotidiano** — abordagem que parte de situações, objetos e experiências da vida diária para investigações filosóficas — tem uma história filosófica que inclui:",o:["Apenas o pragmatismo de Dewey — não há outras referências filosóficas","O método socrático (partir de exemplos concretos), a fenomenologia husserliana (retornar às coisas mesmas da experiência vivida), o pragmatismo de Dewey (aprendizagem pela experiência) e a pedagogia freiriana (partir da realidade dos alunos) — uma tradição ampla e diversa","Apenas a pedagogia freiriana — as outras correntes são elitistas","Apenas a analítica da linguagem ordinária — que analisa o uso cotidiano das palavras"],a:1,c:"A abordagem do cotidiano no ensino de Filosofia tem raízes em múltiplas tradições: o método socrático parte de casos concretos e do exame de opiniões cotidianas; a fenomenologia husserliana quer retornar às \"coisas mesmas\" antes de qualquer teorização; o pragmatismo de Dewey coloca a experiência vivida como ponto de partida e de chegada; Freire parte da \"realidade concreta dos alunos\" e de suas \"situações-limite\". Essa convergência de tradições muito diferentes sugere que a a",d:"Difícil"},{n:48,t:"A **presença de filósofas** como **Hipatia** (séc. IV d.C.), **Sor Juana Inés de la Cruz** (séc. XVII) e **Mary Wollstonecraft** (séc. XVIII) no currículo de Filosofia contribui para:",o:["Demonstrar que as mulheres sempre foram bem representadas na filosofia","Substituir os filósofos homens por mulheres — um processo de inversão do cânone","Mostrar que houve mulheres que filosofaram mesmo em contextos que sistematicamente excluíam as mulheres do saber — e que sua ausência do cânone é resultado de escolhas históricas, não de incapacidade","Cumprir uma cota de gênero exigida pela legislação educacional"],a:2,c:"A presença de filósofas no currículo não é cota ou inversão — é correção de um viés histórico. Hipatia foi matemática e filósofa neoplatônica em Alexandria (séc. IV) e foi assassinada por uma multidão cristã. Sor Juana Inés de la Cruz (séc. XVII, México) produziu reflexões filosóficas e teológicas de altíssimo nível numa época e lugar que proibiam às mulheres o acesso ao saber. Wollstonecraft escreveu *A Vindicação dos Direitos das Mulheres* (1792) — um texto filosófico funda",d:"Difícil"},{n:49,t:"A indagação sobre **o que a Filosofia pode oferecer que outras disciplinas não oferecem** é respondida mais adequadamente por:",o:["A Filosofia oferece conteúdos mais importantes que os das outras disciplinas","A Filosofia é a única disciplina que torna o seu próprio método e seus próprios pressupostos objetos de investigação — o único componente curricular que pode e deve perguntar \"por que estou aprendendo isso?\" e \"o que conta como conhecimento?\"","A Filosofia oferece entretenimento intelectual que torna a escola mais agradável","A Filosofia não oferece nada único — pode ser substituída por qualquer outra disciplina"],a:1,c:"O que é específico da Filosofia como disciplina escolar — e que justifica sua presença irredutível a qualquer outra — é sua capacidade de tornar o próprio conhecimento e os próprios métodos objeto de investigação. Nenhuma outra disciplina pergunta sistematicamente: \"o que é conhecimento? o que é prova? o que é válido? o que é verdadeiro? o que é justo?\" — essas são questões filosóficas de segunda ordem que estão na base de todas as outras disciplinas. A Filosofia é o espaço c",d:"Difícil"},{n:50,t:"Um professor de Filosofia no EF Anos Finais quer responder à pergunta de um aluno: **\"Professor, por que estudar Filosofia se ela não serve para nada?\"** A resposta mais filosoficamente rica e pedagogicamente eficaz é:",o:["\"A Filosofia serve para o mercado de trabalho — desenvolve habilidades cognitivas\"","\"A pergunta que você fez já é uma questão filosófica — 'para que serve algo?' é exatamente o tipo de questão que a Filosofia investiga. E quando você pergunta isso sobre a Filosofia, está filosofando. Vamos investigar juntos: o que significa 'servir para algo'? O que tem valor apenas pelo que produz? Há coisas valiosas em si mesmas?\"","\"Porque está no currículo e é obrigatória\"","\"Você está certo — a Filosofia não tem utilidade prática, mas é parte da formação cultural\""],a:1,c:"Esta questão final é paradigmática: a pergunta \"para que serve a Filosofia?\" é ela mesma uma questão filosófica sobre valor, utilidade e fins. Um professor filosófico genuíno não responde defensivamente (justificando a utilidade da Filosofia para o mercado — A) nem resignadamente (admitindo a inutilidade — D) nem burocraticamente (C) — mas usa a pergunta como ponto de entrada para a investigação filosófica: o que significa \"servir para algo\"? Há coisas com valor intrínseco? E",d:"Difícil"}];
const TOTAL = 50;
let answers = {};
let currentFilter = 'all';
let errorsMode = false;

function getVisible(){
  if(errorsMode){
    return QUESTIONS.filter(q=>answers[q.n]!==undefined && answers[q.n]!==q.a);
  }
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(q=>q.d===currentFilter);
}

function renderQuiz(){
  const visible = getVisible();
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  if(!visible.length){
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px;font-family:JetBrains Mono,monospace;font-size:13px;">Nenhuma questão neste filtro.</p>';
    return;
  }
  visible.forEach((q,i)=>{
    const block = document.createElement('div');
    block.className = 'q-block' + (answers[q.n]!==undefined?' answered':'');
    block.id = 'qb-'+q.n;
    const diffClass = q.d==='Fácil'?'diff-easy':q.d==='Média'?'diff-med':'diff-hard';
    const done = answers[q.n]!==undefined;
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(q.n).padStart(2,'0')}</span>
        <span class="q-diff ${diffClass}">${q.d}</span>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="q-opts" id="opts-${q.n}">
        ${q.o.map((o,j)=>{
          let cls='q-opt'+(done?' done':'');
          if(done){
            if(j===q.a) cls+=' correct';
            else if(j===answers[q.n]) cls+=' wrong';
          }
          return `<div class="${cls}" ${!done?`onclick="pick(${q.n},${j})"`:''}>
            <span class="opt-letter">${'ABCD'[j]}</span>
            <span class="opt-text">${o}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="q-feedback ${done?(answers[q.n]===q.a?'fb-correct show':'fb-wrong show'):''}" id="fb-${q.n}">
        <span class="fb-label">${done?(answers[q.n]===q.a?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]):'' }</span>
        <span class="fb-body">${q.c}</span>
      </div>`;
    container.appendChild(block);
  });
}

function pick(qn, optIdx){
  if(answers[qn]!==undefined) return;
  const q = QUESTIONS.find(x=>x.n===qn);
  answers[qn] = optIdx;
  const correct = optIdx===q.a;
  // Style options
  const opts = document.querySelectorAll('#opts-'+qn+' .q-opt');
  opts.forEach(o=>o.classList.add('done'));
  opts[optIdx].classList.add(correct?'correct':'wrong');
  if(!correct) opts[q.a].classList.add('correct');
  // Feedback
  const fb=document.getElementById('fb-'+qn);
  fb.className='q-feedback show '+(correct?'fb-correct':'fb-wrong');
  fb.innerHTML=`<span class="fb-label">${correct?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]}</span><span class="fb-body">${q.c}</span>`;
  document.getElementById('qb-'+qn).classList.add('answered');
  updateStats();
  if(Object.keys(answers).length===TOTAL) finishQuiz();
}

function syncErrorsButton(){
  const errBtn = document.getElementById('err-btn');
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  const answered = Object.keys(answers).length;

  if (errs > 0) {
    errBtn.style.display = 'block';
    errBtn.disabled = false;
    errBtn.textContent = errorsMode ? '↺ Mostrar todas' : '↺ Só erros';
  } else {
    errBtn.style.display = answered === TOTAL ? 'block' : 'none';
    errBtn.disabled = true;
    errBtn.textContent = '↺ Só erros';
  }
}

function updateStats(){
  const answered = Object.keys(answers).length;
  let corr = 0;
  QUESTIONS.forEach(q => { if (answers[q.n] === q.a) corr++; });
  const pct = answered ? Math.round(corr / answered * 100) : 0;

  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = corr;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = (answered / TOTAL * 100) + '%';
  document.getElementById('st-pts').textContent = corr;
  document.getElementById('st-fill').style.width = (corr / TOTAL * 100) + '%';
  document.getElementById('st-pct').textContent = pct + '%';

  syncErrorsButton();
}

function finishQuiz(){
  let corr=0;
  QUESTIONS.forEach(q=>{ if(answers[q.n]===q.a) corr++; });
  const pct=Math.round(corr/TOTAL*100);
  const panel=document.getElementById('score-panel');
  panel.classList.add('show');
  const numEl=document.getElementById('sc-num');
  numEl.textContent=corr+'/'+TOTAL;
  numEl.className='sc-number '+(pct>=70?'sc-approved':'sc-failed');
  document.getElementById('sc-pct').textContent=pct+'% de acerto';
  const errs=TOTAL-corr;
  document.getElementById('sc-breakdown').innerHTML=
    `<div class="sc-item"><strong>${corr}</strong>Corretas</div>
     <div class="sc-item"><strong>${errs}</strong>Incorretas</div>
     <div class="sc-item"><strong>${pct}%</strong>Aproveitamento</div>`;
  syncErrorsButton();
  if(errs>0) document.getElementById('sc-review-btn').style.display='inline-block';
  else document.getElementById('sc-review-btn').style.display='none';
  panel.scrollIntoView({behavior:'smooth'});
}

function resetQuiz(){
  answers={};
  errorsMode=false;
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  syncErrorsButton();
  document.getElementById('hdr-answered').textContent='0';
  document.getElementById('hdr-correct').textContent='0';
  document.getElementById('hdr-pct').textContent='0%';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('st-pts').textContent='0';
  document.getElementById('st-fill').style.width='0%';
  document.getElementById('st-pct').textContent='0%';
  renderQuiz();
  window.scrollTo(0,0);
}

function reviewErrors(){
  errorsMode = true;
  document.getElementById('score-panel').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderQuiz();
  syncErrorsButton();
  window.scrollTo(0,0);
}

function setFilter(f, btn){
  currentFilter = f;
  errorsMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
  syncErrorsButton();
}

function toggleErrors(){
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  if (!errs) return;
  errorsMode = !errorsMode;
  renderQuiz();
  syncErrorsButton();
}

renderQuiz();
syncErrorsButton();
</script>
</body>
</html>
