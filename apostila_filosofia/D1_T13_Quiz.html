<script>
const QUESTIONS = [{n:1,t:"O **método socrático** de ensino de Filosofia é caracterizado por dois momentos fundamentais. A **ironia** socrática consiste em:",o:["O professor finge concordar com os alunos para depois introduzir o conteúdo correto","O professor finge ignorância e faz perguntas que levam o interlocutor a contradizer suas próprias crenças — revelando que ele não sabe o que pensa que sabe","O professor usa humor para tornar o conteúdo filosófico mais acessível","O professor apresenta a posição contrária à sua para fortalecer a investigação"],a:1,c:"A ironia socrática (*eironia* — fingimento) não é ironia no sentido literário moderno. É a postura de Sócrates que finge não saber — e faz perguntas aparentemente simples que revelam a inconsistência das crenças do interlocutor. O famoso \"só sei que nada sei\" não é descrença intelectual — é o método para forçar o outro a examinar suas certezas. O resultado é a *aporia* — o estado de perplexidade que antecede a investigação genuína.",d:"Fácil"},{n:2,t:"A **maiêutica** socrática — o segundo momento do método — é assim denominada porque:",o:["Sócrates foi filho de uma parteira — e a filosofia seria uma forma de dar à luz filhos espirituais","É um método matemático inspirado na geometria","É o método de memorização que Sócrates usava com seus discípulos","Refere-se ao processo de maioria — os alunos votam na resposta correta"],a:0,c:"Sócrates afirmava que seu método era análogo à profissão de sua mãe Fenarete, que era parteira: assim como ela assistia ao parto dos filhos alheios (sem gerar ela mesma), Sócrates assistia ao parto intelectual — as ideias que o interlocutor já carregava dentro de si, mas não conseguia articular. A maiêutica filosófica é o processo de ajudar o aluno a \"dar à luz\" conhecimento que já existe nele potencialmente — não de depositar conhecimento externo.",d:"Fácil"},{n:3,t:"A **Comunidade de Investigação** (*Community of Inquiry*) de Matthew Lipman organiza a sala de aula como:",o:["Uma competição filosófica entre alunos que defendem posições opostas","Uma comunidade que investiga colaborativamente questões filosóficas a partir de textos narrativos — com o professor como facilitador, não transmissor","Uma sala dividida em grupos que estudam filósofos diferentes e apresentam para os colegas","Uma sala organizada como um tribunal filosófico onde o professor é o juiz"],a:1,c:"A Comunidade de Investigação é a metodologia central do programa Filosofia para Crianças (P4C) de Lipman: a turma lê um texto narrativo que levanta questões filosóficas, formula perguntas, as investiga coletivamente e ao final reflete sobre o próprio processo de investigação (metacognição). O professor não transmite — facilita: mantém o foco, aprofunda com perguntas, modela o pensamento filosófico, garante que todos tenham voz.",d:"Fácil"},{n:4,t:"O **método histórico-temático** de ensino de Filosofia articula dois eixos:",o:["Um eixo geográfico (filosofias de diferentes países) e um eixo cronológico (séculos)","Um eixo temático (um problema filosófico central) e um eixo histórico (como a tradição filosófica abordou esse problema)","Um eixo teórico (conceitos) e um eixo prático (aplicações no cotidiano)","Um eixo filosófico (textos canônicos) e um eixo pedagógico (estratégias de ensino)"],a:1,c:"O método histórico-temático — recomendado pelas OCEMs/Filosofia e associado à perspectiva de Marilena Chauí — parte de um problema filosófico genuíno (eixo temático) e apresenta como a tradição filosófica o enfrentou em diferentes épocas e perspectivas (eixo histórico). O movimento metodológico é: problema do aluno → como a tradição pensou o problema → retorno ao problema com novos conceitos → posição própria fundamentada.",d:"Fácil"},{n:5,t:"A diferença entre o **debate filosófico** e o **debate retórico** está em que:",o:["O debate filosófico é oral; o retórico é escrito","O debate filosófico usa apenas argumentos racionais e está aberto à revisão de posições; o retórico visa vencer e pode usar técnicas persuasivas emocionais","O debate filosófico é conduzido pelo professor; o retórico é conduzido pelos alunos","O debate filosófico é sobre temas filosóficos; o retórico é sobre temas políticos"],a:1,c:"A distinção é filosófica antes de ser pedagógica: o debate filosófico — inspirado na tradição socrática e na ética discursiva de Habermas — busca entendimento mútuo, usa apenas argumentos racionais e está genuinamente aberto a mudar de posição à luz de razões. O debate retórico — inspirado na sofística — visa persuadir, pode usar apelos emocionais e a posição é fixada de antemão. Ensinar os alunos a distinguir os dois é ensinar Filosofia.",d:"Fácil"},{n:6,t:"O **experimento mental** (ou *thought experiment*) é uma metodologia específica da Filosofia porque:",o:["Exige laboratório e equipamento científico","É uma situação hipotética cuidadosamente construída para isolar variáveis conceituais e testar intuições filosóficas — sem necessidade de experiência empírica","É exclusivo da filosofia analítica e incompatível com a fenomenologia","Só pode ser usado pelo professor — os alunos não são capazes de criar experimentos mentais"],a:1,c:"O experimento mental é um dos instrumentos mais característicos e poderosos da Filosofia: ao contrário do experimento científico (que testa hipóteses empiricamente), o experimento mental testa intuições conceituais através de situações hipotéticas cuidadosamente controladas. O dilema do bonde, o véu de ignorância, o Gênio Maligno de Descartes, a caverna de Platão — são todos experimentos mentais que isolam um aspecto conceitual (o conflito entre matar e deixar morrer, a impar",d:"Fácil"},{n:7,t:"O uso de **filmes no ensino de Filosofia** é metodologicamente legítimo quando:",o:["O filme substitui completamente a leitura de textos filosóficos — tornando o ensino mais acessível","A cena ou o filme serve como ponto de entrada para um problema filosófico que é então investigado com rigor — o filme é o estímulo, não o conteúdo","O professor mostra o filme completo sem interrupção e depois faz uma prova sobre o enredo","O filme é de um filósofo famoso narrando suas próprias teorias"],a:1,c:"O filme (ou cena) tem papel metodológico claro quando usado como ponto de entrada para a investigação filosófica: a cena do oracle em *Matrix* levanta questões epistêmicas; a cena do barco em *O Senhor das Moscas* levanta questões de filosofia política; a abertura de *Corra!* levanta questões de racismo estrutural e identidade. O problema metodológico ocorre quando o filme substitui o filosofar — quando a \"aula de Filosofia\" se torna uma sessão de cinema com comentário superf",d:"Fácil"},{n:8,t:"A **escrita filosófica** como instrumento pedagógico é defendida porque:",o:["É a forma mais eficiente de avaliar a memorização de conteúdos filosóficos","Escrever sobre um problema filosófico força o aluno a articular seu pensamento, identificar incoerências, organizar argumentos e considerar objeções — é um instrumento de pensamento, não apenas de avaliação","É exigida pelo ENEM como competência de escrita","A escrita filosófica é exclusivamente para alunos do Ensino Médio e Superior"],a:1,c:"A defesa da escrita filosófica não é apenas pedagógica — é filosófica: escrever *é* pensar filosoficamente. Ao tentar colocar no papel o que pensa sobre um problema, o aluno descobre o que realmente pensa — e o que ainda não pensou. A escrita revela incoerências que o pensamento verbal esconde, força a distinção entre o que é sentido vagamente e o que pode ser argumentado. Por isso a redação filosófica (com critérios de argumentação, não de conteúdo) é um dos instrumentos ava",d:"Fácil"},{n:9,t:"A **sequência didática filosófica** começa com uma etapa de **\"sensibilização\"** que tem como função:",o:["Apresentar o conteúdo filosófico da unidade de forma expositiva","Provocar o aluno com um estímulo (filme, dilema, notícia, experimento mental) que levanta o problema filosófico a ser investigado — gerando curiosidade genuína antes de apresentar as ferramentas conceituais","Avaliar o conhecimento prévio dos alunos sobre o tema da unidade","Apresentar a biografia do filósofo que será estudado"],a:1,c:"A sensibilização tem função metodológica específica: criar o \"espanto filosófico\" (*thaumazein* — Aristóteles) que motiva a investigação. Sem uma provocação inicial que faça o aluno genuinamente querer investigar, o conteúdo filosófico será recebido como informação externa sem relevância. O dilema do bonde antes de estudar ética, o experimento mental do véu de ignorância antes de estudar Rawls, uma cena de *Minority Report* antes de estudar livre-arbítrio — criam a necessidad",d:"Fácil"},{n:10,t:"Os **\"quatro Cs\"** do pensamento desenvolvido pela Comunidade de Investigação de Lipman são:",o:["Conteúdo, Contexto, Conceito e Competência","Crítico, Criativo, Cuidativo e Colaborativo","Claro, Coerente, Completo e Correto","Cultural, Cognitivo, Comunicativo e Construtivo"],a:1,c:"Os quatro tipos de pensamento que a Comunidade de Investigação visa desenvolver: **Crítico** (avalia razões, identifica falácias, argumenta rigorosamente); **Criativo** (gera alternativas, imagina possibilidades, pensa lateralmente); **Cuidativo** (*Caring* — não \"carinhoso\", mas pensamento que considera o impacto no outro, é sensível ao contexto ético); **Colaborativo** (constrói conhecimento *com* o outro, não apenas argumenta *contra* o outro). A ausência do cuidativo e do",d:"Fácil"},{n:11,t:"O **\"fishbowl\"** (aquário) é uma adaptação do método socrático que funciona com:",o:["Um grupo de alunos dentro de um \"círculo\" que dialoga socraticamente enquanto o restante observa e depois analisa o diálogo","Um aquário real como metáfora para a observação filosófica da natureza","Uma atividade em que alunos \"pescam\" questões filosóficas de um recipiente","Um método de avaliação em que o professor observa os alunos como se estivesse fora do aquário"],a:0,c:"O fishbowl (ou \"aquário\") é uma estratégia metodológica que adapta o seminário socrático para turmas maiores: um grupo menor (5-8 alunos) senta-se no centro (\"dentro do aquário\") e dialoga socraticamente sobre um problema ou texto, enquanto o restante da turma senta ao redor (\"fora do aquário\") e observa. Depois, os papéis se invertem ou o grupo externo analisa o diálogo: quais foram os argumentos mais fortes? Alguém mudou de posição? Que perguntas ficaram sem resposta?",d:"Fácil"},{n:12,t:"A estratégia **\"think-pair-share\"** (pensar-parear-compartilhar) na aula expositivo-dialogada consiste em:",o:["O professor pensa em voz alta, os alunos copiam no caderno e todos compartilham a aula","O professor lança uma questão → os alunos pensam individualmente → discutem em duplas → compartilham com a turma","Os alunos pensar individualmente, depois o professor apresenta a resposta correta","Uma estratégia de memorização de pares de conceitos filosóficos"],a:1,c:"O think-pair-share é uma das estratégias mais simples e eficazes para tornar a aula expositiva dialógica: o professor para a exposição, lança uma questão filosófica, dá 1-2 minutos para reflexão individual (think), depois 2-3 minutos para discussão em dupla (pair) e finalmente alguns pares compartilham com a turma (share). Isso garante que todos os alunos — não apenas os mais extrovertidos — tenham espaço para processar e articular suas ideias antes de expô-las à turma inteir",d:"Fácil"},{n:13,t:"O **\"diário filosófico\"** como instrumento pedagógico é especialmente adequado ao EF Anos Finais porque:",o:["Exige apenas um caderno — sem custo de material especial","Desenvolve o hábito de reflexão filosófica contínua, documenta a evolução do pensamento do aluno ao longo do tempo e cria um espaço de expressão pessoal das questões existenciais que são especialmente urgentes na adolescência","Substitui completamente outros instrumentos de avaliação","Permite ao professor monitorar as crenças religiosas e políticas dos alunos"],a:1,c:"O diário filosófico tem vantagens metodológicas específicas para o EF Anos Finais: desenvolve o hábito de reflexão escrita regular (não apenas para \"a prova\"), cria continuidade no processo de pensar ao longo do ano, documenta a evolução do pensamento do aluno (o que ele pensava em março vs. em outubro?), e oferece um espaço de expressão de questões existenciais genuínas (identidade, sentido, morte, relacionamentos) que são urgentes para adolescentes. O professor não avalia \"",d:"Fácil"},{n:14,t:"A **\"aporia\"** (*aporia*) socrática é metodologicamente valiosa porque:",o:["É o momento em que o aluno encontra a resposta correta para o problema filosófico","É o estado de perplexidade e impasse que surge quando o aluno reconhece que sua crença inicial era insuficiente — e que é condição para a investigação filosófica genuína","É a técnica de resolução de problemas filosóficos em etapas definidas","É o momento em que o professor revela sua própria posição filosófica"],a:1,c:"A aporia — literalmente \"sem saída\" — é um momento pedagogicamente crítico: o aluno que pensava saber o que é justiça, liberdade ou conhecimento descobre que sua crença inicial era contraditória ou insuficiente. Esse desconforto é a condição da investigação filosófica genuína. Sem aporia, o aluno não tem motivação real para investigar — já \"sabe\". Com aporia, ele *precisa* investigar. O papel do professor socrático é criar as condições para a aporia (através da ironia) — sem ",d:"Fácil"},{n:15,t:"A distinção entre **\"método\"**, **\"metodologia\"** e **\"estratégia didática\"** no ensino de Filosofia é que:",o:["São sinônimos — a distinção é apenas terminológica sem consequências práticas","Método é o modo geral de conduzir o ensino; metodologia é a reflexão sobre os fundamentos e limites dos métodos; estratégia didática é o recurso específico usado dentro de um método","Metodologia é mais importante que método — a teoria sempre precede a prática","Estratégia didática é o que o professor usa; método é o que o aluno usa para aprender"],a:1,c:"A distinção é analiticamente útil: o **método** socrático é o modo geral de conduzir o ensino (questionamento, aporia, maiêutica); a **metodologia** é a reflexão sobre os fundamentos desse método — por que funciona? quais são seus limites? quando é mais adequado? — a teoria dos métodos; a **estratégia didática** é o recurso pontual usado dentro do método — o fishbowl, o think-pair-share, o diário filosófico são estratégias que podem ser usadas dentro de diferentes métodos. Um",d:"Fácil"},{n:16,t:"A crítica de que a **aula expositiva** em Filosofia é necessariamente \"bancária\" (Freire) pode ser respondida pela distinção entre:",o:["A exposição monológica (o professor fala, os alunos ouvem passivamente, sem possibilidade de questionamento) e a aula expositivo-dialogada (exposição que permanentemente convida ao questionamento e ao diálogo)","Exposição em português e exposição em linguagem filosófica técnica","Exposição do professor formado e exposição do professor não formado","Exposição presencial e exposição a distância"],a:0,c:"Freire criticou a \"educação bancária\" — não toda aula expositiva. A distinção crucial é entre exposição monológica (o professor fala, o aluno recebe passivamente, sem questionamento — isso é bancário) e exposição dialogada (o professor expõe mas frequentemente interrompe para questionar, recebe questionamentos, adapta ao que os alunos respondem). A segunda não é bancária — é uma forma de diálogo filosófico estruturado. Para Filosofia, a exposição dialogada tem papel específic",d:"Média"},{n:17,t:"O movimento metodológico do **método histórico-temático** — do problema do aluno para a tradição e de volta ao problema — é pedagógico e filosoficamente coerente porque:",o:["Garante que os alunos memorizem a cronologia da história da filosofia","Respeita tanto a especificidade filosófica (a tradição como recurso indispensável) quanto a relevância pedagógica (o ponto de partida deve ser significativo para o aluno) — sem sacrificar nenhum dos dois","É o único método aprovado pelas OCEMs para o ensino de Filosofia","Elimina a necessidade de leitura de textos filosóficos autênticos"],a:1,c:"O método histórico-temático resolve a tensão entre dois riscos opostos no ensino de Filosofia: o academicismo (ensinar a tradição pelo valor intrínseco da tradição, sem conexão com o aluno) e o presentismo superficial (tratar questões filosóficas sem o suporte da tradição que as aprofundou por séculos). O movimento espiral — problema do aluno → como a tradição pensou → retorno ao problema com novas ferramentas — garante que a tradição filosófica seja um recurso (não um fim em",d:"Média"},{n:18,t:"A **seleção de textos filosóficos** para o EF Anos Finais deve considerar critérios como:",o:["Apenas a autoridade do autor — quanto mais famoso o filósofo, melhor","Extensão (fragmentos de 1-2 páginas), adequação da linguagem, riqueza filosófica do problema levantado e conexão com a realidade dos alunos — sem abrir mão do rigor, mas com sensibilidade pedagógica","Exclusivamente a facilidade de compreensão — qualquer texto difícil deve ser descartado","A presença do texto nos livros didáticos aprovados pelo PNLD — nenhum outro critério importa"],a:1,c:"A seleção de textos para o EF Anos Finais requer equilíbrio entre critérios filosóficos e pedagógicos: o texto deve ser filosoficamente rico (levantar um problema genuíno, não apenas informar sobre um filósofo), ter extensão adequada (fragmentos de 1-2 páginas são mais trabalhável que capítulos inteiros), ter linguagem que, mesmo difícil, possa ser trabalhada com mediação adequada, e ter alguma conexão com questões que os alunos possam reconhecer como suas. A dificuldade do t",d:"Média"},{n:19,t:"A estratégia metodológica de **\"marcação textual\"** — sublinhar, anotar \"?\", \"!\", \"≠\" — durante a leitura filosófica é pedagógica porque:",o:["Ajuda o professor a saber que o aluno leu o texto","Transforma a leitura de atividade passiva (decodificação) em ativa (diálogo com o texto) — o aluno marca o que compreendeu, o que questionou e o que discordou, engajando-se filosoficamente com o texto","É obrigatória pelas normas do PNLD para uso de livros didáticos","Serve exclusivamente como critério de avaliação — o professor pontua as marcações"],a:1,c:"A marcação textual é uma estratégia de leitura ativa filosófica: ao marcar onde compreendeu, onde ficou com dúvida, onde foi surpreendido e onde discordou, o aluno engaja-se com o texto de forma filosófica — não apenas decodifica, mas dialoga. As marcações geram questões que a discussão posterior pode investigar: \"Quem marcou '?' nessa passagem? Qual é a dúvida?\" O texto anotado torna-se um documento do processo de pensar do aluno — e pode ser usado na avaliação do processo, ",d:"Média"},{n:20,t:"A etapa de **\"metacognição\"** na Comunidade de Investigação — reflexão sobre o próprio processo de investigação — é filosoficamente relevante porque:",o:["É a etapa mais fácil — os alunos apenas resumem o que foi discutido","Desenvolve a capacidade de pensar sobre o próprio pensamento — uma competência filosófica fundamental que distingue o filosofar consciente do raciocínio espontâneo não-examinado","É opcional — pode ser suprimida quando o tempo não permite","É exclusivamente uma avaliação do professor sobre a qualidade da investigação"],a:1,c:"A metacognição — pensar sobre o próprio processo de pensar — é uma competência filosófica fundamental: Sócrates a praticava ao examinar não apenas as crenças dos interlocutores, mas os pressupostos e os métodos usados para chegar a elas. Na Comunidade de Investigação, a metacognição ao final de cada sessão pergunta: \"Como investigamos hoje? Quem mudou de posição? Por quê? O que poderia ter sido melhor? Que perguntas ainda estão abertas?\" Isso desenvolve a consciência filosófi",d:"Média"},{n:21,t:"A estratégia do **\"júri simulado\"** em Filosofia — em que um caso filosófico é julgado por \"juízes\", com acusação e defesa — é adequada para:",o:["Qualquer problema filosófico — é o método mais versátil","Questões éticas e de filosofia política que envolvem julgamento de casos concretos — aplicando princípios filosóficos a situações específicas","Problemas de epistemologia e metafísica — que são os mais adequados ao formato de tribunal","Substituir completamente o método socrático — é mais dinâmico"],a:1,c:"O júri simulado funciona especialmente bem para questões éticas (o julgamento de Eichmann — banalidade do mal e responsabilidade; o caso Antígona — lei humana vs. lei divina; casos de bioética) e de filosofia política (a revolução é legítima? a desobediência civil é justificada?). O formato permite aplicar princípios filosóficos a casos concretos — desenvolvendo o julgamento prático (*phronesis*) aristotélico. Não funciona tão bem para questões metafísicas ou epistemológicas ",d:"Média"},{n:22,t:"A proposta de que o professor de Filosofia deve **modelar o comportamento filosófico** — não apenas ensiná-lo — significa que:",o:["O professor deve ser um filósofo profissional publicado em periódicos acadêmicos","O professor que genuinamente duvida, revisa posições à luz de razões, escuta os alunos e distingue o que sabe do que não sabe está ensinando Filosofia — independentemente do método que usa — pois o filosofar se aprende também por contágio e imitação","O professor deve imitar os grandes filósofos em gestos e estilo de fala","O professor deve resolver todos os problemas filosóficos antes de apresentá-los aos alunos"],a:1,c:"O professor de Filosofia como \"modelo de pensamento\" é uma dimensão metodológica frequentemente negligenciada: os alunos aprendem não apenas pelas atividades que o professor propõe, mas pelo tipo de pensador que o professor demonstra ser. Um professor que genuinamente não sabe a resposta e investiga junto com os alunos; que muda de posição quando um aluno apresenta um bom argumento; que distingue claramente entre o que sabe e o que hipotetiza — esse professor está ensinando F",d:"Média"},{n:23,t:"O **\"dilema do bonde\"** (*trolley problem*) — introduzido por Philippa Foot e desenvolvido por Judith Jarvis Thomson — é útil no ensino de Filosofia Ética porque:",o:["Tem uma resposta filosófica claramente correta — e o professor deve revelá-la ao final","Isola a tensão entre princípios éticos (consequencialismo vs. deontologia, matar vs. deixar morrer) de forma clara e economicamente — revelando intuições morais dos alunos e as teorias filosóficas que as fundamentam","É um dilema histórico real — uma situação que realmente ocorreu","É adequado exclusivamente para o Ensino Médio e Superior — muito complexo para o EF Anos Finais"],a:1,c:"O dilema do bonde é um dos experimentos mentais mais pedagogicamente eficazes em Ética: é simples o suficiente para ser compreendido por qualquer adolescente, mas revela imediatamente intuições morais divergentes (a maioria desviaria o bonde, mas poucos emitiriam o sujeito gordo sobre os trilhos — apesar da lógica consequencialista ser a mesma). Essas divergências revelam que os alunos usam inconscientemente princípios diferentes (consequencialistas em um caso, deontológicos ",d:"Média"},{n:24,t:"O uso de **poesia** no ensino de Filosofia — como Drummond, Adélia Prado ou Fernando Pessoa — é metodologicamente justificável quando:",o:["A poesia substitui os textos filosóficos técnicos — sendo mais acessível e igualmente rigorosa","O poema captura uma experiência ou questão filosófica de forma que o texto técnico não consegue — e serve como ponto de entrada para a investigação que o texto filosófico aprofunda","O professor tem formação em Literatura — não precisa de formação filosófica","A BNCC exige a integração de Literatura e Filosofia em todas as unidades"],a:1,c:"A poesia tem uma relação genuína com a Filosofia — não é apenas \"facilitação pedagógica\". Certos aspectos da experiência filosófica (a experiência do tempo em Heidegger, a angústia existencial em Sartre, a admiração diante do ser em Wittgenstein) são capturados pela poesia de forma que o texto técnico não consegue. Um poema de Drummond sobre o tempo pode abrir a questão da temporalidade; um poema de Adélia Prado pode abrir a questão do corpo; Fernando Pessoa pode abrir a ques",d:"Média"},{n:25,t:"A **\"carta filosófica\"** como estratégia de escrita — em que o aluno escreve uma carta a um filósofo, a um personagem ou a alguém com posição diferente — é pedagogicamente rica porque:",o:["Ensina as normas formais de correspondência — uma competência de língua portuguesa","Obriga o aluno a se colocar no lugar do outro (perspectiva diferente), a articular sua própria posição com argumentos e a considerar as respostas possíveis — desenvolvendo simultaneamente argumentação e \"mentalidade alargada\" (Arendt)","É mais fácil de avaliar do que a redação filosófica convencional","É exclusivamente adequada para o tema de filosofia política"],a:1,c:"A carta filosófica tem vantagens metodológicas específicas: ao escrever para um filósofo (\"Caro Platão, discordo do seu mito da caverna porque...\") ou para alguém com posição diferente (\"Caro amigo que acredita em Deus, quero te apresentar os argumentos de Hume...\"), o aluno simultaneamente articula sua própria posição com argumentos, considera a perspectiva do destinatário (o que ele responderia?), e pratica a \"mentalidade alargada\" de Arendt — a capacidade de visitar imagin",d:"Média"},{n:26,t:"A **\"sala de aula invertida\"** (*flipped classroom*) aplicada ao ensino de Filosofia funciona quando:",o:["Os alunos assistem ao professor expor o conteúdo em vídeo em casa e usam o tempo de aula para investigação, debate e escrita filosófica","Os alunos ficam em casa e o professor assiste a vídeos de Filosofia","A sala é reorganizada fisicamente — as carteiras são invertidas","Os alunos ensinam o professor em vez de o professor ensinar os alunos"],a:0,c:"A sala de aula invertida é especialmente produtiva para Filosofia: o conteúdo expositivo (contextualização histórica, explicação de conceito técnico) pode ser assistido em casa em vídeo — liberando o tempo presencial (que é escasso, geralmente 2 aulas semanais) para as atividades que exigem presença e interação: debate filosófico, Comunidade de Investigação, escrita filosófica com feedback do professor. Isso resolve parcialmente o problema da carga horária insuficiente — ao u",d:"Média"},{n:27,t:"A **\"gamificação\"** do ensino de Filosofia — uso de mecânicas de jogo — é pedagogicamente legítima quando:",o:["Qualquer uso de jogo em sala de aula é gamificação — e toda gamificação é legítima","A mecânica de jogo (pontos, desafios, narrativa) cria engajamento genuíno com o problema filosófico — e não reduz a Filosofia a um quiz de memorização de nomes e datas","Os alunos são avaliados exclusivamente pela pontuação no jogo","A gamificação é proibida no ensino de Filosofia — compromete o rigor da disciplina"],a:1,c:"A gamificação em Filosofia pode ser produtiva — se o jogo gerar investigação filosófica genuína. Um RPG (role-playing game) em que os alunos incorporam personagens com dilemas éticos e precisam tomar decisões filosóficas fundamentadas é gamificação filosoficamente legítima. Um quiz de \"Quem disse essa frase?\" com nomes de filósofos pode parecer gamificação mas é apenas memorização com pontuação. A distinção é: o jogo provoca pensamento filosófico ou apenas entretém?",d:"Média"},{n:28,t:"A metodologia do **\"seminário socrático\"** — em que um grupo menor discute um texto enquanto o restante observa — é especialmente útil para:",o:["Turmas em que todos os alunos participam igualmente das discussões","Criar condições para um diálogo filosófico mais profundo com um grupo, enquanto o restante observa e analisa o processo — tornando o próprio processo de diálogo um objeto de aprendizagem","Turmas com problemas disciplinares — isola os alunos mais agitados no centro","Avaliações finais — o grupo interno é avaliado pelo grupo externo"],a:1,c:"O seminário socrático resolve o problema de escala do método socrático: um diálogo genuinamente socrático é difícil com 35 alunos simultaneamente. Ao criar um grupo interno (5-8 alunos) que dialoga enquanto o externo observa, o seminário permite: (1) um diálogo filosófico mais profundo no grupo interno; (2) que o grupo externo observe e analise o processo de diálogo como objeto de aprendizagem — identificando bons argumentos, falácias, mudanças de posição; (3) que todos parti",d:"Média"},{n:29,t:"A **autoavaliação** como instrumento em Filosofia — em que o aluno avalia seu próprio processo de pensar — é coerente com os objetivos filosóficos porque:",o:["Reduz a carga de trabalho do professor — ele não precisa corrigir tudo","Desenvolve a metacognição filosófica — o aluno aprende a examinar seu próprio processo de pensar, identificar seus pontos fortes e lacunas, e orientar seu próprio desenvolvimento filosófico","É obrigatória pela BNCC em todas as disciplinas","A autoavaliação em Filosofia sempre coincide com a avaliação do professor"],a:1,c:"A autoavaliação filosófica tem fundamento no próprio método socrático: \"conhece-te a ti mesmo\" (*gnóthi seautón*) é a máxima de Sócrates — e no contexto pedagógico, significa que o aluno deve ser capaz de examinar seu próprio processo de pensar. Uma autoavaliação filosófica eficaz não pergunta \"Você se esforçou?\" — pergunta: \"Seus argumentos foram bem fundamentados? Você considerou perspectivas diferentes? Você mudou de posição à luz de razões? O que ainda precisa investigar?",d:"Média"},{n:30,t:"A escolha do **experimento mental do \"navio de Teseu\"** — a questão de se um navio que tem todas as suas partes substituídas ao longo do tempo é ainda o mesmo navio — é adequada para introduzir questões de:",o:["Filosofia política — quem é o soberano legítimo num Estado que muda de governantes?","Metafísica e ontologia — o que constitui a identidade de um objeto ao longo do tempo? O que é permanecer \"o mesmo\"?","Ética — é correto substituir partes de um objeto sem o consentimento do proprietário?","Epistemologia — como podemos conhecer que um objeto é o mesmo se nossas percepções mudam?"],a:1,c:"O navio de Teseu é um experimento mental clássico sobre identidade e permanência — questões metafísicas fundamentais. A pergunta \"se todas as partes são substituídas, é ainda o mesmo navio?\" desdobra-se em questões sobre o que constitui a identidade de um objeto: é a continuidade material? A continuidade formal? A continuidade funcional? A continuidade histórica? Essas perguntas se aplicam imediatamente à questão da identidade pessoal — \"sou eu ainda a mesma pessoa que era cr",d:"Média"},{n:31,t:"A etapa de **\"problematização\"** na sequência didática filosófica — após a sensibilização — tem como objetivo específico:",o:["Apresentar a solução do problema filosófico que será estudado","Tornar explícito o problema filosófico levantado pela sensibilização, mapear as intuições e opiniões iniciais dos alunos (sem julgá-las) e formular as questões que orientarão a investigação","Avaliar o conhecimento prévio dos alunos para decidir se avançam para a investigação","Dividir a turma em grupos com posições opostas para o debate"],a:1,c:"A problematização tem função metodológica precisa: explicitar o problema que a sensibilização levantou de forma vaga (tornar o implícito explícito), mapear o estado atual do pensamento dos alunos (sem corrigi-los — o estado inicial é o ponto de partida da investigação, não um erro a corrigir), e formular as questões que orientarão a investigação posterior. Esse mapeamento inicial é filosoficamente importante: ao final da sequência, o professor e os alunos podem comparar as po",d:"Média"},{n:32,t:"A proposta de usar **\"situações-problema filosóficas\"** — casos curtos que levantam dilemas filosóficos, diferente dos longos experimentos mentais — é adequada ao EF Anos Finais porque:",o:["São mais simples que os experimentos mentais — não exigem pensamento filosófico genuíno","São narrativas curtas e concretas que geram imediatamente a questão filosófica sem exigir a linguagem técnica como pré-requisito — acessíveis a alunos em desenvolvimento do pensamento formal","São proibidas pelas OCEMs — que exigem apenas textos filosóficos autênticos","Funcionam apenas para questões de ética — não para epistemologia ou metafísica"],a:1,c:"As situações-problema são textos narrativos curtos — histórias, casos, dilemas — que levantam questões filosóficas de forma concreta. \"Uma criança encontra uma carteira com dinheiro. O que ela deve fazer?\" pode levantar questões de ética e direito de propriedade. \"Se você soubesse que ia esquecer tudo o que viveu hoje, teria valido a pena viver esse dia?\" levanta questões sobre memória, identidade e valor da experiência. São narrativamente acessíveis (não exigem linguagem téc",d:"Média"},{n:33,t:"A **\"escrita antes da leitura\"** — pedir que o aluno escreva sobre o problema antes de ler o texto filosófico — é metodologicamente produtiva porque:",o:["Avalia se o aluno fez a leitura do texto em casa","Ativa o pensamento espontâneo do aluno sobre o problema, criando uma \"necessidade\" intelectual que o texto filosófico então satisfaz — tornando a leitura motivada e ativa, não passiva","Substitui a leitura do texto — se o aluno já pensou sobre o problema, não precisa ler","É uma estratégia exclusiva da pedagogia freiriana sem fundamento na filosofia"],a:1,c:"A escrita antes da leitura é uma aplicação do princípio pedagógico de criar a necessidade antes de satisfazê-la: quando o aluno escreveu o que pensa sobre \"o que é justo\" antes de ler Rawls, ele lê Rawls como resposta a uma questão que genuinamente tem — não como informação arbitrária. A comparação entre o que ele escreveu antes e o argumento de Rawls cria um diálogo produtivo: em que Rawls o surpreendeu? Onde concorda? Onde discorda? O texto filosófico torna-se um interlocut",d:"Média"},{n:34,t:"O **\"mapa conceitual\"** como instrumento em Filosofia é adequado para:",o:["Memorizar a cronologia dos filósofos — cada nó do mapa é um filósofo, cada seta uma influência","Visualizar as relações entre conceitos filosóficos de uma unidade — tornando visível a estrutura lógica do pensamento investigado","Avaliar a produção filosófica dos alunos ao final do semestre","Substituir os textos filosóficos — o mapa resume o conteúdo de forma mais eficiente"],a:1,c:"O mapa conceitual em Filosofia tem função específica: não é para memorizar datas e nomes (isso pode ser feito de outras formas), mas para visualizar as relações entre conceitos filosóficos. Ao mapear as relações entre \"liberdade\", \"determinismo\", \"responsabilidade\", \"ação\" e \"natureza\" num mapa conceitual, o aluno torna visível a estrutura lógica de uma investigação — vê quais conceitos dependem de quais, quais são contrários, quais são condições de outros. É uma ferramenta d",d:"Média"},{n:35,t:"A proposta de **integração entre Filosofia e Ciências Humanas** no EF Anos Finais — em diálogo com História, Geografia e Sociologia — é metodologicamente produtiva quando:",o:["A Filosofia desaparece completamente — dissolvida nas outras disciplinas","A Filosofia contribui com seu instrumento específico (questionamento rigoroso de pressupostos, análise conceitual, investigação de fundamentos) para enriquecer as questões das outras disciplinas — sem perder sua especificidade","As outras disciplinas substituem a Filosofia — ensinando \"pensamento crítico\" em seus próprios contextos","Um único professor ensina todas as Ciências Humanas sem formação específica em nenhuma"],a:1,c:"A integração pode ser produtiva se a Filosofia conserva sua especificidade: quando a turma de História estuda o colonialismo, a Filosofia pode investigar os fundamentos filosóficos do racismo (Hume, Kant) e das filosofias de resistência (Fanon, Dussel). Quando a turma de Geografia estuda as mudanças climáticas, a Filosofia investiga a ética ambiental (leopold, Singer). Mas isso exige que o professor de Filosofia tenha clareza sobre o que é especificamente filosófico nessa con",d:"Média"},{n:36,t:"Considere as afirmações sobre metodologias de ensino de Filosofia:  I. O método socrático é sempre superior às demais metodologias — deve ser usado em todas as aulas. II. O debate filosófico difere do debate retórico por buscar entendimento em vez de vitória — e por estar genuinamente aberto à revisão de posições. III. A escrita filosófica é um instrumento de pensamento, não apenas de avaliação — escrever sobre um problema filosófico força a articulação e a identificação de incoerências.  Estão corretas:",o:["Apenas I e II","Apenas II e III","Apenas I e III","I, II e III"],a:1,c:"I é **falsa**: nenhum método é sempre superior — a adequação metodológica depende do objetivo, do conteúdo, do contexto e do perfil dos alunos. O método socrático é poderoso para examinar pressupostos mas é difícil de implementar com turmas grandes e pode gerar ansiedade se mal conduzido. II é **verdadeira**: esta é a distinção central que deve ser explicitada aos alunos — o debate filosófico busca compreensão, não vitória; usa apenas argumentos racionais; está aberto a mudar",d:"Difícil"},{n:37,t:"A crítica de que os **experimentos mentais** são \"artificiais\" e \"irreais\" — portanto inadequados ao ensino de Filosofia — pode ser respondida por:",o:["Admitir a crítica — os experimentos mentais devem ser substituídos por casos reais","A artificialidade do experimento mental é metodologicamente necessária: ao isolar variáveis conceituais, ele permite examinar intuições filosóficas com uma clareza que situações reais (complexas, multifatoriais, emocionalmente carregadas) não permitem; a \"irrealidade\" controlada é a condição da análise filosófica rigorosa","Os experimentos mentais têm uma longa tradição filosófica — a tradição justifica o uso","Os experimentos mentais são reais — o dilema do bonde ocorre frequentemente em estradas"],a:1,c:"A resposta à crítica de artificialidade é metodológica: a artificialidade do experimento mental é uma *virtude*, não um defeito. Situações reais são complexas — envolvem fatores emocionais, históricos e contingentes que dificultam o isolamento da questão filosófica central. O dilema do bonde *elimina* a maioria das variáveis reais para isolar a tensão específica entre \"matar\" e \"deixar morrer\" — tornando possível examiná-la com clareza. A \"irrealidade\" é o preço do rigor conc",d:"Difícil"},{n:38,t:"A proposta de **\"filosofia com filmes\"** de Julio Cabrera — em que o cinema não ilustra conceitos filosóficos mas tem seu próprio poder de apresentar \"conceitos cinematográficos\" — vai além do uso convencional do cinema no ensino porque:",o:["Propõe que os filmes substituam completamente os textos filosóficos nas aulas de Filosofia","Sugere que o cinema não é apenas ilustração da filosofia — tem sua própria capacidade de produzir conceitos e experiências filosóficas que os textos escritos não conseguem; o aluno que viu *Amarcord* de Fellini experienciou algo sobre memória e identidade que Bergson não produz da mesma forma","Propõe que a Filosofia deve ser ensinada apenas através de filmes comerciais populares","A proposta de Cabrera é incompatível com o ensino de Filosofia no EF Anos Finais"],a:1,c:"Julio Cabrera (*O Cinema Pensa*, 2006) propôs que o cinema tem um poder filosófico específico — não como ilustração de conceitos filosóficos existentes, mas como produção de \"conceitos cinematográficos\": experiências filosóficas que só o cinema pode produzir. A angústia existencial em *Persona* de Bergman, a questão da identidade em *O Passageiro* de Antonioni, o problema do tempo em *2001: Uma Odisseia no Espaço* — esses filmes não *ilustram* a filosofia; eles *filosofam* de",d:"Difícil"},{n:39,t:"A dificuldade de **implementar o método socrático com turmas de 35-40 alunos em 50 minutos** é um problema metodológico real que pode ser parcialmente resolvido por:",o:["Reduzir o número de alunos — o método socrático só funciona em turmas pequenas","Estratégias de escalonamento: fishbowl (grupo interno dialoga, externo observa), diálogo socrático em duplas, seminário socrático rotativo, círculos concêntricos — que preservam o espírito socrático mesmo em escala maior","Substituir o método socrático por exposição — em turmas grandes, não há alternativa","Gravar o diálogo socrático e mostrar para as turmas que não participaram"],a:1,c:"O desafio de escala do método socrático é real mas não intransponível: o fishbowl cria um grupo interno pequeno que dialoga genuinamente enquanto o externo observa (e todos participam da metacognição posterior); o diálogo socrático em duplas distribui a experiência por toda a turma simultaneamente; o seminário socrático rotativo faz grupos diferentes passarem pela experiência em momentos diferentes. Essas adaptações preservam o espírito socrático (questionamento, aporia, revi",d:"Difícil"},{n:40,t:"A proposta de **avaliação processual** em Filosofia — que acompanha o desenvolvimento do pensamento ao longo do tempo — é mais coerente com os objetivos filosóficos do que a avaliação pontual porque:",o:["É mais fácil de administrar para o professor","O filosofar é um processo — não um estado estático. Um aluno que, ao longo de um semestre, passou de uma posição dogmática e não-argumentada para uma posição revisada, fundamentada e consciente de suas limitações, desenvolveu Filosofia — mesmo que sua posição final não seja a mais \"correta\"","A avaliação processual elimina a necessidade de qualquer avaliação formal","A avaliação processual é obrigatória pela LDB para todas as disciplinas"],a:1,c:"A avaliação processual é metodologicamente coerente com o ensino de Filosofia porque o filosofar é fundamentalmente um processo: o desenvolvimento do pensamento filosófico ao longo do tempo é o objeto de aprendizagem — não a memorização de um conteúdo em determinado momento. Instrumentos como o diário filosófico, o portfólio e a comparação entre produções do início e do final do semestre captam esse desenvolvimento. A avaliação pontual (prova no fim do bimestre) pode capturar",d:"Difícil"},{n:41,t:"A utilização do **\"mapa de argumentos\"** (*argument mapping*) — representação visual da estrutura lógica de um argumento — tem aplicação específica no ensino de Filosofia ao:",o:["Substituir a leitura de textos filosóficos — visualiza os argumentos sem precisar ler","Tornar visível a estrutura lógica de argumentos filosóficos complexos — identificando a tese central, as premissas que a sustentam, as objeções possíveis e as respostas às objeções — desenvolvendo análise argumentativa de forma visual","Avaliar apenas o conhecimento lógico formal dos alunos","É exclusivo para textos de lógica formal — não funciona com textos filosóficos narrativos"],a:1,c:"O mapa de argumentos é uma ferramenta específica de análise filosófica: ao mapear visualmente a estrutura de um argumento (tese → premissas → conclusão; objeção → contra-argumento), o aluno desenvolve a capacidade de identificar o que está sendo argumentado, o que o sustenta, o que pode ser questionado. Aplicado a textos filosóficos (o argumento ontológico de Anselmo, o cogito cartesiano, o imperativo categórico de Kant), torna visível a arquitetura lógica do texto — algo que",d:"Difícil"},{n:42,t:"A proposta de **\"filosofia performática\"** — usar performances, instalações, música ao vivo ou artes cênicas para explorar problemas filosóficos — vai além do uso convencional de recursos culturais ao:",o:["Substituir completamente a argumentação verbal — o corpo ensina melhor que a razão","Reconhecer que certas dimensões da experiência filosófica (a temporalidade, o corpo, a identidade, o absurdo) são mais completamente exploradas pela experiência estética do que pelo texto ou pelo debate — sem abandonar a investigação filosófica posterior","Transformar as aulas de Filosofia em aulas de Arte","É inadequada para o EF Anos Finais — muito abstrata para alunos de 11-14 anos"],a:1,c:"A filosofia performática — desenvolvida em alguns contextos universitários e de educação não-formal — reconhece que a Filosofia não é apenas logos (razão, argumento) mas também *pathos* (afeto, experiência vivida). Certas dimensões filosóficas (a temporalidade em Heidegger, o corpo em Merleau-Ponty, o absurdo em Camus) podem ser mais completamente experienciadas por performances, instalações ou música do que por qualquer texto. Isso não substitui a argumentação filosófica pos",d:"Difícil"},{n:43,t:"A proposta de que o professor de Filosofia crie uma **\"comunidade filosófica de aprendizagem\"** com seus alunos ao longo do ano — em que a turma desenvolve uma identidade coletiva de investigação filosófica — é metodologicamente relevante porque:",o:["Elimina a necessidade de planejamento individual de aulas — a comunidade se autodirige","A Filosofia é fundamentalmente dialógica — e uma comunidade que se reconhece como tal ao longo do tempo desenvolve normas implícitas de investigação (escutar antes de refutar, fundamentar posições, revisar à luz de razões) que tornam cada aula mais filosófica do que a anterior","A comunidade filosófica substitui a avaliação formal — a própria comunidade avalia cada membro","É um conceito exclusivo da Comunidade de Investigação de Lipman — não se aplica a outras metodologias"],a:1,c:"A ideia de \"comunidade filosófica\" ao longo do ano — não apenas \"turma que faz Filosofia\" — é pedagogicamente poderosa: ao longo do tempo, a turma desenvolve uma cultura de investigação, uma memória compartilhada de investigações anteriores (\"Como quando discutimos sobre o dilema do bonde...\"), normas implícitas de qualidade argumentativa, e confiança para discordar sem romper relações. Esse ambiente cultural é condição para investigações filosóficas cada vez mais profundas —",d:"Difícil"},{n:44,t:"A dificuldade de trabalhar com **textos filosóficos em linguagem técnica** com alunos do EF Anos Finais pode ser parcialmente resolvida pela estratégia de:",o:["Substituir todos os textos filosóficos por resumos e paráfrases do professor — eliminando a dificuldade","**\"Entrada progressiva no texto\"**: contextualizar antes, ler apenas fragmentos selecionados, usar estratégias de marcação e paráfrase durante, e criar atividades de análise e avaliação depois — tornando a dificuldade do texto um objeto de aprendizagem, não um obstáculo","Usar apenas textos escritos originalmente para adolescentes — sem textos filosóficos canônicos","Pedir que os alunos leiam em casa antes e venham preparados — a dificuldade é de responsabilidade do aluno"],a:1,c:"A dificuldade dos textos filosóficos não é um argumento para eliminá-los — é um desafio metodológico a ser enfrentado. A \"entrada progressiva\" é uma abordagem que torna a dificuldade produtiva: contextualizar o autor e o problema antes reduz a desorientação; ler fragmentos selecionados (não o texto inteiro) torna a tarefa gerenciável; a marcação textual transforma a leitura de passiva em ativa; a paráfrase força a compreensão; a análise e avaliação depois consolidam e aprofun",d:"Difícil"},{n:45,t:"A **avaliação por \"portfólio filosófico\"** — coleção de trabalhos do aluno ao longo do semestre — é especialmente adequada ao ensino de Filosofia porque:",o:["É mais fácil de administrar do que provas — o professor não precisa corrigir em data marcada","Documenta o desenvolvimento do pensamento filosófico ao longo do tempo — permitindo comparar posições iniciais e finais, identificar o crescimento da qualidade argumentativa e evidenciar o processo de pensar que a avaliação pontual não captura","Substitui completamente qualquer outra forma de avaliação em Filosofia","É exclusiva para alunos com dificuldades de aprendizagem — os demais são avaliados por prova"],a:1,c:"O portfólio filosófico é o instrumento avaliativo mais coerente com a natureza processual do filosofar: ao coletar trabalhos ao longo do semestre (diário filosófico, análises de texto, posições argumentadas, reflexões metacognitivas), o portfólio documenta o desenvolvimento do pensamento — não apenas seu estado em determinado momento. O aluno que, em março, escreveu \"acho que o aborto é errado\" e, em outubro, escreveu \"considero o aborto uma questão filosófica complexa que en",d:"Difícil"},{n:46,t:"A aplicação do **princípio do \"mínimo de doutrinação\"** no ensino de Filosofia — defendido por Harvey Siegel — implica que:",o:["O professor não deve apresentar nenhuma posição filosófica em aula","O professor apresenta posições filosóficas com suas razões, encoraja os alunos a avaliá-las criticamente, e não as impõe como verdades — preservando e desenvolvendo a autonomia epistêmica dos alunos como fim em si mesmo","O professor deve ser neutro sobre todas as questões filosóficas — inclusive sobre questões com respostas filosóficas bem fundamentadas","A doutrinação é aceitável quando o conteúdo é \"verdadeiro\" — o que minimiza é apenas a doutrinação sobre conteúdos \"falsos\""],a:1,c:"Siegel (*Educating Reason*, 1988) defende que a educação genuína — e especialmente a filosófica — deve respeitar e desenvolver a racionalidade dos estudantes como fim em si mesmo. Isso implica um \"mínimo de doutrinação\": apresentar posições com suas razões, não apenas com a autoridade do professor; encorajar a avaliação crítica; não exigir concordância como condição de sucesso. Isso não é neutralidade — o professor pode (e deve) ter posições filosóficas. Mas deve apresentá-la",d:"Difícil"},{n:47,t:"A **\"investigação filosófica colaborativa\"** — em que os alunos investigam coletivamente, em grupos, um problema filosófico e apresentam os resultados — tem vantagens metodológicas específicas porque:",o:["Reduz a carga de trabalho individual — cada aluno faz menos","Reproduz a estrutura da investigação filosófica profissional (que ocorre em diálogo e em comunidade) e desenvolve capacidades colaborativas que o trabalho individual não desenvolve — sem sacrificar a responsabilidade individual de cada membro","Elimina as diferenças individuais — todos os alunos ficam no mesmo nível","A investigação colaborativa é inadequada para Filosofia — que é uma atividade solitária e individual"],a:1,c:"A investigação filosófica colaborativa tem dupla justificativa: metodológica (a filosofia é fundamentalmente dialógica — as melhores ideias surgem no confronto com outras ideias, e a colaboração reproduz essa estrutura) e pedagógica (desenvolve capacidades de ouvir, sintetizar perspectivas diferentes e construir coletivamente que o trabalho individual não desenvolve). O risco — que alguns alunos não contribuam — é gerenciável com estrutura adequada (papéis definidos, produto ",d:"Difícil"},{n:48,t:"A proposta de **\"filosofia na praça\"** (*philosophy in the public square*) — levar a investigação filosófica para fora da sala de aula — adaptada ao contexto escolar pode incluir:",o:["Levar os alunos para conferências filosóficas universitárias — inacessível para a maioria das escolas públicas","Criar situações em que a Filosofia investigada na sala de aula se conecta com a vida pública da escola e da comunidade — assembleias filosóficas, investigações sobre questões da escola, diálogos com a comunidade sobre temas investigados","Transformar a aula de Filosofia numa aula de campo sobre questões urbanísticas","É incompatível com o EF Anos Finais — os alunos precisam de ambiente controlado"],a:1,c:"A \"filosofia na praça\" — a ideia de que a Filosofia não deve ficar confinada à sala de aula mas participar da vida pública — pode ser adaptada ao contexto escolar: uma investigação sobre justiça pode resultar numa assembleia escolar sobre uma questão de injustiça real na escola; uma investigação sobre democracia pode se conectar com o grêmio estudantil; uma investigação sobre meio ambiente pode gerar um manifesto para a comunidade. Isso realiza o princípio freireano de articu",d:"Difícil"},{n:49,t:"A escolha entre diferentes métodos de ensino de Filosofia deve ser orientada por critérios como:",o:["A preferência pessoal do professor — o método com que ele se sente mais confortável é sempre o melhor","Os objetivos específicos da unidade (o que se quer desenvolver), as características da turma (faixa etária, perfil), o conteúdo filosófico (alguns temas pedem alguns métodos) e o contexto (carga horária, recursos disponíveis) — nenhum método é universalmente superior","O método mais recente na literatura pedagógica — o mais inovador é sempre o mais eficaz","O método aprovado pelas OCEMs — existe um único método oficial para o ensino de Filosofia"],a:1,c:"A escolha metodológica em Filosofia é ela mesma uma decisão filosófico-pedagógica que deve ser fundamentada. Nenhum método é universalmente superior: o método socrático é poderoso para examinar pressupostos mas difícil em turmas grandes; a Comunidade de Investigação é excelente para questões investigáveis colaborativamente mas requer textos narrativos adequados; o histórico-temático é mais adequado para conceitos filosóficos complexos que exigem a tradição como recurso; os ex",d:"Difícil"},{n:50,t:"Em seu primeiro mês de aula no EF Anos Finais em São José de Ribamar, um professor de Filosofia planeja sua primeira sequência didática. Ele escolhe o tema \"O que é liberdade?\" e planeja a seguinte sequência: (1) exibição de uma cena de *O Menino que Descobriu o Vento* sobre escolha e determinação; (2) debate inicial sobre intuições; (3) experimento mental do \"véu de ignorância\" de Rawls; (4) leitura de fragmento de Sartre sobre \"condenado a ser livre\"; (5) escrita filosófica: \"Em que sentido você se sente livre?\". A avaliação mais fundamentada dessa sequência é:",o:["A sequência é inadequada — começa com um filme, o que é metodologicamente incorreto","A sequência é metodologicamente sólida: respeita a estrutura sensibilização → problematização → investigação → síntese, articula recursos culturais (filme) com experimento mental (Rawls) e texto filosófico (Sartre), e finaliza com escrita filosófica que exige posição própria argumentada","A sequência é muito longa — deve ser reduzida a uma aula com texto filosófico somente","A sequência é inadequada por usar Sartre — um autor europeu, sem perspectivas africanas ou indígenas"],a:1,c:"Esta questão final integra todos os temas do tópico. A sequência é metodologicamente coerente: (1) sensibilização com filme — cria o problema de forma concreta e cinematográfica; (2) debate inicial — mapeia intuições; (3) experimento mental — aprofunda a questão da imparcialidade e da escolha; (4) texto filosófico — apresenta como a tradição pensou a liberdade; (5) escrita filosófica — sintetiza e exige posição própria. Respeita a estrutura da SD filosófica, articula múltiplo",d:"Difícil"}];
const TOTAL = 50;
let answers = {};
let currentFilter = 'all';
let errorsMode = false;

function getVisible(){
  if(errorsMode){
    return QUESTIONS.filter(q=>answers[q.n]!==undefined && answers[q.n]!==q.a);
  }
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(q=>q.d===currentFilter);
}

function renderQuiz(){
  const visible = getVisible();
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  if(!visible.length){
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px;font-family:JetBrains Mono,monospace;font-size:13px;">Nenhuma questão neste filtro.</p>';
    return;
  }
  visible.forEach((q,i)=>{
    const block = document.createElement('div');
    block.className = 'q-block' + (answers[q.n]!==undefined?' answered':'');
    block.id = 'qb-'+q.n;
    const diffClass = q.d==='Fácil'?'diff-easy':q.d==='Média'?'diff-med':'diff-hard';
    const done = answers[q.n]!==undefined;
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(q.n).padStart(2,'0')}</span>
        <span class="q-diff ${diffClass}">${q.d}</span>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="q-opts" id="opts-${q.n}">
        ${q.o.map((o,j)=>{
          let cls='q-opt'+(done?' done':'');
          if(done){
            if(j===q.a) cls+=' correct';
            else if(j===answers[q.n]) cls+=' wrong';
          }
          return `<div class="${cls}" ${!done?`onclick="pick(${q.n},${j})"`:''}>
            <span class="opt-letter">${'ABCD'[j]}</span>
            <span class="opt-text">${o}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="q-feedback ${done?(answers[q.n]===q.a?'fb-correct show':'fb-wrong show'):''}" id="fb-${q.n}">
        <span class="fb-label">${done?(answers[q.n]===q.a?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]):'' }</span>
        <span class="fb-body">${q.c}</span>
      </div>`;
    container.appendChild(block);
  });
}

function pick(qn, optIdx){
  if(answers[qn]!==undefined) return;
  const q = QUESTIONS.find(x=>x.n===qn);
  answers[qn] = optIdx;
  const correct = optIdx===q.a;
  // Style options
  const opts = document.querySelectorAll('#opts-'+qn+' .q-opt');
  opts.forEach(o=>o.classList.add('done'));
  opts[optIdx].classList.add(correct?'correct':'wrong');
  if(!correct) opts[q.a].classList.add('correct');
  // Feedback
  const fb=document.getElementById('fb-'+qn);
  fb.className='q-feedback show '+(correct?'fb-correct':'fb-wrong');
  fb.innerHTML=`<span class="fb-label">${correct?'✓ Correto':'✗ Incorreto — Gabarito: '+'ABCD'[q.a]}</span><span class="fb-body">${q.c}</span>`;
  document.getElementById('qb-'+qn).classList.add('answered');
  updateStats();
  if(Object.keys(answers).length===TOTAL) finishQuiz();
}

function syncErrorsButton(){
  const errBtn = document.getElementById('err-btn');
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  const answered = Object.keys(answers).length;

  if (errs > 0) {
    errBtn.style.display = 'block';
    errBtn.disabled = false;
    errBtn.textContent = errorsMode ? '↺ Mostrar todas' : '↺ Só erros';
  } else {
    errBtn.style.display = answered === TOTAL ? 'block' : 'none';
    errBtn.disabled = true;
    errBtn.textContent = '↺ Só erros';
  }
}

function updateStats(){
  const answered = Object.keys(answers).length;
  let corr = 0;
  QUESTIONS.forEach(q => { if (answers[q.n] === q.a) corr++; });
  const pct = answered ? Math.round(corr / answered * 100) : 0;

  document.getElementById('hdr-answered').textContent = answered;
  document.getElementById('hdr-correct').textContent = corr;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = (answered / TOTAL * 100) + '%';
  document.getElementById('st-pts').textContent = corr;
  document.getElementById('st-fill').style.width = (corr / TOTAL * 100) + '%';
  document.getElementById('st-pct').textContent = pct + '%';

  syncErrorsButton();
}

function finishQuiz(){
  let corr=0;
  QUESTIONS.forEach(q=>{ if(answers[q.n]===q.a) corr++; });
  const pct=Math.round(corr/TOTAL*100);
  const panel=document.getElementById('score-panel');
  panel.classList.add('show');
  const numEl=document.getElementById('sc-num');
  numEl.textContent=corr+'/'+TOTAL;
  numEl.className='sc-number '+(pct>=70?'sc-approved':'sc-failed');
  document.getElementById('sc-pct').textContent=pct+'% de acerto';
  const errs=TOTAL-corr;
  document.getElementById('sc-breakdown').innerHTML=
    `<div class="sc-item"><strong>${corr}</strong>Corretas</div>
     <div class="sc-item"><strong>${errs}</strong>Incorretas</div>
     <div class="sc-item"><strong>${pct}%</strong>Aproveitamento</div>`;
  syncErrorsButton();
  if(errs>0) document.getElementById('sc-review-btn').style.display='inline-block';
  else document.getElementById('sc-review-btn').style.display='none';
  panel.scrollIntoView({behavior:'smooth'});
}

function resetQuiz(){
  answers={};
  errorsMode=false;
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  syncErrorsButton();
  document.getElementById('hdr-answered').textContent='0';
  document.getElementById('hdr-correct').textContent='0';
  document.getElementById('hdr-pct').textContent='0%';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('st-pts').textContent='0';
  document.getElementById('st-fill').style.width='0%';
  document.getElementById('st-pct').textContent='0%';
  renderQuiz();
  window.scrollTo(0,0);
}

function reviewErrors(){
  errorsMode = true;
  document.getElementById('score-panel').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderQuiz();
  syncErrorsButton();
  window.scrollTo(0,0);
}

function setFilter(f, btn){
  currentFilter = f;
  errorsMode = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
  syncErrorsButton();
}

function toggleErrors(){
  const errs = QUESTIONS.filter(q => answers[q.n] !== undefined && answers[q.n] !== q.a).length;
  if (!errs) return;
  errorsMode = !errorsMode;
  renderQuiz();
  syncErrorsButton();
}

renderQuiz();
syncErrorsButton();
</script>
</body>
</html>
